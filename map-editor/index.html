<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Epi City Map Editor</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(17, 21, 18, 0.92);
        --panel-soft: rgba(32, 39, 33, 0.92);
        --line: rgba(220, 230, 210, 0.2);
        --text: #edf4e9;
        --muted: #aeb9ac;
        --accent: #f2cc47;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #101410;
        color: var(--text);
        font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        cursor: crosshair;
      }

      .panel {
        position: fixed;
        top: 14px;
        left: 14px;
        width: 330px;
        max-height: calc(100vh - 28px);
        overflow: auto;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.36);
        user-select: none;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 15px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .hint {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .section {
        padding-top: 12px;
        margin-top: 12px;
        border-top: 1px solid var(--line);
      }

      .divider {
        height: 1px;
        margin: 12px 0;
        background: var(--line);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 8px 0;
      }

      .button-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
      }

      button,
      select,
      input[type='range'] {
        font: inherit;
      }

      button,
      select {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
        color: var(--text);
      }

      button {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        padding: 8px 9px;
        cursor: pointer;
      }

      button:hover,
      button.active {
        border-color: rgba(242, 204, 71, 0.72);
        box-shadow: inset 0 0 0 1px rgba(242, 204, 71, 0.24);
      }

      button.primary {
        justify-content: center;
        background: rgba(242, 204, 71, 0.18);
        border-color: rgba(242, 204, 71, 0.62);
      }

      select {
        padding: 6px 8px;
      }

      label {
        color: var(--muted);
      }

      input[type='checkbox'] {
        accent-color: var(--accent);
      }

      .swatch {
        width: 14px;
        height: 14px;
        border: 1px solid rgba(255, 255, 255, 0.42);
        border-radius: 4px;
        flex: 0 0 auto;
      }

      .swatch.empty {
        background:
          linear-gradient(135deg, transparent 44%, rgba(242, 204, 71, 0.92) 45%, rgba(242, 204, 71, 0.92) 55%, transparent 56%),
          rgba(255, 255, 255, 0.05);
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 3px 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .stats strong {
        color: var(--text);
        font-weight: 600;
      }

      .status {
        min-height: 18px;
        color: var(--accent);
        font-size: 12px;
      }

      .footer {
        margin-top: 12px;
        color: var(--muted);
        font-size: 11px;
      }

      .badge {
        padding: 1px 5px 2px;
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <canvas id="map"></canvas>

    <aside class="panel">
      <h1>Map Editor</h1>
      <p class="hint">Paint the current editable 256x256 map state directly. Wheel zooms, right/middle drag or hold Space pans, left drag paints.</p>

      <div class="section">
        <div class="row">
          <label for="paint-layer">Paint layer</label>
          <select id="paint-layer">
            <option value="type">tile type</option>
            <option value="building">building</option>
            <option value="texture">texture</option>
            <option value="walkable">walkable</option>
            <option value="parkable">parkable</option>
            <option value="drivable">drivable</option>
            <option value="laneGraph">lane graph</option>
          </select>
        </div>
        <div class="button-grid" id="label-buttons"></div>
      </div>

      <div class="section">
        <div class="row">
          <label for="brush-size">Brush</label>
          <select id="brush-size">
            <option value="1">1x1</option>
            <option value="3">3x3</option>
            <option value="5">5x5</option>
          </select>
        </div>
        <div class="row">
          <label for="overlay-opacity">Layer opacity</label>
          <input id="overlay-opacity" type="range" min="0.15" max="1" step="0.05" value="0.72">
        </div>
      </div>

      <div class="section">
        <div class="row">
          <label><input id="show-overlay" type="checkbox" checked> current layer</label>
        </div>
        <div class="row">
          <label><input id="show-grid" type="checkbox" checked> grid</label>
        </div>
      </div>

      <div class="section">
        <div class="button-grid">
          <button id="load-map-folder" type="button">Load Map Folder</button>
          <button id="save-map-folder" class="primary" type="button" title="Writes tile-layout.json and texture-layout.json into the current map folder.">Save Map Folder</button>
          <button id="reset-defaults" type="button">Reset to defaults</button>
          <button id="fit" type="button">Fit map</button>
          <button id="undo" type="button">Undo</button>
          <button id="redo" type="button">Redo</button>
        </div>
      </div>

      <div class="section">
        <div class="divider"></div>
        <div class="button-grid">
          <button id="train" class="primary" type="button">Train random forest</button>
          <button id="predict" type="button">Predict labels</button>
        </div>
        <div class="divider"></div>
      </div>

      <div class="section stats" id="stats"></div>
      <div class="section status" id="status">Loading...</div>
      <div class="footer">
        Current tile: <span class="badge" id="cursor-tile">outside</span><br>
        Editing: <span class="badge" id="map-name">untitled default map</span>
      </div>
    </aside>

    <script type="module">
      const GRID_SIZE = 256;
      const DEFAULT_TILE_SIZE = 32;
      const DEFAULT_TEXTURE_SET = 'liberty-city';
      const BUILDING_LAYOUT_ENCODING = 'row-spans-v1';
      const DEFAULT_BUILDING_TYPE = 'residential';
      const DEFAULT_BUILDING_TYPES = Object.freeze([DEFAULT_BUILDING_TYPE]);
      const MAP_PACKAGE_FILES = Object.freeze({
        tileLayout: 'tile-layout.json',
        textureLayout: 'texture-layout.json',
        manifest: 'manifest.json'
      });
      const TYPE_LABELS = Object.freeze(['road', 'sidewalk', 'park', 'water', 'building', 'obstacle', 'crosswalk']);
      const BUILDING_TYPES = Object.freeze([
        'residential',
        'commercial',
        'school',
        'restaurant',
        'supermarket',
        'hospital',
        'mall',
        'nightclub'
      ]);
      const BEHAVIOR_LABELS = Object.freeze(['walkable', 'parkable', 'drivable']);
      const LANE_GRAPH_ENCODING = 'directed-lanes-v1';
      const TRAFFIC_SIGNAL_ENCODING = 'traffic-signals-v1';
      const LANE_GRAPH_DIRECTIONS = Object.freeze(['north', 'east', 'south', 'west']);
      const LANE_GRAPH_DIRECTION_OFFSETS = Object.freeze({
        north: { dx: 0, dy: -1 },
        east: { dx: 1, dy: 0 },
        south: { dx: 0, dy: 1 },
        west: { dx: -1, dy: 0 }
      });
      const LANE_GRAPH_OPPOSITES = Object.freeze({ north: 'south', east: 'west', south: 'north', west: 'east' });
      const LANE_GRAPH_RIGHT_TURNS = Object.freeze({ north: 'east', east: 'south', south: 'west', west: 'north' });
      const LANE_GRAPH_LEFT_TURNS = Object.freeze({ north: 'west', west: 'south', south: 'east', east: 'north' });
      const LANE_GRAPH_EDGE_TYPES = Object.freeze(['lane', 'turn']);
      const LANE_GRAPH_TURN_TYPES = Object.freeze(['left', 'right', 'straight', 'u-turn', 'merge']);
      const TRAFFIC_SIGNAL_MOVEMENTS = Object.freeze(['north-south', 'east-west', 'all']);
      const TRAFFIC_SIGNAL_STATES = Object.freeze(['green', 'yellow', 'red']);
      const DEFAULT_TRAFFIC_SIGNAL_PHASES = Object.freeze([
        Object.freeze({ movement: 'north-south', state: 'green', duration: 6 }),
        Object.freeze({ movement: 'north-south', state: 'yellow', duration: 2 }),
        Object.freeze({ movement: 'all', state: 'red', duration: 1 }),
        Object.freeze({ movement: 'east-west', state: 'green', duration: 6 }),
        Object.freeze({ movement: 'east-west', state: 'yellow', duration: 2 }),
        Object.freeze({ movement: 'all', state: 'red', duration: 1 })
      ]);
      const LANE_GRAPH_TOOLS = Object.freeze([
        { value: 'segment', label: 'draw segment', color: '#4fb7d8' },
        { value: 'new-segment', label: 'new segment', color: '#f2cc47' },
        { value: 'toggle-signal', label: 'toggle signal', color: '#7be36f' },
        { value: 'signal-offset', label: 'offset signal', color: '#b78cff' },
        { value: 'delete', label: 'delete tile', color: '#d94a48' },
        { value: 'clear', label: 'clear graph', color: '#ffffff' }
      ]);
      const LANE_GRAPH_COLORS = Object.freeze({
        lane: '#4fb7d8',
        turn: '#f2cc47',
        node: '#ffffff',
        selected: '#ff6f91',
        activeTile: '#ff6f91',
        preview: '#2bd36f',
        signal: '#7be36f',
        signalDisabled: '#d94a48',
        signalOverride: '#b78cff'
      });
      const EMPTY_LABEL_VALUE = null;
      const TYPE_COLORS = Object.freeze({
        road: '#111611',
        sidewalk: '#a6aca3',
        park: '#4da23f',
        water: '#0786c8',
        building: '#68716b',
        obstacle: '#d94a48',
        crosswalk: '#111611',
        crosswalkStripe: '#ffffff',
        unknown: '#ffffff'
      });
      const BEHAVIOR_COLORS = Object.freeze({
        true: '#2bd36f',
        false: '#d94a48'
      });
      const BUILDING_TYPE_COLORS = Object.freeze({
        residential: '#f2cc47',
        commercial: '#4fb7d8',
        school: '#7be36f',
        restaurant: '#ff8a3d',
        supermarket: '#42c49d',
        hospital: '#ff6f91',
        mall: '#b78cff',
        nightclub: '#6d6ef2',
        unknown: '#ffffff'
      });
      const TYPE_KEYS = Object.freeze({
        '1': 'road',
        '2': 'sidewalk',
        '3': 'park',
        '4': 'water',
        '5': 'building',
        '6': 'obstacle',
        '7': 'crosswalk',
        e: ''
      });
      const BEHAVIOR_KEYS = Object.freeze({
        t: true,
        f: false,
        e: null
      });
      const BUILDING_KEYS = Object.freeze({
        r: 'residential',
        c: 'commercial',
        s: 'school',
        t: 'restaurant',
        u: 'supermarket',
        h: 'hospital',
        m: 'mall',
        n: 'nightclub'
      });
      const SAFE_SYMBOLS = Object.freeze([...('0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!#$%&()*+,-./:;<=>?@[]^_{|}~')]);

      const canvas = document.getElementById('map');
      const ctx = canvas.getContext('2d', { alpha: false });
      const paintLayer = document.getElementById('paint-layer');
      const labelButtons = document.getElementById('label-buttons');
      const brushSize = document.getElementById('brush-size');
      const overlayOpacity = document.getElementById('overlay-opacity');
      const showOverlay = document.getElementById('show-overlay');
      const showGrid = document.getElementById('show-grid');
      const trainButton = document.getElementById('train');
      const predictButton = document.getElementById('predict');
      const status = document.getElementById('status');
      const stats = document.getElementById('stats');
      const cursorTile = document.getElementById('cursor-tile');
      const mapName = document.getElementById('map-name');

      const state = {
        config: null,
        sourceImage: null,
        atlasImage: null,
        atlasDataUrl: null,
        atlasFileName: null,
        textureManifest: null,
        textureManifestFileName: null,
        image: null,
        map: null,
        latestPrediction: null,
        trainingSummary: null,
        selectedTypeLabel: EMPTY_LABEL_VALUE,
        selectedBuildingTypes: [...DEFAULT_BUILDING_TYPES],
        selectedBehaviorValue: EMPTY_LABEL_VALUE,
        selectedTextureId: null,
        texturePickMode: true,
        selectedLaneGraphTool: 'segment',
        selectedLaneNodeId: null,
        activeLaneSegmentTile: null,
        undoStack: [],
        redoStack: [],
        dirty: false,
        semanticRowsDirty: false,
        textureRowsDirty: false,
        mapDirectoryHandle: null,
        mapDirectoryName: null,
        isPainting: false,
        isPanning: false,
        spaceDown: false,
        currentStroke: null,
        lastPointer: { x: 0, y: 0 },
        hoverTile: null,
        view: { x: 0, y: 0, zoom: 1 }
      };

      init().catch((error) => {
        console.error(error);
        setStatus(error.message, true);
      });

      async function init() {
        state.config = await fetchJson('/api/config').catch(() => ({ sourceImageUrl: '/source-image' }));
        state.map = createDefaultEditableMap();
        state.sourceImage = await loadImage(state.config.sourceImageUrl || '/source-image');
        state.image = state.sourceImage;
        const defaultTextureAssetError = await loadDefaultTextureAssets().catch((error) => {
          console.warn(error);
          return error;
        });
        createLabelButtons();
        resizeCanvas();
        fitMap();
        installEvents();
        updateStats();
        setStatus(defaultTextureAssetError
          ? `Ready. Default texture preview could not load: ${defaultTextureAssetError.message}`
          : state.config.defaultTileConfiguration
          ? 'Ready. Default empty tile configuration, current texture rows, and Liberty City texture preview are loaded.'
          : 'Ready. Load a map folder containing tile-layout.json, texture-layout.json, manifest.json, and the atlas.');
        draw();
      }

      function createDefaultEditableMap() {
        if (state.config && state.config.defaultTileConfiguration) {
          return editableMapFromJson(
            state.config.defaultTileConfiguration,
            state.config.defaultTileConfigurationPath || 'empty-tile-layout.json',
            {
              sourceName: state.config.defaultTileConfigurationName || 'default empty tile configuration',
              visualSource: 'source image',
              textureRows: state.config.defaultTextureLayout && state.config.defaultTextureLayout.textureRows,
              textureRowsFileName: state.config.defaultTextureLayoutPath || 'texture-layout.json',
              originalTextureLayout: state.config.defaultTextureLayout || null
            }
          );
        }

        return createFilledEditableMap(EMPTY_LABEL_VALUE, 'untitled-default-map.json', {
          sourceName: 'untitled default map',
          tileSize: DEFAULT_TILE_SIZE,
          textureSet: DEFAULT_TEXTURE_SET
        });
      }

      function createFilledEditableMap(type, fileName, metadata = {}) {
        const rows = Array.from({ length: GRID_SIZE }, () => Array.from({ length: GRID_SIZE }, () => type));
        const behaviorRows = Object.fromEntries(BEHAVIOR_LABELS.map((property) => [
          property,
          Array.from({ length: GRID_SIZE }, () => Array.from({ length: GRID_SIZE }, () => EMPTY_LABEL_VALUE))
        ]));
        const buildings = createBuildingsFromRows(rows, metadata.buildings);

        return {
          width: GRID_SIZE,
          height: GRID_SIZE,
          tileSize: metadata.tileSize || DEFAULT_TILE_SIZE,
          textureSet: metadata.textureSet || DEFAULT_TEXTURE_SET,
          sourceName: metadata.sourceName || fileName,
          visualSource: metadata.visualSource || 'source image',
          fileName,
          rows,
          behaviorRows,
          buildings,
          laneGraph: normalizeLaneGraphLayout(metadata.laneGraph),
          buildingLookup: createBuildingLookup(buildings),
          textureRows: metadata.textureRows ? cloneTextureRows(metadata.textureRows) : createDefaultTextureRows(),
          textureRowsFileName: metadata.textureRowsFileName || 'texture-layout.json',
          originalTextureLayout: metadata.originalTextureLayout || null,
          originalMap: null
        };
      }

      function createDefaultTextureRows() {
        if (state.config && state.config.defaultTextureLayout) {
          return normalizeTextureRows(state.config.defaultTextureLayout.textureRows, { fallbackToZero: true });
        }

        return createZeroTextureRows();
      }

      function createZeroTextureRows() {
        return Array.from({ length: GRID_SIZE }, () => Array.from({ length: GRID_SIZE }, () => 0));
      }

      function createEmptyLaneGraph() {
        return {
          encoding: LANE_GRAPH_ENCODING,
          drivingSide: 'right',
          coordinateSpace: 'tile',
          nodes: [],
          edges: [],
          trafficSignals: createEmptyTrafficSignalLayout()
        };
      }

      function createEmptyTrafficSignalLayout() {
        return {
          encoding: TRAFFIC_SIGNAL_ENCODING,
          overrides: []
        };
      }

      function normalizeLaneGraphLayout(laneGraph) {
        if (laneGraph === undefined || laneGraph === null) {
          return createEmptyLaneGraph();
        }

        validateLaneGraph(laneGraph);
        const graphForSignals = {
          ...laneGraph,
          nodes: laneGraph.nodes.map((node) => ({ ...node, tile: { ...node.tile } })),
          edges: laneGraph.edges.map((edge) => ({ ...edge }))
        };

        return {
          encoding: LANE_GRAPH_ENCODING,
          drivingSide: laneGraph.drivingSide,
          coordinateSpace: laneGraph.coordinateSpace,
          nodes: laneGraph.nodes.map((node) => ({
            ...node,
            tile: { ...node.tile }
          })),
          edges: laneGraph.edges.map((edge) => ({
            ...edge,
            path: edge.path.map((point) => [...point])
          })),
          trafficSignals: normalizeTrafficSignalsLayout(laneGraph.trafficSignals, graphForSignals)
        };
      }

      function normalizeTrafficSignalsLayout(trafficSignals, graph) {
        if (trafficSignals === undefined || trafficSignals === null) {
          return createEmptyTrafficSignalLayout();
        }

        if (!trafficSignals || typeof trafficSignals !== 'object' || Array.isArray(trafficSignals)) {
          throw new Error('Traffic signal metadata must be an object.');
        }

        if (trafficSignals.encoding !== TRAFFIC_SIGNAL_ENCODING) {
          throw new Error(`Traffic signal encoding must be ${TRAFFIC_SIGNAL_ENCODING}.`);
        }

        if (!Array.isArray(trafficSignals.overrides)) {
          throw new Error('Traffic signal overrides must be an array.');
        }

        const autoSignalIds = new Set(buildAutoTrafficSignalGroups(graph).map((group) => group.id));
        const overrideIds = new Set();
        const overrides = [];

        for (let index = 0; index < trafficSignals.overrides.length; index += 1) {
          const override = normalizeTrafficSignalOverride(trafficSignals.overrides[index], index, overrideIds);

          if (!autoSignalIds.has(override.id)) {
            continue;
          }

          overrides.push(override);
        }

        return {
          encoding: TRAFFIC_SIGNAL_ENCODING,
          overrides
        };
      }

      function normalizeTrafficSignalOverride(override, index, overrideIds) {
        if (!override || typeof override !== 'object' || Array.isArray(override)) {
          throw new Error(`Traffic signal override ${index} must be an object.`);
        }

        if (typeof override.id !== 'string' || override.id.length === 0) {
          throw new Error(`Traffic signal override ${index} must include a non-empty id.`);
        }

        if (overrideIds.has(override.id)) {
          throw new Error(`Traffic signal override ${override.id} is duplicated.`);
        }

        overrideIds.add(override.id);

        const normalized = {
          id: override.id,
          enabled: override.enabled !== false,
          phaseOffset: normalizeTrafficSignalPhaseOffset(override.phaseOffset)
        };

        if (override.tile !== undefined) {
          if (!override.tile || typeof override.tile !== 'object' || Array.isArray(override.tile) ||
              !inGrid(override.tile.x, override.tile.y)) {
            throw new Error(`Traffic signal override ${override.id} tile must be in bounds.`);
          }

          normalized.tile = { x: override.tile.x, y: override.tile.y };
        }

        if (override.phases !== undefined) {
          normalized.phases = normalizeTrafficSignalPhases(override.phases, `Traffic signal override ${override.id}`);
        }

        return normalized;
      }

      function normalizeTrafficSignalPhaseOffset(value) {
        if (value === undefined) {
          return 0;
        }

        if (!Number.isFinite(value) || value < 0) {
          throw new Error('Traffic signal phaseOffset must be a non-negative number.');
        }

        return value;
      }

      function normalizeTrafficSignalPhases(phases, subject) {
        if (!Array.isArray(phases) || phases.length === 0) {
          throw new Error(`${subject} phases must be a non-empty array.`);
        }

        return phases.map((phase, index) => {
          if (!phase || typeof phase !== 'object' || Array.isArray(phase)) {
            throw new Error(`${subject} phase ${index} must be an object.`);
          }

          if (!TRAFFIC_SIGNAL_MOVEMENTS.includes(phase.movement)) {
            throw new Error(`${subject} phase ${index} has an invalid movement.`);
          }

          if (!TRAFFIC_SIGNAL_STATES.includes(phase.state)) {
            throw new Error(`${subject} phase ${index} has an invalid state.`);
          }

          if (!Number.isFinite(phase.duration) || phase.duration <= 0) {
            throw new Error(`${subject} phase ${index} duration must be positive.`);
          }

          return {
            movement: phase.movement,
            state: phase.state,
            duration: phase.duration
          };
        });
      }

      function cloneLaneGraph(laneGraph) {
        return normalizeLaneGraphLayout(laneGraph);
      }

      function buildLaneGraphJson() {
        const laneGraph = cloneLaneGraph(state.map.laneGraph);
        const signalOverrides = laneGraph.trafficSignals?.overrides || [];

        if (laneGraph.nodes.length === 0 && laneGraph.edges.length === 0 && signalOverrides.length === 0) {
          return null;
        }

        return {
          encoding: laneGraph.encoding,
          drivingSide: laneGraph.drivingSide,
          coordinateSpace: laneGraph.coordinateSpace,
          nodes: laneGraph.nodes,
          edges: laneGraph.edges,
          ...(signalOverrides.length > 0
            ? { trafficSignals: { encoding: TRAFFIC_SIGNAL_ENCODING, overrides: signalOverrides } }
            : {})
        };
      }

      function assignLaneGraphJson(payload) {
        const laneGraph = buildLaneGraphJson();

        if (laneGraph) {
          payload.laneGraph = laneGraph;
        }

        return payload;
      }

      function isLaneGraphOperation(operation) {
        return operation && operation.kind === 'laneGraph';
      }

      function recordLaneGraphOperation(before, after) {
        state.undoStack.push({ kind: 'laneGraph', before, after });
        state.redoStack.length = 0;
        state.dirty = true;
        state.trainingSummary = null;
        updateStats();
        draw();
      }

      function applyLaneGraphMutation(mutator, message) {
        const before = cloneLaneGraph(state.map.laneGraph);
        const changed = mutator(state.map.laneGraph);
        state.map.laneGraph = cloneLaneGraph(state.map.laneGraph);
        const after = cloneLaneGraph(state.map.laneGraph);

        if (!changed || JSON.stringify(before) === JSON.stringify(after)) {
          return false;
        }

        recordLaneGraphOperation(before, after);
        setStatus(message);
        return true;
      }

      function restoreLaneGraphOperation(operation, snapshot) {
        state.map.laneGraph = cloneLaneGraph(snapshot);

        if (state.selectedLaneNodeId && !state.map.laneGraph.nodes.some((node) => node.id === state.selectedLaneNodeId)) {
          state.selectedLaneNodeId = null;
        }

        state.dirty = true;
        state.trainingSummary = null;
        updateStats();
        draw();
      }

      function lanePointForTile(tileX, tileY) {
        return {
          x: tileX + 0.5,
          y: tileY + 0.5
        };
      }

      function nextLaneNodeId(graph = state.map.laneGraph) {
        const used = new Set(graph.nodes.map((node) => node.id));
        let index = graph.nodes.length + 1;

        while (used.has(`lane-node-${String(index).padStart(4, '0')}`)) {
          index += 1;
        }

        return `lane-node-${String(index).padStart(4, '0')}`;
      }

      function nextLaneEdgeId(graph = state.map.laneGraph) {
        const used = new Set(graph.edges.map((edge) => edge.id));
        let index = graph.edges.length + 1;

        while (used.has(`lane-edge-${String(index).padStart(4, '0')}`)) {
          index += 1;
        }

        return `lane-edge-${String(index).padStart(4, '0')}`;
      }

      function laneNodeForTile(graph, tileX, tileY) {
        return graph.nodes.find((node) => node.tile.x === tileX && node.tile.y === tileY) || null;
      }

      function addLaneNode(graph, tileX, tileY, direction) {
        const point = lanePointForTile(tileX, tileY);
        const node = {
          id: nextLaneNodeId(graph),
          x: Number(point.x.toFixed(4)),
          y: Number(point.y.toFixed(4)),
          tile: { x: tileX, y: tileY },
          direction
        };

        graph.nodes.push(node);
        return node;
      }

      function ensureLaneNode(graph, tileX, tileY, direction) {
        return laneNodeForTile(graph, tileX, tileY) || addLaneNode(graph, tileX, tileY, direction);
      }

      function deleteLaneTile(graph, tileX, tileY) {
        const nodeIds = new Set(graph.nodes
          .filter((node) => node.tile.x === tileX && node.tile.y === tileY)
          .map((node) => node.id));

        if (nodeIds.size === 0) {
          return false;
        }

        graph.nodes = graph.nodes.filter((node) => !nodeIds.has(node.id));
        graph.edges = graph.edges.filter((edge) => !nodeIds.has(edge.from) && !nodeIds.has(edge.to));

        if (state.selectedLaneNodeId && nodeIds.has(state.selectedLaneNodeId)) {
          state.selectedLaneNodeId = null;
        }

        if (state.activeLaneSegmentTile && state.activeLaneSegmentTile.x === tileX && state.activeLaneSegmentTile.y === tileY) {
          state.activeLaneSegmentTile = null;
        }

        return true;
      }

      function clearLaneGraph(graph) {
        const overrides = graph.trafficSignals?.overrides || [];

        if (graph.nodes.length === 0 && graph.edges.length === 0 && overrides.length === 0) {
          return false;
        }

        graph.nodes = [];
        graph.edges = [];
        graph.trafficSignals = createEmptyTrafficSignalLayout();
        state.selectedLaneNodeId = null;
        state.activeLaneSegmentTile = null;
        return true;
      }

      function ensureTrafficSignalLayout(graph) {
        if (!graph.trafficSignals) {
          graph.trafficSignals = createEmptyTrafficSignalLayout();
        }

        return graph.trafficSignals;
      }

      function trafficSignalOverrideForGroup(graph, group) {
        return (graph.trafficSignals?.overrides || []).find((override) => override.id === group.id) || null;
      }

      function upsertTrafficSignalOverride(graph, group, mutator) {
        const trafficSignals = ensureTrafficSignalLayout(graph);
        let override = trafficSignals.overrides.find((item) => item.id === group.id);

        if (!override) {
          override = {
            id: group.id,
            tile: { ...group.tile },
            enabled: true,
            phaseOffset: 0
          };
          trafficSignals.overrides.push(override);
        }

        mutator(override);
        override.tile = { ...group.tile };
        return override;
      }

      function toggleTrafficSignalOverride(graph, group) {
        const trafficSignals = ensureTrafficSignalLayout(graph);
        const override = trafficSignalOverrideForGroup(graph, group);

        if (!override) {
          upsertTrafficSignalOverride(graph, group, (nextOverride) => {
            nextOverride.enabled = false;
          });
          return true;
        }

        if (override.enabled === false) {
          trafficSignals.overrides = trafficSignals.overrides.filter((item) => item.id !== group.id);
        } else {
          override.enabled = false;
        }

        return true;
      }

      function offsetTrafficSignalOverride(graph, group) {
        const cycleDuration = trafficSignalCycleDuration(DEFAULT_TRAFFIC_SIGNAL_PHASES);
        const currentOffset = trafficSignalEffectivePhaseOffset(graph, group);

        upsertTrafficSignalOverride(graph, group, (override) => {
          override.enabled = true;
          override.phaseOffset = (currentOffset + 2) % cycleDuration;
        });

        return true;
      }

      function trafficSignalEffectivePhaseOffset(graph, group) {
        const override = trafficSignalOverrideForGroup(graph, group);
        return override?.phaseOffset ?? defaultTrafficSignalPhaseOffset(group.tile);
      }

      function laneTurnType(fromDirection, toDirection) {
        if (fromDirection === toDirection) {
          return 'straight';
        }

        if (LANE_GRAPH_OPPOSITES[fromDirection] === toDirection) {
          return 'u-turn';
        }

        if (LANE_GRAPH_RIGHT_TURNS[fromDirection] === toDirection) {
          return 'right';
        }

        if (LANE_GRAPH_LEFT_TURNS[fromDirection] === toDirection) {
          return 'left';
        }

        return 'merge';
      }

      function isLaneAuthoringTile(tileX, tileY) {
        const type = inGrid(tileX, tileY) ? state.map.rows[tileY][tileX] : null;
        return type === 'road' || type === 'crosswalk';
      }

      function cardinalLaneDirection(fromTile, toTile) {
        const dx = toTile.x - fromTile.x;
        const dy = toTile.y - fromTile.y;

        if (Math.abs(dx) + Math.abs(dy) !== 1) {
          return null;
        }

        for (const [direction, offset] of Object.entries(LANE_GRAPH_DIRECTION_OFFSETS)) {
          if (offset.dx === dx && offset.dy === dy) {
            return direction;
          }
        }

        return null;
      }

      function laneTileLine(fromTile, toTile) {
        if (fromTile.x !== toTile.x && fromTile.y !== toTile.y) {
          return null;
        }

        const stepX = Math.sign(toTile.x - fromTile.x);
        const stepY = Math.sign(toTile.y - fromTile.y);
        const tiles = [{ x: fromTile.x, y: fromTile.y }];
        let x = fromTile.x;
        let y = fromTile.y;

        while (x !== toTile.x || y !== toTile.y) {
          x += stepX;
          y += stepY;
          tiles.push({ x, y });
        }

        return tiles;
      }

      function firstBlockedLaneTile(tiles) {
        return tiles.find((tile) => !isLaneAuthoringTile(tile.x, tile.y)) || null;
      }

      function sameTile(a, b) {
        return Boolean(a && b && a.x === b.x && a.y === b.y);
      }

      function buildAutoTrafficSignalGroups(graph) {
        const nodesById = new Map(graph.nodes.map((node) => [node.id, node]));
        const axesByNodeId = new Map(graph.nodes.map((node) => [node.id, new Set()]));

        for (const edge of graph.edges) {
          const axis = trafficSignalMovementForDirection(edge.direction);

          if (!axis) {
            continue;
          }

          if (axesByNodeId.has(edge.from)) {
            axesByNodeId.get(edge.from).add(axis);
          }

          if (axesByNodeId.has(edge.to)) {
            axesByNodeId.get(edge.to).add(axis);
          }
        }

        const candidateTiles = [];
        const candidateKeys = new Set();

        for (const node of graph.nodes) {
          const axes = axesByNodeId.get(node.id);

          if (!axes || axes.size < 2) {
            continue;
          }

          const key = tileKey(node.tile.x, node.tile.y);
          candidateKeys.add(key);
          candidateTiles.push({ x: node.tile.x, y: node.tile.y });
        }

        candidateTiles.sort(compareTiles);

        const groups = [];
        const visited = new Set();

        for (const tile of candidateTiles) {
          const startKey = tileKey(tile.x, tile.y);

          if (visited.has(startKey)) {
            continue;
          }

          const tiles = [];
          const stack = [tile];
          visited.add(startKey);

          while (stack.length > 0) {
            const current = stack.pop();
            tiles.push(current);

            for (const offset of Object.values(LANE_GRAPH_DIRECTION_OFFSETS)) {
              const nextTile = { x: current.x + offset.dx, y: current.y + offset.dy };
              const nextKey = tileKey(nextTile.x, nextTile.y);

              if (!candidateKeys.has(nextKey) || visited.has(nextKey)) {
                continue;
              }

              visited.add(nextKey);
              stack.push(nextTile);
            }
          }

          tiles.sort(compareTiles);
          const entryEdges = trafficSignalEntryEdges(graph.edges, nodesById, tiles);
          const entryAxes = new Set(entryEdges.map((entry) => entry.axis));

          if (entryAxes.size < 2) {
            continue;
          }

          const anchor = tiles[0];
          groups.push({
            id: `traffic-signal-${anchor.x}-${anchor.y}`,
            tile: { ...anchor },
            tiles,
            entryEdges
          });
        }

        return groups;
      }

      function trafficSignalEntryEdges(edges, nodesById, tiles) {
        const tileKeys = new Set(tiles.map((tile) => tileKey(tile.x, tile.y)));
        const entryEdges = [];

        for (const edge of edges) {
          const fromNode = nodesById.get(edge.from);
          const toNode = nodesById.get(edge.to);

          if (!fromNode || !toNode) {
            continue;
          }

          const fromInside = tileKeys.has(tileKey(fromNode.tile.x, fromNode.tile.y));
          const toInside = tileKeys.has(tileKey(toNode.tile.x, toNode.tile.y));

          if (fromInside || !toInside) {
            continue;
          }

          const axis = trafficSignalMovementForDirection(edge.direction);

          if (!axis) {
            continue;
          }

          entryEdges.push({
            edgeId: edge.id,
            axis,
            direction: edge.direction
          });
        }

        return entryEdges.sort((a, b) => a.edgeId.localeCompare(b.edgeId));
      }

      function trafficSignalGroupForTile(graph, tileX, tileY) {
        return buildAutoTrafficSignalGroups(graph).find((group) =>
          group.tiles.some((tile) => tile.x === tileX && tile.y === tileY)
        ) || null;
      }

      function trafficSignalMovementForDirection(direction) {
        if (direction === 'north' || direction === 'south') {
          return 'north-south';
        }

        if (direction === 'east' || direction === 'west') {
          return 'east-west';
        }

        return null;
      }

      function trafficSignalCycleDuration(phases) {
        return phases.reduce((total, phase) => total + phase.duration, 0);
      }

      function defaultTrafficSignalPhaseOffset(tile) {
        const cycleDuration = trafficSignalCycleDuration(DEFAULT_TRAFFIC_SIGNAL_PHASES);
        return (tile.x * 3 + tile.y * 5) % cycleDuration;
      }

      function compareTiles(a, b) {
        return a.y - b.y || a.x - b.x;
      }

      function laneEdgeExists(graph, fromId, toId) {
        return graph.edges.some((edge) => edge.from === fromId && edge.to === toId);
      }

      function addLaneEdge(graph, fromNode, toNode, type, direction, turnFromDirection = fromNode?.direction) {
        if (!fromNode || !toNode || fromNode.id === toNode.id || laneEdgeExists(graph, fromNode.id, toNode.id)) {
          return false;
        }

        const edge = {
          id: nextLaneEdgeId(graph),
          from: fromNode.id,
          to: toNode.id,
          type,
          direction,
          turn: type === 'turn' ? laneTurnType(turnFromDirection, direction) : null,
          speedLimit: type === 'lane' ? 28 : 12,
          path: [[fromNode.x, fromNode.y], [toNode.x, toNode.y]]
        };

        graph.edges.push(edge);
        return true;
      }

      function appendLaneGraphSegmentStep(graph, fromTile, toTile) {
        const direction = cardinalLaneDirection(fromTile, toTile);

        if (!direction) {
          return null;
        }

        const activeNode = state.selectedLaneNodeId
          ? graph.nodes.find((node) => node.id === state.selectedLaneNodeId)
          : null;
        const fromNode = activeNode && activeNode.tile.x === fromTile.x && activeNode.tile.y === fromTile.y
          ? activeNode
          : ensureLaneNode(graph, fromTile.x, fromTile.y, direction);
        const toNode = ensureLaneNode(graph, toTile.x, toTile.y, direction);
        const fromDirection = fromNode.direction;
        const edgeType = fromDirection === direction ? 'lane' : 'turn';

        addLaneEdge(graph, fromNode, toNode, edgeType, direction, fromDirection);
        fromNode.direction = direction;
        return { toNodeId: toNode.id, direction, edgeType };
      }

      function appendLaneGraphSegmentLine(graph, tiles) {
        let finalStep = null;

        for (let index = 1; index < tiles.length; index += 1) {
          finalStep = appendLaneGraphSegmentStep(graph, tiles[index - 1], tiles[index]);

          if (!finalStep) {
            return null;
          }
        }

        return finalStep;
      }

      function laneTileLabel(tile) {
        return tile ? `${tile.x},${tile.y}` : 'none';
      }

      function startLaneSegment(tileX, tileY) {
        if (!isLaneAuthoringTile(tileX, tileY)) {
          setStatus('Lane segments can start on road or crosswalk tiles only.', true);
          return;
        }

        state.activeLaneSegmentTile = { x: tileX, y: tileY };
        state.selectedLaneNodeId = laneNodeForTile(state.map.laneGraph, tileX, tileY)?.id || null;
        updateStats();
        draw();
        setStatus(`Lane segment start set to ${tileX},${tileY}.`);
      }

      function handleLaneGraphClick(tileX, tileY) {
        const tool = state.selectedLaneGraphTool;

        if (tool === 'delete') {
          if (!applyLaneGraphMutation((graph) => deleteLaneTile(graph, tileX, tileY), `Deleted lane graph nodes on ${tileX},${tileY}.`)) {
            setStatus(`No lane graph nodes on ${tileX},${tileY}.`, true);
          }
          return;
        }

        if (tool === 'toggle-signal' || tool === 'signal-offset') {
          const signalGroup = trafficSignalGroupForTile(state.map.laneGraph, tileX, tileY);

          if (!signalGroup) {
            setStatus(`No auto-generated traffic signal at ${tileX},${tileY}.`, true);
            return;
          }

          const changed = applyLaneGraphMutation((graph) => {
            const group = trafficSignalGroupForTile(graph, tileX, tileY);

            if (!group) {
              return false;
            }

            return tool === 'toggle-signal'
              ? toggleTrafficSignalOverride(graph, group)
              : offsetTrafficSignalOverride(graph, group);
          }, tool === 'toggle-signal'
            ? `Toggled traffic signal ${signalGroup.id}.`
            : `Adjusted traffic signal ${signalGroup.id} phase offset.`);

          if (!changed) {
            updateStats();
            draw();
          }

          return;
        }

        if (tool !== 'segment') {
          return;
        }

        if (!state.activeLaneSegmentTile) {
          startLaneSegment(tileX, tileY);
          return;
        }

        if (!isLaneAuthoringTile(tileX, tileY)) {
          setStatus('Lane segments can use road or crosswalk tiles only.', true);
          return;
        }

        const fromTile = { ...state.activeLaneSegmentTile };
        const toTile = { x: tileX, y: tileY };
        const existingToNode = laneNodeForTile(state.map.laneGraph, tileX, tileY);
        const lineTiles = laneTileLine(fromTile, toTile);

        if (sameTile(fromTile, toTile)) {
          state.activeLaneSegmentTile = null;
          state.selectedLaneNodeId = existingToNode?.id || null;
          updateStats();
          draw();
          setStatus(`Lane segment closed at ${laneTileLabel(toTile)}.`);
          return;
        }

        if (!lineTiles) {
          setStatus('Lane segments must stay on one north-south or east-west tile line.', true);
          return;
        }

        const blockedTile = firstBlockedLaneTile(lineTiles);

        if (blockedTile) {
          setStatus(`Lane segment line is blocked at ${laneTileLabel(blockedTile)}. Use road or crosswalk tiles only.`, true);
          return;
        }

        let nextStep = null;
        const changed = applyLaneGraphMutation((graph) => {
          nextStep = appendLaneGraphSegmentLine(graph, lineTiles);
          return Boolean(nextStep);
        }, `Added ${lineTiles.length - 1} lane segment step${lineTiles.length === 2 ? '' : 's'} from ${laneTileLabel(fromTile)} to ${laneTileLabel(toTile)}.`);

        if (nextStep) {
          state.activeLaneSegmentTile = existingToNode ? null : toTile;
          state.selectedLaneNodeId = nextStep.toNodeId;
          updateStats();
          draw();

          if (existingToNode) {
            setStatus(`Lane segment closed at ${laneTileLabel(toTile)}.`);
          } else if (!changed) {
            setStatus(`Lane segment end moved to ${laneTileLabel(toTile)}.`);
          }
        }
      }

      function drawLaneGraphOverlay(alpha) {
        const graph = state.map.laneGraph;
        ctx.globalAlpha = alpha;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        for (const edge of graph.edges) {
          ctx.strokeStyle = LANE_GRAPH_COLORS[edge.type] || LANE_GRAPH_COLORS.lane;
          ctx.lineWidth = (edge.type === 'turn' ? 2.4 : 1.8) / state.view.zoom;
          ctx.beginPath();

          edge.path.forEach(([x, y], index) => {
            const point = laneGraphPointToCanvas(x, y);

            if (index === 0) {
              ctx.moveTo(point.x, point.y);
            } else {
              ctx.lineTo(point.x, point.y);
            }
          });

          ctx.stroke();

          drawLaneGraphArrowHead(edge);
        }

        drawTrafficSignalOverlay(graph);

        for (const node of graph.nodes) {
          const selected = node.id === state.selectedLaneNodeId;
          const point = laneGraphPointToCanvas(node.x, node.y);
          const radius = (selected ? 4.5 : 3) / state.view.zoom;
          ctx.fillStyle = selected ? LANE_GRAPH_COLORS.selected : LANE_GRAPH_COLORS.node;
          ctx.beginPath();
          ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
          ctx.fill();

          const direction = LANE_GRAPH_DIRECTION_OFFSETS[node.direction];
          ctx.strokeStyle = selected ? LANE_GRAPH_COLORS.selected : LANE_GRAPH_COLORS.node;
          ctx.lineWidth = 1.6 / state.view.zoom;
          ctx.beginPath();
          ctx.moveTo(point.x, point.y);
          ctx.lineTo(
            point.x + direction.dx * 8 / state.view.zoom,
            point.y + direction.dy * 8 / state.view.zoom
          );
          ctx.stroke();
        }

        drawLaneGraphSegmentPreview();
        ctx.globalAlpha = 1;
      }

      function drawTrafficSignalOverlay(graph) {
        for (const group of buildAutoTrafficSignalGroups(graph)) {
          const override = trafficSignalOverrideForGroup(graph, group);
          const point = laneGraphPointToCanvas(group.tile.x + 0.5, group.tile.y + 0.5);
          const radius = 6 / state.view.zoom;
          const disabled = override && override.enabled === false;

          ctx.fillStyle = disabled ? LANE_GRAPH_COLORS.signalDisabled : LANE_GRAPH_COLORS.signal;
          ctx.strokeStyle = override ? LANE_GRAPH_COLORS.signalOverride : '#102014';
          ctx.lineWidth = 1.8 / state.view.zoom;
          ctx.beginPath();
          ctx.rect(point.x - radius, point.y - radius, radius * 2, radius * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = '#101410';
          ctx.beginPath();
          ctx.arc(point.x, point.y, 2.2 / state.view.zoom, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawLaneGraphSegmentPreview() {
        if (!state.activeLaneSegmentTile) {
          return;
        }

        const bounds = tileBounds(state.activeLaneSegmentTile.x, state.activeLaneSegmentTile.y);
        ctx.fillStyle = LANE_GRAPH_COLORS.activeTile;
        ctx.globalAlpha = 0.18;
        ctx.fillRect(bounds.x0, bounds.y0, bounds.x1 - bounds.x0, bounds.y1 - bounds.y0);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = LANE_GRAPH_COLORS.activeTile;
        ctx.lineWidth = 2.6 / state.view.zoom;
        ctx.strokeRect(bounds.x0, bounds.y0, bounds.x1 - bounds.x0, bounds.y1 - bounds.y0);

        if (!state.hoverTile || sameTile(state.activeLaneSegmentTile, state.hoverTile)) {
          return;
        }

        const lineTiles = laneTileLine(state.activeLaneSegmentTile, state.hoverTile);

        if (!lineTiles || firstBlockedLaneTile(lineTiles)) {
          return;
        }

        const start = laneGraphPointToCanvas(state.activeLaneSegmentTile.x + 0.5, state.activeLaneSegmentTile.y + 0.5);
        const end = laneGraphPointToCanvas(state.hoverTile.x + 0.5, state.hoverTile.y + 0.5);
        ctx.strokeStyle = LANE_GRAPH_COLORS.preview;
        ctx.lineWidth = 2 / state.view.zoom;
        ctx.setLineDash([6 / state.view.zoom, 4 / state.view.zoom]);
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();
        ctx.setLineDash([]);
      }


      function drawLaneGraphArrowHead(edge) {
        if (!edge.path || edge.path.length < 2) {
          return;
        }

        const end = laneGraphPointToCanvas(edge.path[edge.path.length - 1][0], edge.path[edge.path.length - 1][1]);
        const previous = laneGraphPointToCanvas(edge.path[edge.path.length - 2][0], edge.path[edge.path.length - 2][1]);
        const angle = Math.atan2(end.y - previous.y, end.x - previous.x);
        const size = 7 / state.view.zoom;

        ctx.fillStyle = LANE_GRAPH_COLORS[edge.type] || LANE_GRAPH_COLORS.lane;
        ctx.beginPath();
        ctx.moveTo(end.x, end.y);
        ctx.lineTo(end.x - Math.cos(angle - Math.PI / 6) * size, end.y - Math.sin(angle - Math.PI / 6) * size);
        ctx.lineTo(end.x - Math.cos(angle + Math.PI / 6) * size, end.y - Math.sin(angle + Math.PI / 6) * size);
        ctx.closePath();
        ctx.fill();
      }

      function laneGraphPointToCanvas(x, y) {
        return {
          x: x * state.image.width / GRID_SIZE,
          y: y * state.image.height / GRID_SIZE
        };
      }

      function validateLaneGraph(laneGraph) {
        if (!laneGraph || typeof laneGraph !== 'object' || Array.isArray(laneGraph)) {
          throw new Error('Lane graph must be an object.');
        }

        if (laneGraph.encoding !== LANE_GRAPH_ENCODING) {
          throw new Error(`Lane graph encoding must be ${LANE_GRAPH_ENCODING}.`);
        }

        if (laneGraph.drivingSide !== 'right') {
          throw new Error('Lane graph currently supports right-side driving only.');
        }

        if (laneGraph.coordinateSpace !== 'tile') {
          throw new Error('Lane graph coordinateSpace must be tile.');
        }

        if (Object.prototype.hasOwnProperty.call(laneGraph, 'laneOffset')) {
          throw new Error('Lane graph laneOffset is not supported; nodes must be centered on tiles.');
        }

        if (Object.prototype.hasOwnProperty.call(laneGraph, 'generated')) {
          throw new Error('Generated lane graph metadata is not supported.');
        }

        if (!Array.isArray(laneGraph.nodes) || !Array.isArray(laneGraph.edges)) {
          throw new Error('Lane graph nodes and edges must be arrays.');
        }

        if (laneGraph.trafficSignals !== undefined) {
          validateTrafficSignalMetadata(laneGraph.trafficSignals);
        }

        const nodeIds = new Set();
        const nodeTiles = new Set();
        const nodesById = new Map();

        for (const node of laneGraph.nodes) {
          if (!node || typeof node !== 'object' || typeof node.id !== 'string' || node.id.length === 0) {
            throw new Error('Lane graph nodes must have ids.');
          }

          if (nodeIds.has(node.id)) {
            throw new Error(`Lane graph node ${node.id} is duplicated.`);
          }

          nodeIds.add(node.id);
          rejectLaneGraphLegacyFields(`Lane graph node ${node.id}`, node);

          if (!Number.isFinite(node.x) || !Number.isFinite(node.y) || node.x < 0 || node.y < 0 || node.x > GRID_SIZE || node.y > GRID_SIZE) {
            throw new Error(`Lane graph node ${node.id} is outside the map.`);
          }

          if (!node.tile || !inGrid(node.tile.x, node.tile.y)) {
            throw new Error(`Lane graph node ${node.id} must include an in-bounds tile.`);
          }

          const nodeTileKey = tileKey(node.tile.x, node.tile.y);

          if (nodeTiles.has(nodeTileKey)) {
            throw new Error(`Lane graph has more than one node on tile ${nodeTileKey}.`);
          }

          nodeTiles.add(nodeTileKey);

          if (node.x !== node.tile.x + 0.5 || node.y !== node.tile.y + 0.5) {
            throw new Error(`Lane graph node ${node.id} must be centered on its tile.`);
          }

          if (!LANE_GRAPH_DIRECTIONS.includes(node.direction)) {
            throw new Error(`Lane graph node ${node.id} has an invalid direction.`);
          }

          nodesById.set(node.id, node);
        }

        const edgeIds = new Set();

        for (const edge of laneGraph.edges) {
          if (!edge || typeof edge !== 'object' || typeof edge.id !== 'string' || edge.id.length === 0) {
            throw new Error('Lane graph edges must have ids.');
          }

          if (edgeIds.has(edge.id)) {
            throw new Error(`Lane graph edge ${edge.id} is duplicated.`);
          }

          edgeIds.add(edge.id);
          rejectLaneGraphLegacyFields(`Lane graph edge ${edge.id}`, edge);

          const fromNode = nodesById.get(edge.from);
          const toNode = nodesById.get(edge.to);

          if (!fromNode || !toNode) {
            throw new Error(`Lane graph edge ${edge.id} references a missing node.`);
          }

          if (!LANE_GRAPH_EDGE_TYPES.includes(edge.type)) {
            throw new Error(`Lane graph edge ${edge.id} has an invalid type.`);
          }

          if (!LANE_GRAPH_DIRECTIONS.includes(edge.direction)) {
            throw new Error(`Lane graph edge ${edge.id} has an invalid direction.`);
          }

          if (edge.type === 'lane' && edge.turn !== null && edge.turn !== undefined) {
            throw new Error(`Lane graph lane edge ${edge.id} must not include a turn type.`);
          }

          if (edge.type === 'turn' && !LANE_GRAPH_TURN_TYPES.includes(edge.turn)) {
            throw new Error(`Lane graph turn edge ${edge.id} must include a valid turn type.`);
          }

          const expectedDirection = cardinalLaneDirection(fromNode.tile, toNode.tile);

          if (!expectedDirection) {
            throw new Error(`Lane graph edge ${edge.id} must connect neighboring tiles.`);
          }

          if (edge.direction !== expectedDirection) {
            throw new Error(`Lane graph edge ${edge.id} direction does not match its tile order.`);
          }

          if (!Number.isFinite(edge.speedLimit) || edge.speedLimit <= 0) {
            throw new Error(`Lane graph edge ${edge.id} speedLimit must be positive.`);
          }

          if (!Array.isArray(edge.path) || edge.path.length !== 2) {
            throw new Error(`Lane graph edge ${edge.id} must contain exactly two path points.`);
          }

          for (const point of edge.path) {
            if (!Array.isArray(point) || point.length !== 2 || !Number.isFinite(point[0]) || !Number.isFinite(point[1])) {
              throw new Error(`Lane graph edge ${edge.id} has an invalid path point.`);
            }
          }

          if (edge.path[0][0] !== fromNode.x ||
              edge.path[0][1] !== fromNode.y ||
              edge.path[1][0] !== toNode.x ||
              edge.path[1][1] !== toNode.y) {
            throw new Error(`Lane graph edge ${edge.id} path must connect its centered endpoint nodes.`);
          }
        }
      }

      function validateTrafficSignalMetadata(trafficSignals) {
        if (!trafficSignals || typeof trafficSignals !== 'object' || Array.isArray(trafficSignals)) {
          throw new Error('Traffic signal metadata must be an object.');
        }

        if (trafficSignals.encoding !== TRAFFIC_SIGNAL_ENCODING) {
          throw new Error(`Traffic signal encoding must be ${TRAFFIC_SIGNAL_ENCODING}.`);
        }

        if (!Array.isArray(trafficSignals.overrides)) {
          throw new Error('Traffic signal overrides must be an array.');
        }

        const overrideIds = new Set();

        for (let index = 0; index < trafficSignals.overrides.length; index += 1) {
          normalizeTrafficSignalOverride(trafficSignals.overrides[index], index, overrideIds);
        }
      }

      function rejectLaneGraphLegacyFields(subject, value) {
        for (const field of ['axis', 'laneIndex', 'laneCount', 'bandId', 'layer', 'orientation']) {
          if (Object.prototype.hasOwnProperty.call(value, field)) {
            throw new Error(`${subject} includes unsupported legacy field ${field}.`);
          }
        }
      }

      async function loadDefaultTextureAssets() {
        if (!state.config.defaultAtlasUrl || !state.config.defaultTextureManifestUrl) {
          return;
        }

        const manifest = await fetchJson(state.config.defaultTextureManifestUrl);
        validateTextureManifest(manifest);
        const atlasDataUrl = await fetchDataUrl(state.config.defaultAtlasUrl, 'default texture atlas');
        state.atlasImage = await loadImage(atlasDataUrl);
        state.atlasDataUrl = atlasDataUrl;
        state.atlasFileName = state.config.defaultAtlasPath || manifest.atlas.file || 'default texture atlas';
        state.textureManifest = manifest;
        state.textureManifestFileName = state.config.defaultTextureManifestPath || 'manifest.json';
        state.map.textureSet = manifest.name || state.map.textureSet || DEFAULT_TEXTURE_SET;
        state.image = renderTextureMapImage(state.map.textureRows, state.textureManifest, state.atlasImage);
        state.map.visualSource = state.atlasFileName;
      }

      function installEvents() {
        window.addEventListener('resize', () => {
          resizeCanvas();
          draw();
        });

        canvas.addEventListener('contextmenu', (event) => event.preventDefault());
        canvas.addEventListener('wheel', onWheel, { passive: false });
        canvas.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
        window.addEventListener('pointercancel', endPointerAction);
        window.addEventListener('blur', endPointerAction);

        paintLayer.addEventListener('change', () => {
          createLabelButtons();
          updateStats();
          draw();
        });

        for (const element of [brushSize, overlayOpacity, showOverlay, showGrid]) {
          element.addEventListener('input', draw);
          element.addEventListener('change', draw);
        }

        document.getElementById('load-map-folder').addEventListener('click', loadMapFolder);
        document.getElementById('save-map-folder').addEventListener('click', saveMapFolder);
        document.getElementById('reset-defaults').addEventListener('click', resetToDefaults);
        trainButton.addEventListener('click', trainModel);
        predictButton.addEventListener('click', applyLatestPrediction);
        document.getElementById('fit').addEventListener('click', () => {
          fitMap();
          draw();
        });
        document.getElementById('undo').addEventListener('click', undo);
        document.getElementById('redo').addEventListener('click', redo);

        window.addEventListener('keydown', (event) => {
          if (isEditableTarget(event.target)) {
            return;
          }

          if (event.code === 'Space') {
            state.spaceDown = true;
            event.preventDefault();
            return;
          }

          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
            event.preventDefault();
            saveMapFolder();
            return;
          }

          if ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key.toLowerCase() === 'z') {
            event.preventDefault();
            redo();
            return;
          }

          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'z') {
            event.preventDefault();
            undo();
            return;
          }

          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'y') {
            event.preventDefault();
            redo();
            return;
          }

          const key = event.key.toLowerCase();

          if (paintLayer.value === 'laneGraph' && event.key === 'Escape') {
            state.activeLaneSegmentTile = null;
            state.selectedLaneNodeId = null;
            updateStats();
            draw();
            setStatus('Lane segment selection cleared.');
            event.preventDefault();
            return;
          }

          if (paintLayer.value === 'type' && Object.prototype.hasOwnProperty.call(TYPE_KEYS, key)) {
            setSelectedPaintValue(TYPE_KEYS[key]);
            event.preventDefault();
            return;
          }

          if (paintLayer.value === 'building' && Object.prototype.hasOwnProperty.call(BUILDING_KEYS, key)) {
            setSelectedPaintValue(BUILDING_KEYS[key]);
            event.preventDefault();
            return;
          }

          if (paintLayer.value === 'texture' && key === 'p') {
            setSelectedPaintValue('pick');
            event.preventDefault();
            return;
          }

          if (BEHAVIOR_LABELS.includes(paintLayer.value) && Object.prototype.hasOwnProperty.call(BEHAVIOR_KEYS, key)) {
            const value = BEHAVIOR_KEYS[key];
            setSelectedPaintValue(value === null ? '' : String(value));
            event.preventDefault();
          }
        });

        window.addEventListener('keyup', (event) => {
          if (event.code === 'Space') {
            state.spaceDown = false;
          }
        });
      }

      function createLabelButtons() {
        labelButtons.innerHTML = '';
        const layer = paintLayer.value;
        const laneToolValues = new Set(LANE_GRAPH_TOOLS.map((tool) => tool.value));

        if (layer === 'laneGraph' && !laneToolValues.has(state.selectedLaneGraphTool)) {
          state.selectedLaneGraphTool = 'segment';
        }

        const buttons = layer === 'type'
          ? [
              { value: '', label: 'empty', color: null },
              ...TYPE_LABELS.map((label) => ({ value: label, label, color: TYPE_COLORS[label] }))
            ]
          : layer === 'building'
            ? BUILDING_TYPES.map((label) => ({ value: label, label, color: BUILDING_TYPE_COLORS[label] }))
          : layer === 'texture'
            ? [
                { value: 'pick', label: 'pick texture', color: null },
                { value: 'paint', label: texturePaintLabel(), color: null }
              ]
          : layer === 'laneGraph'
            ? LANE_GRAPH_TOOLS.map((tool) => ({ ...tool }))
          : [
              { value: '', label: `${layer}: empty`, color: null },
              { value: 'true', label: `${layer}: true`, color: BEHAVIOR_COLORS.true },
              { value: 'false', label: `${layer}: false`, color: BEHAVIOR_COLORS.false }
            ];

        for (const buttonInfo of buttons) {
          const button = document.createElement('button');
          const swatch = document.createElement('span');
          const text = document.createElement('span');

          swatch.className = 'swatch';
          if (buttonInfo.color) {
            swatch.style.background = buttonInfo.color;
          } else {
            swatch.classList.add('empty');
          }
          text.textContent = buttonInfo.label;
          button.type = 'button';
          button.dataset.value = buttonInfo.value;
          button.appendChild(swatch);
          button.appendChild(text);
          button.addEventListener('click', () => setSelectedPaintValue(buttonInfo.value));
          labelButtons.appendChild(button);
        }

        refreshActiveButton();
      }

      function setSelectedPaintValue(value) {
        if (paintLayer.value === 'type') {
          state.selectedTypeLabel = value === '' ? EMPTY_LABEL_VALUE : value;
        } else if (paintLayer.value === 'building') {
          toggleSelectedBuildingType(value);
        } else if (paintLayer.value === 'texture') {
          if (value === 'paint' && !hasSelectedTexture()) {
            setStatus('Pick a texture from the map before painting texture IDs.', true);
            return;
          }

          state.texturePickMode = value !== 'paint';
        } else if (paintLayer.value === 'laneGraph') {
          if (value === 'new-segment') {
            state.selectedLaneGraphTool = 'segment';
            state.activeLaneSegmentTile = null;
            state.selectedLaneNodeId = null;
            setStatus('Ready for a new lane segment.');
            updateStats();
            draw();
          } else if (value === 'clear') {
            state.selectedLaneGraphTool = 'segment';
            state.activeLaneSegmentTile = null;
            state.selectedLaneNodeId = null;

            if (!applyLaneGraphMutation((graph) => clearLaneGraph(graph), 'Cleared the lane graph.')) {
              updateStats();
              draw();
              setStatus('Lane graph is already empty.');
            }
          } else {
            state.selectedLaneGraphTool = value;
            updateStats();
            draw();
          }
        } else {
          state.selectedBehaviorValue = value === '' ? EMPTY_LABEL_VALUE : value === 'true';
        }

        refreshActiveButton();
      }

      function toggleSelectedBuildingType(type) {
        const current = state.selectedBuildingTypes;
        const existingIndex = current.indexOf(type);

        if (existingIndex === -1) {
          current.push(type);
          return;
        }

        if (current.length === 1) {
          setStatus('Select at least one building type before painting.', true);
          return;
        }

        current.splice(existingIndex, 1);
      }

      function selectedPaintValue() {
        if (paintLayer.value === 'type') {
          return state.selectedTypeLabel ?? '';
        }

        if (paintLayer.value === 'building') {
          return state.selectedBuildingTypes.join('|');
        }

        if (paintLayer.value === 'texture') {
          return state.texturePickMode ? 'pick' : 'paint';
        }

        if (paintLayer.value === 'laneGraph') {
          return state.selectedLaneGraphTool;
        }

        return state.selectedBehaviorValue === null ? '' : String(state.selectedBehaviorValue);
      }

      function texturePaintLabel() {
        return hasSelectedTexture() ? `texture ${state.selectedTextureId}` : 'texture none';
      }

      function refreshActiveButton() {
        const selected = selectedPaintValue();

        for (const button of labelButtons.querySelectorAll('button')) {
          button.classList.toggle('active', paintLayer.value === 'building'
            ? state.selectedBuildingTypes.includes(button.dataset.value)
            : button.dataset.value === selected);
        }
      }

      async function loadMapFolder() {
        endPointerAction();

        try {
          const directoryHandle = await pickMapDirectory();
          await loadMapPackageFromDirectory(directoryHandle);
        } catch (error) {
          if (error.name === 'AbortError') {
            setStatus('Load map folder canceled.');
            return;
          }

          console.error(error);
          setStatus(error.message, true);
        }
      }

      async function loadMapPackageFromDirectory(directoryHandle) {
        setStatus(`Loading map folder ${directoryHandle.name}...`);

        const tileLayout = await readDirectoryJson(directoryHandle, MAP_PACKAGE_FILES.tileLayout);
        const textureLayout = await readDirectoryJson(directoryHandle, MAP_PACKAGE_FILES.textureLayout);
        const manifest = await readDirectoryJson(directoryHandle, MAP_PACKAGE_FILES.manifest);

        validateTextureRowsJson(textureLayout);
        validateTextureManifest(manifest);

        const atlasFileName = manifest.atlas.file;
        const atlasFile = await readDirectoryFile(directoryHandle, atlasFileName);
        const atlasDataUrl = await readBlobAsDataUrl(atlasFile, atlasFileName);
        const atlasImage = await loadImage(atlasDataUrl);
        const nextMap = editableMapFromJson(tileLayout, MAP_PACKAGE_FILES.tileLayout, {
          sourceName: directoryHandle.name,
          visualSource: atlasFileName,
          textureRows: textureLayout.textureRows,
          textureRowsFileName: MAP_PACKAGE_FILES.textureLayout,
          originalTextureLayout: textureLayout
        });

        state.mapDirectoryHandle = directoryHandle;
        state.mapDirectoryName = directoryHandle.name;
        state.atlasImage = atlasImage;
        state.atlasDataUrl = atlasDataUrl;
        state.atlasFileName = atlasFileName;
        state.textureManifest = manifest;
        state.textureManifestFileName = MAP_PACKAGE_FILES.manifest;
        nextMap.textureSet = manifest.name || textureLayout.textureSet || tileLayout.textureSet || nextMap.textureSet || DEFAULT_TEXTURE_SET;

        if (hasSelectedTexture() && !isValidTextureId(state.selectedTextureId)) {
          state.selectedTextureId = null;
          state.texturePickMode = true;
        }

        replaceCurrentMap(nextMap, { fit: true });
        createLabelButtons();
        setStatus(formatTexturePreviewStatus(`Loaded map folder ${directoryHandle.name}.`));
      }

      async function pickMapDirectory() {
        if (!('showDirectoryPicker' in window)) {
          throw new Error('Map folder loading and saving requires a browser with the File System Access API, such as Chrome or Edge on localhost.');
        }

        return window.showDirectoryPicker({ mode: 'readwrite' });
      }

      async function readDirectoryJson(directoryHandle, filePath) {
        const file = await readDirectoryFile(directoryHandle, filePath);

        try {
          return JSON.parse(await file.text());
        } catch (error) {
          throw new Error(`Could not parse ${filePath}: ${error.message}`);
        }
      }

      async function readDirectoryFile(directoryHandle, filePath) {
        const { directory, fileName } = await directoryAtPath(directoryHandle, filePath);
        const fileHandle = await directory.getFileHandle(fileName);
        return fileHandle.getFile();
      }

      async function writeDirectoryText(directoryHandle, filePath, text) {
        const { directory, fileName } = await directoryAtPath(directoryHandle, filePath, { create: true });
        const fileHandle = await directory.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();

        await writable.write(text);
        await writable.close();
      }

      async function directoryAtPath(directoryHandle, filePath, options = {}) {
        const parts = safeRelativePathParts(filePath);
        let directory = directoryHandle;

        for (const part of parts.slice(0, -1)) {
          directory = await directory.getDirectoryHandle(part, { create: Boolean(options.create) });
        }

        return {
          directory,
          fileName: parts.at(-1)
        };
      }

      function safeRelativePathParts(filePath) {
        if (typeof filePath !== 'string' || filePath.length === 0) {
          throw new Error('Map package file paths must be non-empty strings.');
        }

        const parts = filePath.replaceAll('\\', '/').split('/').filter((part) => part.length > 0 && part !== '.');

        if (parts.length === 0 || parts.some((part) => part === '..')) {
          throw new Error(`Invalid map package file path "${filePath}".`);
        }

        return parts;
      }

      async function ensureDirectoryWritable(directoryHandle) {
        const options = { mode: 'readwrite' };

        if (typeof directoryHandle.queryPermission === 'function' && await directoryHandle.queryPermission(options) === 'granted') {
          return;
        }

        if (typeof directoryHandle.requestPermission === 'function' && await directoryHandle.requestPermission(options) === 'granted') {
          return;
        }

        throw new Error(`Write permission was not granted for ${directoryHandle.name}.`);
      }

      function formatTexturePreviewStatus(prefix) {
        const uniqueTextures = countUniqueTextures();

        if (state.atlasImage && state.textureManifest) {
          const overlayHint = showOverlay.checked && paintLayer.value !== 'texture'
            ? ' The current layer overlay may tint subtle texture differences.'
            : '';
          return `${prefix} Rendering ${uniqueTextures} texture IDs from textureRows.${overlayHint}`;
        }

        return `${prefix} Load both an atlas and texture manifest to preview ${uniqueTextures} texture IDs from textureRows.`;
      }

      function refreshVisualFromAssets(options = {}) {
        if (state.atlasImage && state.textureManifest) {
          state.image = renderTextureMapImage(state.map.textureRows, state.textureManifest, state.atlasImage);
          state.map.visualSource = state.atlasFileName || 'loaded atlas';
        } else {
          state.image = state.sourceImage;
          state.map.visualSource = 'source image';
        }

        if (options.fit && state.image) {
          fitMap();
        }

        updateStats();
        draw();
      }

      function editableMapFromJson(payload, fileName, metadata = {}) {
        if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
          throw new Error('Map JSON must be an object.');
        }

        validateEpiCityMap(payload);
        const textureRows = resolveTextureRowsForMap(payload, metadata);
        const behaviorRows = Object.fromEntries(BEHAVIOR_LABELS.map((property) => [property, []]));
        const rows = [];

        for (let y = 0; y < GRID_SIZE; y += 1) {
          const row = [];

          for (let x = 0; x < GRID_SIZE; x += 1) {
            const entry = payload.legend[payload.rows[y][x]];
            row.push(editorTypeForLegendEntry(entry));

            for (const property of BEHAVIOR_LABELS) {
              if (!behaviorRows[property][y]) {
                behaviorRows[property][y] = [];
              }

              behaviorRows[property][y].push(entry[property]);
            }
          }

          rows.push(row);
        }

        if (payload.buildings !== undefined) {
          validateBuildingLayout(payload.buildings, rows);
        }

        const buildings = createBuildingsFromRows(rows, payload.buildings);
        const laneGraph = normalizeLaneGraphLayout(payload.laneGraph);

        return {
          width: GRID_SIZE,
          height: GRID_SIZE,
          tileSize: payload.tileSize,
          textureSet: payload.textureSet || DEFAULT_TEXTURE_SET,
          sourceName: metadata.sourceName || fileName,
          visualSource: metadata.visualSource || 'source image',
          fileName,
          rows,
          behaviorRows,
          buildings,
          laneGraph,
          buildingLookup: createBuildingLookup(buildings),
          textureRows,
          textureRowsFileName: metadata.textureRowsFileName || state.map?.textureRowsFileName || 'texture-layout.json',
          originalTextureLayout: metadata.originalTextureLayout || state.map?.originalTextureLayout || null,
          originalMap: payload
        };
      }

      function resolveTextureRowsForMap(payload, metadata) {
        if (metadata.textureRows) {
          validateTextureRows(metadata.textureRows);
          return cloneTextureRows(metadata.textureRows);
        }

        if (payload.textureRows) {
          throw new Error('Texture rows must be loaded from texture-layout.json.');
        }

        if (state.map && state.map.textureRows) {
          return cloneTextureRows(state.map.textureRows);
        }

        return createDefaultTextureRows();
      }

      function createBuildingsFromRows(rows, previousBuildings = null) {
        validateTypeRows(rows);

        const previousByCell = previousBuildingMetadataByCell(previousBuildings, rows);
        const usedIds = new Set();
        const components = findBuildingComponents(rows);
        const items = components.map((component, index) => {
          const previous = pickPreviousBuildingMetadata(component, previousByCell, usedIds);
          const id = previous ? previous.id : nextBuildingId(index + 1, usedIds);

          usedIds.add(id);

          return {
            id,
            types: previous ? cloneBuildingTypes(previous.types) : [...DEFAULT_BUILDING_TYPES],
            ...(previous && previous.entrance ? { entrance: { ...previous.entrance } } : {}),
            spans: spansForBuildingCells(component.cells)
          };
        });

        return {
          encoding: BUILDING_LAYOUT_ENCODING,
          defaultTypes: [...DEFAULT_BUILDING_TYPES],
          items
        };
      }

      function findBuildingComponents(rows) {
        const visited = new Uint8Array(GRID_SIZE * GRID_SIZE);
        const components = [];

        for (let y = 0; y < GRID_SIZE; y += 1) {
          for (let x = 0; x < GRID_SIZE; x += 1) {
            const startIndex = gridIndex(x, y);

            if (visited[startIndex] || rows[y][x] !== 'building') {
              continue;
            }

            const queue = [[x, y]];
            const cells = [];
            visited[startIndex] = 1;

            for (let cursor = 0; cursor < queue.length; cursor += 1) {
              const [cx, cy] = queue[cursor];
              cells.push([cx, cy]);

              for (let dy = -1; dy <= 1; dy += 1) {
                for (let dx = -1; dx <= 1; dx += 1) {
                  if (dx === 0 && dy === 0) {
                    continue;
                  }

                  const nx = cx + dx;
                  const ny = cy + dy;

                  if (!inGrid(nx, ny)) {
                    continue;
                  }

                  const nextIndex = gridIndex(nx, ny);

                  if (!visited[nextIndex] && rows[ny][nx] === 'building') {
                    visited[nextIndex] = 1;
                    queue.push([nx, ny]);
                  }
                }
              }
            }

            components.push({ seedX: x, seedY: y, cells });
          }
        }

        return components;
      }

      function previousBuildingMetadataByCell(buildings, rows) {
        const byCell = new Map();

        if (buildings === undefined || buildings === null) {
          return byCell;
        }

        validateBuildingLayout(buildings, rows, { checkRows: false });
        const defaultTypes = defaultBuildingTypesForLayout(buildings);

        for (const building of buildings.items) {
          for (const [y, x, length] of building.spans) {
            for (let offset = 0; offset < length; offset += 1) {
              byCell.set(tileKey(x + offset, y), {
                id: building.id,
                types: buildingTypesForBuilding(building, defaultTypes),
                entrance: building.entrance ? { ...building.entrance } : null
              });
            }
          }
        }

        return byCell;
      }

      function validateBuildingLayout(buildings, rows, options = {}) {
        const checkRows = options.checkRows !== false;

        if (!buildings || typeof buildings !== 'object' || Array.isArray(buildings)) {
          throw new Error('Map buildings must be an object when present.');
        }

        if (buildings.encoding !== BUILDING_LAYOUT_ENCODING) {
          throw new Error(`Map buildings.encoding must be "${BUILDING_LAYOUT_ENCODING}".`);
        }

        const defaultTypes = defaultBuildingTypesForLayout(buildings);

        if (!Array.isArray(buildings.items)) {
          throw new Error('Map buildings.items must be an array.');
        }

        const covered = new Int32Array(GRID_SIZE * GRID_SIZE);
        const ids = new Set();
        covered.fill(-1);

        for (let buildingIndex = 0; buildingIndex < buildings.items.length; buildingIndex += 1) {
          const building = buildings.items[buildingIndex];

          if (!building || typeof building !== 'object' || Array.isArray(building)) {
            throw new Error(`Building ${buildingIndex} must be an object.`);
          }

          if (typeof building.id !== 'string' || building.id.length === 0) {
            throw new Error(`Building ${buildingIndex} must have a non-empty id.`);
          }

          if (ids.has(building.id)) {
            throw new Error(`Duplicate building id "${building.id}".`);
          }

          buildingTypesForBuilding(building, defaultTypes);

          if (!Array.isArray(building.spans) || building.spans.length === 0) {
            throw new Error(`Building "${building.id}" must have non-empty spans.`);
          }

          ids.add(building.id);

          for (const span of building.spans) {
            if (!Array.isArray(span) || span.length !== 3 || span.some((value) => !Number.isInteger(value))) {
              throw new Error(`Building "${building.id}" spans must be [y, x, length].`);
            }

            const [y, x, length] = span;

            if (!inGrid(x, y) || length <= 0 || x + length > GRID_SIZE) {
              throw new Error(`Building "${building.id}" has an out-of-bounds span.`);
            }
