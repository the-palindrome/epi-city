<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Epi City</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ffffff;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #ffffff;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        touch-action: none;
      }

      #status {
        position: fixed;
        top: 16px;
        left: 16px;
        max-width: min(480px, calc(100vw - 32px));
        padding: 10px 12px;
        border: 1px solid #d8d8d8;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        color: #242424;
        font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        pointer-events: none;
      }

      #status.hidden {
        display: none;
      }

      #status.error {
        border-color: #d77a7a;
        color: #8f2020;
      }

      #debug-dashboard {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 220px;
        padding: 12px;
        border: 1px solid rgba(40, 48, 36, 0.28);
        border-radius: 10px;
        background: rgba(248, 250, 244, 0.94);
        box-shadow: 0 12px 36px rgba(20, 24, 18, 0.16);
        color: #20261d;
        font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        user-select: none;
        z-index: 2;
      }

      #debug-dashboard.hidden {
        display: none;
      }

      .dashboard-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .dashboard-shortcut {
        padding: 1px 6px 2px;
        border: 1px solid rgba(40, 48, 36, 0.22);
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.62);
        color: #526044;
        font-size: 11px;
        font-weight: 600;
        text-transform: none;
      }

      .dashboard-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 0;
        cursor: pointer;
      }

      .dashboard-toggle input {
        width: 14px;
        height: 14px;
        accent-color: #2c9a54;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading city...</div>
    <div id="debug-dashboard" class="hidden" aria-label="Debug dashboard"></div>
    <script src="https://pixijs.download/release/pixi.min.js"></script>
    <script>
      // Stable numeric tile IDs keep the renderer and pathfinder on compact typed arrays.
      const TILE_TYPES = Object.freeze({
        road: 0,
        sidewalk: 1,
        water: 2,
        bridge: 3,
        building: 4
      });

      // Names mirror TILE_TYPES order and are returned by the public getTile() helper.
      const TILE_NAMES = Object.freeze([
        'road',
        'sidewalk',
        'water',
        'bridge',
        'building'
      ]);

      const CATEGORY_TO_TILE = Object.freeze({
        road: TILE_TYPES.road,
        sidewalk: TILE_TYPES.sidewalk,
        water: TILE_TYPES.water,
        bridge: TILE_TYPES.bridge,
        building: TILE_TYPES.building
      });

      const TEXTURE_SET_PATHS = Object.freeze({
        gta: './assets/textures/gta/manifest.json'
      });

      const PIXEL_ART_SCALE_MODE = 'nearest';

      const MOVEMENT_PROPERTY_BY_MODE = Object.freeze({
        pedestrian: 'walkable',
        vehicle: 'drivable'
      });

      const NPC_CONFIG = Object.freeze({
        count: 1000,
        tileCapacity: 2,
        slotSpacing: 11,
        color: 0xe5c748,
        size: 9,
        minSpeed: 34,
        maxSpeed: 58
      });

      const DASHBOARD_OVERLAYS = Object.freeze([
        { id: 'tileType', label: 'overlay tile type', kind: 'tileType' },
        { id: 'walkable', label: 'overlay walkable', layer: 'tileWalkable' },
        { id: 'parkable', label: 'overlay parkable', layer: 'tileParkable' },
        { id: 'drivable', label: 'overlay drivable', layer: 'tileDrivable' }
      ]);

      const DEBUG_OVERLAY_COLORS = Object.freeze({
        enabled: 0x35d46f,
        disabled: 0xe3504f,
        enabledAlpha: 0.42,
        disabledAlpha: 0.34
      });

      const TILE_TYPE_OVERLAY_COLORS = Object.freeze({
        sidewalk: 0x9aa09a,
        road: 0x151a16,
        park: 0x4fa43d,
        water: 0x0786c8,
        bridge: 0x80663f,
        building: 0x5f6762,
        alpha: 0.86
      });

      // A* uses integer movement costs: 10 for cardinal movement, 14 for diagonals.
      const DIRECTIONS = Object.freeze([
        { dx: 1, dy: 0, cost: 10 },
        { dx: -1, dy: 0, cost: 10 },
        { dx: 0, dy: 1, cost: 10 },
        { dx: 0, dy: -1, cost: 10 },
        { dx: 1, dy: 1, cost: 14 },
        { dx: 1, dy: -1, cost: 14 },
        { dx: -1, dy: 1, cost: 14 },
        { dx: -1, dy: -1, cost: 14 }
      ]);

      const SPRITE_COLORS = Object.freeze({
        asphalt: 0x252a25,
        asphaltEdge: 0x151a16,
        crosswalk: 0xd8d2b6,
        laneMarking: 0x98a12c,
        sidewalk: 0xaeb5a7,
        sidewalkEdge: 0x7b8578,
        curb: 0x526044,
        buildingEdge: 0x3f4a32,
        water: 0x0786c8,
        waterEdge: 0x006da8,
        bank: 0x5f7734,
        bridge: 0x4a473a,
        bridgeRail: 0x80663f,
        building: 0x747d78,
        park: 0x83a944,
        parkEdge: 0x4f6d2d
      });

      configurePixelArtRendering();

      async function main() {
        const status = document.getElementById('status');
        const app = new PIXI.Application();

        function setStatus(message, isError = false) {
          status.textContent = message;
          status.classList.toggle('error', isError);
          status.classList.toggle('hidden', !message);
        }

        try {
          await app.init({
            background: '#ffffff',
            resizeTo: window,
            autoDensity: true,
            antialias: false,
            roundPixels: true,
            resolution: window.devicePixelRatio || 1
          });

          app.renderer.roundPixels = true;
          document.body.appendChild(app.canvas);

          const world = new PIXI.Container();
          const mapLayer = new PIXI.Container();
          const overlayLayer = new PIXI.Container();
          const actorLayer = new PIXI.Container();

          world.addChild(mapLayer);
          world.addChild(overlayLayer);
          world.addChild(actorLayer);
          app.stage.addChild(world);

          const camera = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            zoom: 1,
            minZoom: 0.08,
            maxZoom: 8,
            worldWidth: 0,
            worldHeight: 0
          };

          function applyCamera() {
            constrainCamera(camera);
            world.position.set(camera.x, camera.y);
            world.scale.set(camera.zoom);
          }

          function centerCameraOnCity(city) {
            const worldWidth = city.width * city.tileSize;
            const worldHeight = city.height * city.tileSize;

            camera.worldWidth = worldWidth;
            camera.worldHeight = worldHeight;
            refreshCameraZoomBounds(camera);
            camera.zoom = camera.minZoom;
            camera.x = window.innerWidth / 2 - (worldWidth * camera.zoom) / 2;
            camera.y = window.innerHeight / 2 - (worldHeight * camera.zoom) / 2;
            applyCamera();
          }

          window.citySim = {
            app,
            camera,
            world,
            layers: {
              map: mapLayer,
              overlays: overlayLayer,
              actors: actorLayer
            },
            tileTypes: TILE_TYPES,
            tileNames: TILE_NAMES,
            applyCamera
          };

          applyCamera();
          installCameraControls(app, camera, applyCamera);

          // Keep map data pre-generated so the app has a stable, fast startup path.
          const mapData = await loadCityMap('./liberty-city.json');
          const city = compileCityMap(mapData);
          let textureSet = await loadTextureSet(city.textureSetName);

          renderCity(city, mapLayer, textureSet);
          centerCameraOnCity(city);
          const dashboard = installDebugDashboard(city, overlayLayer);
          const npcSimulation = createNpcSimulation(city, actorLayer, app, NPC_CONFIG);

          async function setTextureSet(name) {
            textureSet = await loadTextureSet(name);
            city.textureSetName = name;
            renderCity(city, mapLayer, textureSet);
            window.citySim.textureSet = textureSet;
          }

          Object.assign(window.citySim, {
            city,
            mapData,
            textureSet,
            dashboard,
            npcSimulation,
            npcs: npcSimulation.npcs,
            loadCityMap,
            loadTextureSet,
            setTextureSet,
            validateCityMap,
            compileCityMap,
            renderCity: () => renderCity(city, mapLayer, textureSet),
            centerCameraOnCity: () => centerCameraOnCity(city)
          });

          setStatus('');
        } catch (error) {
          console.error(error);
          setStatus(`${error.message} If you opened this as a file, run npm run dev and load http://localhost:5173 instead.`, true);
        }
      }

      function installCameraControls(app, camera, applyCamera) {
        let isPanning = false;
        let lastPointer = { x: 0, y: 0 };

        app.canvas.addEventListener('contextmenu', (event) => {
          event.preventDefault();
        });

        app.canvas.addEventListener('mousedown', (event) => {
          if (event.button !== 0) {
            return;
          }

          event.preventDefault();
          isPanning = true;
          lastPointer = { x: event.clientX, y: event.clientY };
        });

        window.addEventListener('mousemove', (event) => {
          if (!isPanning) {
            return;
          }

          const dx = event.clientX - lastPointer.x;
          const dy = event.clientY - lastPointer.y;

          camera.x += dx;
          camera.y += dy;
          lastPointer = { x: event.clientX, y: event.clientY };
          applyCamera();
        });

        window.addEventListener('mouseup', (event) => {
          if (event.button === 0) {
            isPanning = false;
          }
        });

        app.canvas.addEventListener('wheel', (event) => {
          event.preventDefault();

          const pointer = canvasPoint(app.canvas, event);
          const worldX = (pointer.x - camera.x) / camera.zoom;
          const worldY = (pointer.y - camera.y) / camera.zoom;
          const zoomFactor = Math.exp(-event.deltaY * 0.001);
          refreshCameraZoomBounds(camera);
          const nextZoom = clamp(camera.zoom * zoomFactor, camera.minZoom, camera.maxZoom);

          camera.x = pointer.x - worldX * nextZoom;
          camera.y = pointer.y - worldY * nextZoom;
          camera.zoom = nextZoom;
          applyCamera();
        }, { passive: false });

        window.addEventListener('resize', () => {
          applyCamera();
        });
      }

      function refreshCameraZoomBounds(camera) {
        if (!camera.worldWidth || !camera.worldHeight) {
          return;
        }

        // The minimum zoom covers the full viewport, preventing white canvas from showing.
        camera.minZoom = Math.max(
          window.innerWidth / camera.worldWidth,
          window.innerHeight / camera.worldHeight
        );

        if (camera.maxZoom < camera.minZoom) {
          camera.maxZoom = camera.minZoom;
        }

        camera.zoom = clamp(camera.zoom, camera.minZoom, camera.maxZoom);
      }

      function constrainCamera(camera) {
        if (!camera.worldWidth || !camera.worldHeight) {
          return;
        }

        refreshCameraZoomBounds(camera);

        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const scaledWorldWidth = camera.worldWidth * camera.zoom;
        const scaledWorldHeight = camera.worldHeight * camera.zoom;

        camera.x = constrainAxis(camera.x, viewportWidth, scaledWorldWidth);
        camera.y = constrainAxis(camera.y, viewportHeight, scaledWorldHeight);
      }

      function constrainAxis(position, viewportSize, scaledWorldSize) {
        if (scaledWorldSize <= viewportSize) {
          return (viewportSize - scaledWorldSize) / 2;
        }

        return clamp(position, viewportSize - scaledWorldSize, 0);
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function canvasPoint(canvas, event) {
        const bounds = canvas.getBoundingClientRect();

        return {
          x: event.clientX - bounds.left,
          y: event.clientY - bounds.top
        };
      }

      function installDebugDashboard(city, overlayLayer) {
        const dashboard = document.getElementById('debug-dashboard');
        const overlayState = Object.fromEntries(DASHBOARD_OVERLAYS.map((overlay) => [overlay.id, false]));
        const controls = new Map();

        dashboard.innerHTML = '';
        dashboard.appendChild(createDashboardTitle());

        for (const overlay of DASHBOARD_OVERLAYS) {
          const control = createOverlayToggle(overlay);

          controls.set(overlay.id, control.input);
          dashboard.appendChild(control.label);

          control.input.addEventListener('change', () => {
            setOverlay(overlay.id, control.input.checked);
          });
        }

        function render() {
          renderDebugOverlays(city, overlayLayer, overlayState);
        }

        function setOverlay(id, enabled) {
          if (!Object.prototype.hasOwnProperty.call(overlayState, id)) {
            throw new Error(`Unknown debug overlay "${id}".`);
          }

          overlayState[id] = Boolean(enabled);
          controls.get(id).checked = overlayState[id];
          render();
        }

        function toggleDashboard(force) {
          const shouldHide = typeof force === 'boolean' ? !force : !dashboard.classList.contains('hidden');
          dashboard.classList.toggle('hidden', shouldHide);
        }

        function onKeyDown(event) {
          if (event.defaultPrevented || event.repeat || event.altKey || event.ctrlKey || event.metaKey) {
            return;
          }

          if (event.key.toLowerCase() !== 'd' || isEditableTarget(event.target)) {
            return;
          }

          event.preventDefault();
          toggleDashboard();
        }

        document.addEventListener('keydown', onKeyDown);

        return {
          element: dashboard,
          overlays: overlayState,
          setOverlay,
          toggle: toggleDashboard,
          render,
          destroy() {
            document.removeEventListener('keydown', onKeyDown);
            clearPixiContainer(overlayLayer);
            dashboard.innerHTML = '';
          }
        };
      }

      function createDashboardTitle() {
        const title = document.createElement('div');
        const shortcut = document.createElement('span');

        title.className = 'dashboard-title';
        title.textContent = 'Dashboard';
        shortcut.className = 'dashboard-shortcut';
        shortcut.textContent = 'D';
        title.appendChild(shortcut);

        return title;
      }

      function createOverlayToggle(overlay) {
        const label = document.createElement('label');
        const input = document.createElement('input');
        const text = document.createElement('span');

        label.className = 'dashboard-toggle';
        input.type = 'checkbox';
        input.dataset.overlayToggle = overlay.id;
        text.textContent = overlay.label;

        label.appendChild(input);
        label.appendChild(text);

        return { label, input };
      }

      function isEditableTarget(target) {
        if (!target || !target.tagName) {
          return false;
        }

        if (target.tagName === 'INPUT' && target.type === 'checkbox') {
          return false;
        }

        return target.isContentEditable || ['INPUT', 'TEXTAREA', 'SELECT'].includes(target.tagName);
      }

      function renderDebugOverlays(city, overlayLayer, overlayState) {
        clearPixiContainer(overlayLayer);

        for (const overlay of DASHBOARD_OVERLAYS) {
          if (!overlayState[overlay.id]) {
            continue;
          }

          const layer = new PIXI.Container();

          layer.eventMode = 'none';

          if (overlay.kind === 'tileType') {
            drawTileTypeOverlay(city, layer);
          } else {
            drawBehaviorOverlay(city, layer, city[overlay.layer]);
          }

          overlayLayer.addChild(layer);
        }
      }

      function drawTileTypeOverlay(city, layer) {
        const chunkSize = 16;

        for (let chunkY = 0; chunkY < city.height; chunkY += chunkSize) {
          for (let chunkX = 0; chunkX < city.width; chunkX += chunkSize) {
            const graphics = new PIXI.Graphics();

            graphics.eventMode = 'none';

            for (let y = chunkY; y < Math.min(city.height, chunkY + chunkSize); y += 1) {
              for (let x = chunkX; x < Math.min(city.width, chunkX + chunkSize); x += 1) {
                const color = getTileTypeOverlayColor(city, x, y);

                fillRect(graphics, x * city.tileSize, y * city.tileSize, city.tileSize, city.tileSize, color, TILE_TYPE_OVERLAY_COLORS.alpha);
              }
            }

            layer.addChild(graphics);
          }
        }
      }

      function getTileTypeOverlayColor(city, x, y) {
        const variant = city.getTileVariant(x, y);

        if (variant.category === 'sidewalk' && variant.subcategory === 'park') {
          return TILE_TYPE_OVERLAY_COLORS.park;
        }

        return TILE_TYPE_OVERLAY_COLORS[variant.category] || TILE_TYPE_OVERLAY_COLORS.building;
      }

      function drawBehaviorOverlay(city, layer, propertyLayer) {
        const chunkSize = 16;

        for (let chunkY = 0; chunkY < city.height; chunkY += chunkSize) {
          for (let chunkX = 0; chunkX < city.width; chunkX += chunkSize) {
            const graphics = new PIXI.Graphics();

            graphics.eventMode = 'none';

            for (let y = chunkY; y < Math.min(city.height, chunkY + chunkSize); y += 1) {
              for (let x = chunkX; x < Math.min(city.width, chunkX + chunkSize); x += 1) {
                const index = city.index(x, y);
                const enabled = propertyLayer[index] === 1;
                const color = enabled ? DEBUG_OVERLAY_COLORS.enabled : DEBUG_OVERLAY_COLORS.disabled;
                const alpha = enabled ? DEBUG_OVERLAY_COLORS.enabledAlpha : DEBUG_OVERLAY_COLORS.disabledAlpha;

                fillRect(graphics, x * city.tileSize, y * city.tileSize, city.tileSize, city.tileSize, color, alpha);
              }
            }

            layer.addChild(graphics);
          }
        }
      }

      function clearPixiContainer(container) {
        for (const child of container.removeChildren()) {
          child.destroy({ children: true });
        }
      }

      /**
       * Loads the authoring-format map and validates it before any runtime state is created.
       */
      async function loadCityMap(url) {
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`Could not load ${url}: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        validateCityMap(data);
        return data;
      }

      async function loadTextureSet(name) {
        if (!name) {
          return null;
        }

        const manifestUrl = TEXTURE_SET_PATHS[name];

        if (!manifestUrl) {
          throw new Error(`Unknown texture set "${name}".`);
        }

        const response = await fetch(manifestUrl);

        if (!response.ok) {
          throw new Error(`Could not load ${manifestUrl}: ${response.status} ${response.statusText}`);
        }

        const manifest = await response.json();
        const baseUrl = manifestUrl.slice(0, manifestUrl.lastIndexOf('/') + 1);

        if (!manifest.atlas || typeof manifest.atlas.file !== 'string') {
          throw new Error(`Texture set "${name}" must include an atlas file.`);
        }

        if (!Array.isArray(manifest.frames)) {
          throw new Error(`Texture set "${name}" must include atlas frames.`);
        }

        const atlasTexture = await PIXI.Assets.load(baseUrl + manifest.atlas.file);
        applyNearestSampling(atlasTexture);

        const textureCache = new Array(manifest.frames.length);

        function getTexture(id) {
          if (!Number.isInteger(id) || id < 0 || id >= manifest.frames.length) {
            return null;
          }

          if (!textureCache[id]) {
            const frame = manifest.frames[id];
            textureCache[id] = new PIXI.Texture({
              source: atlasTexture.source,
              frame: new PIXI.Rectangle(frame[0], frame[1], frame[2], frame[3])
            });
            applyNearestSampling(textureCache[id]);
          }

          return textureCache[id];
        }

        return {
          name: manifest.name || name,
          tileSize: manifest.tileSize,
          atlas: atlasTexture,
          frames: manifest.frames,
          getTexture
        };
      }

      function configurePixelArtRendering() {
        // Pixi defaults to linear filtering. Nearest sampling keeps source pixels sharp while zooming.
        if (PIXI.TextureStyle && PIXI.TextureStyle.defaultOptions) {
          PIXI.TextureStyle.defaultOptions.scaleMode = PIXEL_ART_SCALE_MODE;
          PIXI.TextureStyle.defaultOptions.magFilter = PIXEL_ART_SCALE_MODE;
          PIXI.TextureStyle.defaultOptions.minFilter = PIXEL_ART_SCALE_MODE;
          PIXI.TextureStyle.defaultOptions.mipmapFilter = PIXEL_ART_SCALE_MODE;
        }

        if (PIXI.TextureSource && PIXI.TextureSource.defaultOptions) {
          PIXI.TextureSource.defaultOptions.scaleMode = PIXEL_ART_SCALE_MODE;
          PIXI.TextureSource.defaultOptions.autoGenerateMipmaps = false;
        }
      }

      function applyNearestSampling(texture) {
        const source = texture && texture.source;

        if (!source) {
          return;
        }

        source.scaleMode = PIXEL_ART_SCALE_MODE;
        source.magFilter = PIXEL_ART_SCALE_MODE;
        source.minFilter = PIXEL_ART_SCALE_MODE;
        source.mipmapFilter = PIXEL_ART_SCALE_MODE;
        source.autoGenerateMipmaps = false;

        if (source.style && typeof source.style.update === 'function') {
          source.style.update();
        }
      }

      /**
       * Validates map JSON aggressively so bad map data fails with useful messages.
       */
      function validateCityMap(data) {
        if (!data || typeof data !== 'object' || Array.isArray(data)) {
          throw new Error('Map JSON must contain a JSON object.');
        }

        if (!Number.isInteger(data.width) || data.width <= 0) {
          throw new Error('Map JSON width must be a positive integer.');
        }

        if (!Number.isInteger(data.height) || data.height <= 0) {
          throw new Error('Map JSON height must be a positive integer.');
        }

        if (!Number.isInteger(data.tileSize) || data.tileSize <= 0) {
          throw new Error('Map JSON tileSize must be a positive integer.');
        }

        if (typeof data.textureSet !== 'string' || data.textureSet.length === 0) {
          throw new Error('Map JSON textureSet must be a non-empty string.');
        }

        if (!data.legend || typeof data.legend !== 'object' || Array.isArray(data.legend)) {
          throw new Error('Map JSON legend must be an object.');
        }

        const legendEntries = normalizeLegend(data.legend);

        if (!Array.isArray(data.rows) || data.rows.length !== data.height) {
          throw new Error(`Map JSON rows must contain exactly ${data.height} rows.`);
        }

        for (let y = 0; y < data.height; y += 1) {
          const row = data.rows[y];

          if (typeof row !== 'string') {
            throw new Error(`Map JSON row ${y} must be a string.`);
          }

          if (row.length !== data.width) {
            throw new Error(`Map JSON row ${y} must be ${data.width} symbols long.`);
          }

          for (let x = 0; x < data.width; x += 1) {
            if (!legendEntries[row[x]]) {
              throw new Error(`Map JSON has unknown symbol "${row[x]}" at ${x},${y}.`);
            }
          }
        }

        if (!Array.isArray(data.textureRows) || data.textureRows.length !== data.height) {
          throw new Error(`Map JSON textureRows must contain exactly ${data.height} rows.`);
        }

        for (let y = 0; y < data.height; y += 1) {
          const row = data.textureRows[y];

          if (!Array.isArray(row) || row.length !== data.width) {
            throw new Error(`Map JSON texture row ${y} must contain exactly ${data.width} texture IDs.`);
          }

          for (let x = 0; x < data.width; x += 1) {
            if (!Number.isInteger(row[x]) || row[x] < 0) {
              throw new Error(`Map JSON textureRows has invalid texture ID at ${x},${y}.`);
            }
          }
        }
      }

      function normalizeLegend(legend) {
        const entries = {};

        for (const [symbol, value] of Object.entries(legend)) {
          if (symbol.length !== 1) {
            throw new Error(`Map JSON legend symbol "${symbol}" must be one character.`);
          }

          if (!value || typeof value !== 'object' || Array.isArray(value)) {
            throw new Error(`Map JSON legend entry "${symbol}" must be an object.`);
          }

          const category = value.category;

          if (!CATEGORY_TO_TILE.hasOwnProperty(category)) {
            throw new Error(`Map JSON legend entry "${symbol}" has unknown category "${category}".`);
          }

          if (typeof value.subcategory !== 'string' || value.subcategory.length === 0) {
            throw new Error(`Map JSON legend entry "${symbol}" must include a subcategory.`);
          }

          for (const property of ['walkable', 'drivable', 'parkable']) {
            if (typeof value[property] !== 'boolean') {
              throw new Error(`Map JSON legend entry "${symbol}" must include boolean ${property}.`);
            }
          }

          entries[symbol] = {
            category,
            subcategory: value.subcategory,
            walkable: value.walkable,
            drivable: value.drivable,
            parkable: value.parkable
          };
        }

        return entries;
      }

      /**
       * Converts readable row strings into the runtime city API backed by a Uint8Array.
       */
      function compileCityMap(data) {
        const width = data.width;
        const height = data.height;
        const tileSize = data.tileSize;
        const legendEntries = normalizeLegend(data.legend);
        const tiles = new Uint8Array(width * height);
        const tileTextureIds = new Uint32Array(width * height);
        const tileWalkable = new Uint8Array(width * height);
        const tileDrivable = new Uint8Array(width * height);
        const tileParkable = new Uint8Array(width * height);
        const tileLegendSymbols = new Array(width * height);

        for (let y = 0; y < height; y += 1) {
          const row = data.rows[y];
          const textureRow = data.textureRows[y];

          for (let x = 0; x < width; x += 1) {
            const symbol = row[x];
            const entry = legendEntries[symbol];
            const index = indexOf(x, y, width);

            if (!entry) {
              throw new Error(`Map JSON has unknown symbol "${symbol}" at ${x},${y}.`);
            }

            tiles[index] = CATEGORY_TO_TILE[entry.category];
            tileTextureIds[index] = textureRow[x];
            tileWalkable[index] = entry.walkable ? 1 : 0;
            tileDrivable[index] = entry.drivable ? 1 : 0;
            tileParkable[index] = entry.parkable ? 1 : 0;
            tileLegendSymbols[index] = symbol;
          }
        }

        function inBounds(x, y) {
          return Number.isInteger(x) && Number.isInteger(y) && x >= 0 && y >= 0 && x < width && y < height;
        }

        function getTileId(x, y) {
          if (!inBounds(x, y)) {
            return null;
          }

          return tiles[indexOf(x, y, width)];
        }

        function getTile(x, y) {
          const tileId = getTileId(x, y);
          return tileId === null ? null : TILE_NAMES[tileId];
        }

        function getTileVariant(x, y) {
          if (!inBounds(x, y)) {
            return null;
          }

          const index = indexOf(x, y, width);

          return {
            ...legendEntries[tileLegendSymbols[index]],
            textureId: tileTextureIds[index]
          };
        }

        function getTextureId(x, y) {
          if (!inBounds(x, y)) {
            return null;
          }

          return tileTextureIds[indexOf(x, y, width)];
        }

        function getTextureKey(x, y) {
          const textureId = getTextureId(x, y);
          return textureId === null ? null : `tile-${textureId}`;
        }

        const tilePropertyLayers = {
          walkable: tileWalkable,
          drivable: tileDrivable,
          parkable: tileParkable
        };

        function modeProperty(mode) {
          const property = MOVEMENT_PROPERTY_BY_MODE[mode];

          if (!property) {
            throw new Error(`Unknown pathfinding mode "${mode}". Use "pedestrian" or "vehicle".`);
          }

          return property;
        }

        function hasTileProperty(x, y, property) {
          if (!inBounds(x, y)) {
            return false;
          }

          const layer = tilePropertyLayers[property];

          if (!layer) {
            throw new Error(`Unknown tile property "${property}".`);
          }

          return layer[indexOf(x, y, width)] === 1;
        }

        function isPassable(x, y, mode) {
          return hasTileProperty(x, y, modeProperty(mode));
        }

        function canStepWithProperty(fromX, fromY, toX, toY, property) {
          if (!hasTileProperty(toX, toY, property)) {
            return false;
          }

          const dx = toX - fromX;
          const dy = toY - fromY;

          if (property !== 'walkable' && Math.abs(dx) === 1 && Math.abs(dy) === 1) {
            // Vehicles keep stricter corner constraints; pedestrians can use every adjacent walkable tile.
            return hasTileProperty(fromX + dx, fromY, property) && hasTileProperty(fromX, fromY + dy, property);
          }

          return true;
        }

        function neighbors(x, y, mode) {
          const property = modeProperty(mode);
          const result = [];

          if (!hasTileProperty(x, y, property)) {
            return result;
          }

          for (const direction of DIRECTIONS) {
            const nx = x + direction.dx;
            const ny = y + direction.dy;

            if (canStepWithProperty(x, y, nx, ny, property)) {
              result.push({ x: nx, y: ny, cost: direction.cost });
            }
          }

          return result;
        }

        function nearestPassableTile(x, y, mode, maxRadius = Math.max(width, height)) {
          const property = modeProperty(mode);
          const startX = clamp(Math.round(x), 0, width - 1);
          const startY = clamp(Math.round(y), 0, height - 1);

          if (hasTileProperty(startX, startY, property)) {
            return { x: startX, y: startY };
          }

          for (let radius = 1; radius <= maxRadius; radius += 1) {
            const minX = Math.max(0, startX - radius);
            const maxX = Math.min(width - 1, startX + radius);
            const minY = Math.max(0, startY - radius);
            const maxY = Math.min(height - 1, startY + radius);

            for (let yy = minY; yy <= maxY; yy += 1) {
              for (let xx = minX; xx <= maxX; xx += 1) {
                const onRing = xx === minX || xx === maxX || yy === minY || yy === maxY;

                if (onRing && hasTileProperty(xx, yy, property)) {
                  return { x: xx, y: yy };
                }
              }
            }
          }

          return null;
        }

        function findPath(start, end, mode) {
          const property = modeProperty(mode);
          // Simulation callers can pass approximate cells; paths snap to the nearest legal tile.
          const startTile = nearestPassableTile(start.x, start.y, mode);
          const endTile = nearestPassableTile(end.x, end.y, mode);

          if (!startTile || !endTile) {
            return [];
          }

          const startIndex = indexOf(startTile.x, startTile.y, width);
          const endIndex = indexOf(endTile.x, endTile.y, width);

          if (startIndex === endIndex) {
            return [startTile];
          }

          const open = new MinHeap((a, b) => a.f - b.f);
          const closed = new Uint8Array(tiles.length);
          const cameFrom = new Int32Array(tiles.length);
          const gScore = new Float64Array(tiles.length);

          cameFrom.fill(-1);
          gScore.fill(Number.POSITIVE_INFINITY);
          gScore[startIndex] = 0;
          open.push({ index: startIndex, f: octileDistance(startTile.x, startTile.y, endTile.x, endTile.y) });

          while (open.length > 0) {
            const current = open.pop();

            if (closed[current.index]) {
              continue;
            }

            if (current.index === endIndex) {
              return reconstructPath(cameFrom, current.index, width);
            }

            closed[current.index] = 1;

            const currentX = current.index % width;
            const currentY = Math.floor(current.index / width);

            for (const direction of DIRECTIONS) {
              const nextX = currentX + direction.dx;
              const nextY = currentY + direction.dy;

              if (!canStepWithProperty(currentX, currentY, nextX, nextY, property)) {
                continue;
              }

              const nextIndex = indexOf(nextX, nextY, width);

              if (closed[nextIndex]) {
                continue;
              }

              const tentativeScore = gScore[current.index] + direction.cost;

              if (tentativeScore < gScore[nextIndex]) {
                cameFrom[nextIndex] = current.index;
                gScore[nextIndex] = tentativeScore;
                open.push({
                  index: nextIndex,
                  f: tentativeScore + octileDistance(nextX, nextY, endTile.x, endTile.y)
                });
              }
            }
          }

          return [];
        }

        // This object is the stable internal API for upcoming NPC and epidemic systems.
        return {
          width,
          height,
          tileSize,
          textureSetName: data.textureSet,
          tiles,
          tileTextureIds,
          tileWalkable,
          tileDrivable,
          tileParkable,
          legend: legendEntries,
          index: (x, y) => indexOf(x, y, width),
          getTile,
          getTileId,
          getTileVariant,
          getTextureId,
          getTextureKey,
          inBounds,
          isWalkable: (x, y) => hasTileProperty(x, y, 'walkable'),
          isDrivable: (x, y) => hasTileProperty(x, y, 'drivable'),
          isParkable: (x, y) => hasTileProperty(x, y, 'parkable'),
          isPassable,
          neighbors,
          nearestPassableTile,
          findPath
        };
      }

      function indexOf(x, y, width) {
        return y * width + x;
      }

      function octileDistance(ax, ay, bx, by) {
        const dx = Math.abs(ax - bx);
        const dy = Math.abs(ay - by);
        const diagonal = Math.min(dx, dy);
        const straight = Math.max(dx, dy) - diagonal;

        return diagonal * 14 + straight * 10;
      }

      function reconstructPath(cameFrom, endIndex, width) {
        const path = [];
        let current = endIndex;

        while (current !== -1) {
          path.push({
            x: current % width,
            y: Math.floor(current / width)
          });
          current = cameFrom[current];
        }

        path.reverse();
        return path;
      }

      function createNpcSimulation(city, actorLayer, app, config) {
        const graphics = new PIXI.Graphics();
        const occupiedSlots = new Int32Array(city.tiles.length * config.tileCapacity);
        const reservedSlots = new Int32Array(city.tiles.length * config.tileCapacity);
        const spawnSlots = collectNpcSpawnSlots(city, config.tileCapacity);
        const npcs = [];

        occupiedSlots.fill(-1);
        reservedSlots.fill(-1);
        graphics.eventMode = 'none';
        actorLayer.eventMode = 'none';
        actorLayer.addChild(graphics);

        for (let id = 0; id < config.count && spawnSlots.length > 0; id += 1) {
          const spawnSlotIndex = takeRandomArrayItem(spawnSlots);
          const spawnSlot = npcSlotFromIndex(spawnSlotIndex, config.tileCapacity);
          const tileIndex = spawnSlot.tileIndex;
          const tileX = tileIndex % city.width;
          const tileY = Math.floor(tileIndex / city.width);
          const position = tileSlotPosition(city, tileX, tileY, spawnSlot.slot, config);

          occupiedSlots[spawnSlotIndex] = id;
          npcs.push({
            id,
            x: position.x,
            y: position.y,
            tileX,
            tileY,
            tileIndex,
            slot: spawnSlot.slot,
            slotIndex: spawnSlotIndex,
            targetX: position.x,
            targetY: position.y,
            targetTileX: tileX,
            targetTileY: tileY,
            targetTileIndex: tileIndex,
            targetSlot: spawnSlot.slot,
            targetIndex: -1,
            speed: randomBetween(config.minSpeed, config.maxSpeed)
          });
        }

        function update(deltaSeconds) {
          const safeDelta = Math.min(deltaSeconds, 0.1);

          for (const npc of npcs) {
            updateNpc(npc, safeDelta, city, occupiedSlots, reservedSlots, config);
          }

          drawNpcs(graphics, npcs, config);
        }

        const tickerUpdate = (ticker) => {
          update(ticker.deltaMS / 1000);
        };

        app.ticker.add(tickerUpdate);
        drawNpcs(graphics, npcs, config);

        return {
          npcs,
          occupiedSlots,
          reservedSlots,
          tileCapacity: config.tileCapacity,
          graphics,
          update,
          destroy() {
            app.ticker.remove(tickerUpdate);
            graphics.destroy();
          }
        };
      }

      function collectNpcSpawnSlots(city, tileCapacity) {
        const slots = [];

        for (let index = 0; index < city.tileWalkable.length; index += 1) {
          if (city.tileWalkable[index]) {
            for (let slot = 0; slot < tileCapacity; slot += 1) {
              slots.push(npcSlotIndex(index, slot, tileCapacity));
            }
          }
        }

        return slots;
      }

      function updateNpc(npc, deltaSeconds, city, occupiedSlots, reservedSlots, config) {
        if (npc.targetIndex !== -1) {
          moveNpcTowardTarget(npc, deltaSeconds, city, occupiedSlots, reservedSlots, config);
          return;
        }

        chooseNpcNextTile(npc, city, occupiedSlots, reservedSlots, config);
      }

      function moveNpcTowardTarget(npc, deltaSeconds, city, occupiedSlots, reservedSlots, config) {
        const dx = npc.targetX - npc.x;
        const dy = npc.targetY - npc.y;
        const distance = Math.hypot(dx, dy);
        const maxStep = npc.speed * deltaSeconds;

        if (distance <= maxStep || distance === 0) {
          occupiedSlots[npc.slotIndex] = -1;
          reservedSlots[npc.targetIndex] = -1;
          occupiedSlots[npc.targetIndex] = npc.id;
          npc.x = npc.targetX;
          npc.y = npc.targetY;
          npc.tileX = npc.targetTileX;
          npc.tileY = npc.targetTileY;
          npc.tileIndex = npc.targetTileIndex;
          npc.slot = npc.targetSlot;
          npc.slotIndex = npc.targetIndex;
          npc.targetIndex = -1;
          chooseNpcNextTile(npc, city, occupiedSlots, reservedSlots, config);
          return;
        }

        const ratio = maxStep / distance;
        npc.x += dx * ratio;
        npc.y += dy * ratio;
      }

      function chooseNpcNextTile(npc, city, occupiedSlots, reservedSlots, config) {
        const neighbors = city.neighbors(npc.tileX, npc.tileY, 'pedestrian');

        if (neighbors.length === 0) {
          return;
        }

        const start = Math.floor(Math.random() * neighbors.length);

        for (let offset = 0; offset < neighbors.length; offset += 1) {
          const candidate = neighbors[(start + offset) % neighbors.length];
          const targetIndex = city.index(candidate.x, candidate.y);
          const targetSlot = findAvailableNpcSlot(targetIndex, occupiedSlots, reservedSlots, config.tileCapacity);

          if (!targetSlot) {
            continue;
          }

          const target = tileSlotPosition(city, candidate.x, candidate.y, targetSlot.slot, config);

          reservedSlots[targetSlot.slotIndex] = npc.id;
          npc.targetTileX = candidate.x;
          npc.targetTileY = candidate.y;
          npc.targetTileIndex = targetIndex;
          npc.targetSlot = targetSlot.slot;
          npc.targetIndex = targetSlot.slotIndex;
          npc.targetX = target.x;
          npc.targetY = target.y;
          return;
        }
      }

      function findAvailableNpcSlot(tileIndex, occupiedSlots, reservedSlots, tileCapacity) {
        const startSlot = Math.floor(Math.random() * tileCapacity);

        for (let offset = 0; offset < tileCapacity; offset += 1) {
          const slot = (startSlot + offset) % tileCapacity;
          const slotIndex = npcSlotIndex(tileIndex, slot, tileCapacity);

          if (occupiedSlots[slotIndex] === -1 && reservedSlots[slotIndex] === -1) {
            return { slot, slotIndex };
          }
        }

        return null;
      }

      function npcSlotIndex(tileIndex, slot, tileCapacity) {
        return tileIndex * tileCapacity + slot;
      }

      function npcSlotFromIndex(slotIndex, tileCapacity) {
        return {
          tileIndex: Math.floor(slotIndex / tileCapacity),
          slot: slotIndex % tileCapacity
        };
      }

      function tileSlotPosition(city, tileX, tileY, slot, config) {
        const centerX = (tileX + 0.5) * city.tileSize;
        const centerY = (tileY + 0.5) * city.tileSize;
        const offsetIndex = slot - (config.tileCapacity - 1) / 2;

        return {
          x: centerX + offsetIndex * config.slotSpacing,
          y: centerY
        };
      }

      function drawNpcs(graphics, npcs, config) {
        graphics.clear();

        for (const npc of npcs) {
          drawNpcBlob(graphics, npc.x, npc.y, config.size, config.color);
        }
      }

      function drawNpcBlob(graphics, x, y, size, color) {
        const px = Math.round(x - size / 2);
        const py = Math.round(y - size / 2);

        fillRect(graphics, px + 1, py, size - 2, size, color);
        fillRect(graphics, px, py + 2, size, size - 4, color);
      }

      function takeRandomArrayItem(items) {
        const index = Math.floor(Math.random() * items.length);
        const item = items[index];

        items[index] = items[items.length - 1];
        items.pop();

        return item;
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      /**
       * Tiny binary heap used as A*'s priority queue.
       */
      class MinHeap {
        constructor(compare) {
          this.compare = compare;
          this.items = [];
        }

        get length() {
          return this.items.length;
        }

        push(item) {
          this.items.push(item);
          this.bubbleUp(this.items.length - 1);
        }

        pop() {
          const first = this.items[0];
          const last = this.items.pop();

          if (this.items.length > 0) {
            this.items[0] = last;
            this.sinkDown(0);
          }

          return first;
        }

        bubbleUp(index) {
          while (index > 0) {
            const parentIndex = Math.floor((index - 1) / 2);

            if (this.compare(this.items[index], this.items[parentIndex]) >= 0) {
              break;
            }

            this.swap(index, parentIndex);
            index = parentIndex;
          }
        }

        sinkDown(index) {
          while (true) {
            const leftIndex = index * 2 + 1;
            const rightIndex = leftIndex + 1;
            let smallestIndex = index;

            if (leftIndex < this.items.length && this.compare(this.items[leftIndex], this.items[smallestIndex]) < 0) {
              smallestIndex = leftIndex;
            }

            if (rightIndex < this.items.length && this.compare(this.items[rightIndex], this.items[smallestIndex]) < 0) {
              smallestIndex = rightIndex;
            }

            if (smallestIndex === index) {
              break;
            }

            this.swap(index, smallestIndex);
            index = smallestIndex;
          }
        }

        swap(a, b) {
          const temp = this.items[a];
          this.items[a] = this.items[b];
          this.items[b] = temp;
        }
      }

      function renderCity(city, mapLayer, textureSet) {
        clearPixiContainer(mapLayer);

        // Chunks keep the display tree inspectable while grouping nearby sprites.
        const chunkSize = 16;

        for (let chunkY = 0; chunkY < city.height; chunkY += chunkSize) {
          for (let chunkX = 0; chunkX < city.width; chunkX += chunkSize) {
            const chunk = new PIXI.Container();
            let fallbackGraphics = null;

            chunk.eventMode = 'none';

            function fallbackLayer() {
              if (!fallbackGraphics) {
                fallbackGraphics = new PIXI.Graphics();
                fallbackGraphics.eventMode = 'none';
                chunk.addChild(fallbackGraphics);
              }

              return fallbackGraphics;
            }

            for (let y = chunkY; y < Math.min(city.height, chunkY + chunkSize); y += 1) {
              for (let x = chunkX; x < Math.min(city.width, chunkX + chunkSize); x += 1) {
                const index = city.index(x, y);
                const texture = textureSet && textureSet.getTexture(city.tileTextureIds[index]);

                if (texture) {
                  const sprite = new PIXI.Sprite(texture);

                  sprite.eventMode = 'none';
                  sprite.roundPixels = true;
                  sprite.x = x * city.tileSize;
                  sprite.y = y * city.tileSize;
                  sprite.width = city.tileSize;
                  sprite.height = city.tileSize;
                  chunk.addChild(sprite);
                } else {
                  drawFallbackTile(fallbackLayer(), city, x, y);
                }
              }
            }

            mapLayer.addChild(chunk);
          }
        }
      }

      function drawFallbackTile(graphics, city, x, y) {
        const tileId = city.tiles[city.index(x, y)];

        if (tileId === TILE_TYPES.road) {
          drawFallbackRoad(graphics, city, x, y, false);
        } else if (tileId === TILE_TYPES.sidewalk) {
          drawFallbackSidewalk(graphics, city, x, y);
        } else if (tileId === TILE_TYPES.water) {
          drawFallbackWater(graphics, city, x, y);
        } else if (tileId === TILE_TYPES.bridge) {
          drawFallbackRoad(graphics, city, x, y, true);
        } else if (tileId === TILE_TYPES.building) {
          drawFallbackBuilding(graphics, city, x, y);
        }
      }

      function drawFallbackRoad(graphics, city, x, y, isBridge) {
        const t = city.tileSize;
        const px = x * t;
        const py = y * t;

        fillRect(graphics, px, py, t, t, isBridge ? SPRITE_COLORS.bridge : SPRITE_COLORS.asphalt);
        drawFallbackBoundary(graphics, city, x, y, isRoadLikeId, SPRITE_COLORS.asphaltEdge, 2);

        if (!isBridge) {
          drawFallbackRoadLane(graphics, city, x, y);
        }
      }

      function drawFallbackRoadLane(graphics, city, x, y) {
        const t = city.tileSize;
        const px = x * t;
        const py = y * t;
        const horizontal = isRoadLike(city, x - 1, y) || isRoadLike(city, x + 1, y);
        const vertical = isRoadLike(city, x, y - 1) || isRoadLike(city, x, y + 1);

        if (horizontal && !vertical && x % 4 < 2) {
          fillRect(graphics, px + t * 0.25, py + Math.floor(t / 2) - 1, t * 0.5, 2, SPRITE_COLORS.laneMarking, 0.68);
        }

        if (vertical && !horizontal && y % 4 < 2) {
          fillRect(graphics, px + Math.floor(t / 2) - 1, py + t * 0.25, 2, t * 0.5, SPRITE_COLORS.laneMarking, 0.68);
        }
      }

      function drawFallbackSidewalk(graphics, city, x, y) {
        const t = city.tileSize;
        const px = x * t;
        const py = y * t;

        fillRect(graphics, px, py, t, t, SPRITE_COLORS.sidewalk);
        drawFallbackBoundary(graphics, city, x, y, isSidewalkLikeId, SPRITE_COLORS.sidewalkEdge, 1);
      }

      function drawFallbackWater(graphics, city, x, y) {
        const t = city.tileSize;
        const px = x * t;
        const py = y * t;

        fillRect(graphics, px, py, t, t, SPRITE_COLORS.water);
      }

      function drawFallbackBuilding(graphics, city, x, y) {
        const t = city.tileSize;
        const px = x * t;
        const py = y * t;

        fillRect(graphics, px, py, t, t, SPRITE_COLORS.building);
        drawFallbackBoundary(graphics, city, x, y, isBuildingLikeId, SPRITE_COLORS.buildingEdge, 2);
      }

      function drawFallbackBoundary(graphics, city, x, y, sameGroup, color, thickness) {
        const t = city.tileSize;
        const px = x * t;
        const py = y * t;

        if (!matchesTileGroup(city, x - 1, y, sameGroup)) {
          fillRect(graphics, px, py, thickness, t, color);
        }

        if (!matchesTileGroup(city, x + 1, y, sameGroup)) {
          fillRect(graphics, px + t - thickness, py, thickness, t, color);
        }

        if (!matchesTileGroup(city, x, y - 1, sameGroup)) {
          fillRect(graphics, px, py, t, thickness, color);
        }

        if (!matchesTileGroup(city, x, y + 1, sameGroup)) {
          fillRect(graphics, px, py + t - thickness, t, thickness, color);
        }
      }

      function matchesTileGroup(city, x, y, predicate) {
        if (!city.inBounds(x, y)) {
          return false;
        }

        return predicate(city.tiles[city.index(x, y)]);
      }

      function isRoadLikeId(tileId) {
        return tileId === TILE_TYPES.road || tileId === TILE_TYPES.bridge;
      }

      function isSidewalkLikeId(tileId) {
        return tileId === TILE_TYPES.sidewalk;
      }

      function isBuildingLikeId(tileId) {
        return tileId === TILE_TYPES.building;
      }

      function fillRect(graphics, x, y, width, height, color, alpha = 1) {
        graphics.rect(x, y, width, height).fill({ color, alpha });
      }

      function isRoadLike(city, x, y) {
        if (!city.inBounds(x, y)) {
          return false;
        }

        const tileId = city.tiles[city.index(x, y)];
        return tileId === TILE_TYPES.road || tileId === TILE_TYPES.bridge;
      }

      function touchesTile(city, x, y, targetTileId, radius) {
        for (let yy = y - radius; yy <= y + radius; yy += 1) {
          for (let xx = x - radius; xx <= x + radius; xx += 1) {
            if (city.inBounds(xx, yy) && city.tiles[city.index(xx, yy)] === targetTileId) {
              return true;
            }
          }
        }

        return false;
      }

      function isWaterLike(city, x, y) {
        if (!city.inBounds(x, y)) {
          return false;
        }

        const tileId = city.tiles[city.index(x, y)];
        return tileId === TILE_TYPES.water || (tileId === TILE_TYPES.bridge && touchesTile(city, x, y, TILE_TYPES.water, 2));
      }



      main();
    </script>
