<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Epi City</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ffffff;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #ffffff;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        touch-action: none;
      }

      #status {
        position: fixed;
        top: 16px;
        left: 16px;
        max-width: min(480px, calc(100vw - 32px));
        padding: 10px 12px;
        border: 1px solid #d8d8d8;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        color: #242424;
        font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        pointer-events: none;
      }

      #status.hidden {
        display: none;
      }

      #status.error {
        border-color: #d77a7a;
        color: #8f2020;
      }

      #debug-dashboard {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 220px;
        padding: 12px;
        border: 1px solid rgba(40, 48, 36, 0.28);
        border-radius: 10px;
        background: rgba(248, 250, 244, 0.94);
        box-shadow: 0 12px 36px rgba(20, 24, 18, 0.16);
        color: #20261d;
        font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        user-select: none;
        z-index: 2;
      }

      #debug-dashboard.hidden {
        display: none;
      }

      .dashboard-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .dashboard-shortcut {
        padding: 1px 6px 2px;
        border: 1px solid rgba(40, 48, 36, 0.22);
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.62);
        color: #526044;
        font-size: 11px;
        font-weight: 600;
        text-transform: none;
      }

      .dashboard-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 0;
        cursor: pointer;
      }

      .dashboard-toggle input {
        width: 14px;
        height: 14px;
        accent-color: #2c9a54;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading city...</div>
    <div id="debug-dashboard" class="hidden" aria-label="Debug dashboard"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
