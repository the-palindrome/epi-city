<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Epi City Simulation Explorer</title>
    <script src="/vendor/d3.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --panel: rgba(255, 255, 255, 0.9);
        --panel-strong: rgba(255, 255, 255, 0.98);
        --line: rgba(32, 38, 35, 0.18);
        --grid: rgba(32, 38, 35, 0.18);
        --text: #202621;
        --muted: #6b746f;
        --susceptible: #b6b83a;
        --exposed: #f47c2a;
        --infectious: #e1363f;
        --recovered: #07974d;
        --contact: #a9a9a9;
        --infection: #d84c55;
        --active: #f5ecd2;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #edgeCanvas,
      #viz {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      #edgeCanvas {
        z-index: 0;
        display: block;
        pointer-events: none;
      }

      #viz {
        display: block;
        z-index: 1;
        background: transparent;
        cursor: grab;
      }

      #viz:active {
        cursor: grabbing;
      }

      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        min-height: 58px;
        display: grid;
        grid-template-columns: minmax(220px, 0.82fr) minmax(360px, 1.2fr) minmax(440px, 1.36fr);
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-strong);
        backdrop-filter: blur(14px);
        z-index: 4;
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1;
        font-weight: 700;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .source {
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .time-controls {
        display: grid;
        grid-template-columns: auto 190px minmax(220px, 1fr);
        gap: 8px 12px;
        align-items: center;
      }

      label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #bd8800;
      }

      input[type="range"].compact-range {
        width: 92px;
      }

      input[type="checkbox"] {
        width: 14px;
        height: 14px;
        margin: 0;
        accent-color: var(--infection);
      }

      input[type="number"],
      select,
      button,
      .file-control {
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.95);
        color: var(--text);
        font: inherit;
      }

      input[type="number"] {
        width: 84px;
        padding: 0 8px;
      }

      select {
        min-width: 118px;
        padding: 0 28px 0 8px;
      }

      .time-inputs {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .range-separator {
        color: var(--muted);
        font-size: 11px;
      }

      .dual-range {
        position: relative;
        height: 34px;
        min-width: 220px;
      }

      .range-track {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 5px;
        border-radius: 999px;
        background: rgba(32, 38, 35, 0.18);
        transform: translateY(-50%);
      }

      .range-selection {
        position: absolute;
        top: 0;
        bottom: 0;
        border-radius: inherit;
        background: #bd8800;
      }

      .dual-range input[type="range"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 34px;
        margin: 0;
        appearance: none;
        background: transparent;
        pointer-events: none;
      }

      .dual-range input[type="range"]::-webkit-slider-runnable-track {
        height: 5px;
        background: transparent;
      }

      .dual-range input[type="range"]::-moz-range-track {
        height: 5px;
        background: transparent;
      }

      .dual-range input[type="range"]::-webkit-slider-thumb {
        width: 16px;
        height: 16px;
        border: 0;
        border-radius: 50%;
        appearance: none;
        background: #bd8800;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.95);
        cursor: pointer;
        pointer-events: auto;
      }

      .dual-range input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border: 0;
        border-radius: 50%;
        background: #bd8800;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.95);
        cursor: pointer;
        pointer-events: auto;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px 12px;
        min-width: 0;
        flex-wrap: wrap;
      }

      .display-control {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex-wrap: wrap;
      }

      .layout-control {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .graph-settings {
        position: fixed;
        top: 72px;
        right: 12px;
        width: 248px;
        max-height: calc(100vh - 154px);
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        overflow: auto;
        z-index: 3;
      }

      .graph-settings summary {
        min-height: 38px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        color: var(--text);
        cursor: pointer;
        font-weight: 700;
        list-style-position: inside;
      }

      .settings-content {
        padding: 2px 12px 12px;
      }

      .settings-section {
        display: grid;
        gap: 10px;
        padding: 12px 0;
      }

      .settings-section + .settings-section {
        border-top: 1px solid var(--line);
      }

      .settings-section:first-child {
        padding-top: 4px;
      }

      .settings-section:last-child {
        padding-bottom: 0;
      }

      .settings-title {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .settings-field {
        display: grid;
        gap: 6px;
      }

      .settings-field select,
      .settings-field input[type="range"] {
        width: 100%;
      }

      .control-title {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .checkbox-control {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: var(--text);
        font-size: 12px;
        text-transform: none;
        white-space: nowrap;
      }

      button,
      .file-control {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 0 10px;
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover,
      select:hover,
      .file-control:hover {
        border-color: rgba(189, 136, 0, 0.58);
      }

      input[type="file"] {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      body[data-view="contact"] .curve-control,
      body[data-view="seir"] .graph-control,
      body[data-view="seir"] .graph-settings,
      body[data-view="seir"] .stats,
      body[data-view="contact"] .curve-stat {
        display: none;
      }

      body[data-view="seir"] .actions {
        grid-column: 2 / -1;
      }

      .stats {
        position: fixed;
        left: 12px;
        bottom: 70px;
        display: grid;
        grid-template-columns: repeat(4, minmax(86px, auto));
        gap: 8px;
        z-index: 3;
      }

      .stat {
        min-height: 50px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        backdrop-filter: blur(12px);
      }

      .stat b {
        display: block;
        margin-bottom: 2px;
        font-size: 17px;
        line-height: 1;
        letter-spacing: 0;
      }

      .stat span {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      .legend {
        position: fixed;
        right: 12px;
        bottom: 70px;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px 12px;
        max-width: 420px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        z-index: 3;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        white-space: nowrap;
      }

      body[data-view="seir"] .graph-legend-item {
        display: none;
      }

      .swatch {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .swatch-line {
        width: 18px;
        height: 3px;
        border-radius: 999px;
      }

      .view-tabs {
        position: fixed;
        left: 50%;
        bottom: 12px;
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        transform: translateX(-50%);
        z-index: 4;
      }

      .tab-button {
        min-width: 112px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
      }

      .tab-button[aria-selected="true"] {
        background: var(--active);
        color: var(--text);
      }

      .status {
        position: fixed;
        top: 70px;
        left: 50%;
        max-width: min(520px, calc(100vw - 24px));
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--muted);
        transform: translateX(-50%);
        z-index: 5;
      }

      .status[hidden] {
        display: none;
      }

      .tooltip {
        position: fixed;
        min-width: 180px;
        max-width: 280px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.97);
        color: var(--text);
        pointer-events: none;
        transform: translate(12px, 12px);
        z-index: 6;
      }

      .tooltip[hidden] {
        display: none;
      }

      .tooltip b {
        display: block;
        margin-bottom: 4px;
      }

      .tooltip span {
        display: block;
        color: var(--muted);
      }

      .node {
        cursor: pointer;
      }

      .axis path,
      .axis line {
        stroke: #202621;
        stroke-width: 1;
        shape-rendering: crispEdges;
      }

      .axis text {
        fill: var(--text);
        font-size: 12px;
      }

      .grid line {
        stroke: var(--grid);
        shape-rendering: crispEdges;
      }

      .curve-line {
        fill: none;
        stroke-width: 2;
        stroke-linejoin: round;
        stroke-linecap: round;
        vector-effect: non-scaling-stroke;
      }

      @media (max-width: 880px) {
        .topbar {
          grid-template-columns: 1fr;
          gap: 8px;
          align-items: start;
        }

        .time-controls {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: flex-start;
        }

        .layout-control {
          flex-wrap: wrap;
        }

        .graph-settings {
          top: auto;
          right: 12px;
          bottom: 122px;
          left: 12px;
          width: auto;
          max-height: 38vh;
        }

        body[data-view="seir"] .actions {
          grid-column: auto;
        }

        .stats {
          right: 12px;
          bottom: 66px;
          grid-template-columns: repeat(2, minmax(86px, 1fr));
        }

        .legend {
          display: none;
        }
      }
    </style>
  </head>
  <body data-view="contact">
    <canvas id="edgeCanvas" aria-hidden="true"></canvas>
    <svg id="viz" aria-label="Simulation explorer visualization"></svg>
    <div class="topbar">
      <div class="brand">
        <h1>Simulation Explorer</h1>
        <div id="source" class="source">No dataset</div>
      </div>
      <div class="time-controls graph-control">
        <label for="startRange">Time window</label>
        <div class="time-inputs">
          <input id="startNumber" type="number" value="0" min="0" step="1" aria-label="Start time">
          <span class="range-separator">to</span>
          <input id="endNumber" type="number" value="0" min="0" step="1" aria-label="End time">
        </div>
        <div class="dual-range">
          <div class="range-track"><div id="rangeSelection" class="range-selection"></div></div>
          <input id="startRange" type="range" value="0" min="0" max="0" step="1" aria-label="Start time">
          <input id="endRange" type="range" value="0" min="0" max="0" step="1" aria-label="End time">
        </div>
      </div>
      <div class="actions">
        <div class="display-control curve-control" aria-label="Display curves">
          <span class="control-title">Display curves</span>
          <label class="checkbox-control">
            <input id="showSusceptible" type="checkbox" checked>
            Susceptible
          </label>
          <label class="checkbox-control">
            <input id="showExposed" type="checkbox" checked>
            Exposed
          </label>
          <label class="checkbox-control">
            <input id="showInfectious" type="checkbox" checked>
            Infectious
          </label>
          <label class="checkbox-control">
            <input id="showRecovered" type="checkbox" checked>
            Recovered
          </label>
        </div>
        <label class="file-control">
          Load JSON
          <input id="fileInput" type="file" accept="application/json,.json">
        </label>
      </div>
    </div>
    <details id="graphSettings" class="graph-settings" open>
      <summary>Graph settings</summary>
      <div class="settings-content">
        <section class="settings-section" aria-labelledby="layoutSettingsTitle">
          <h2 id="layoutSettingsTitle" class="settings-title">Layout</h2>
          <div class="settings-field">
            <label for="layoutSelect">Graph layout</label>
            <select id="layoutSelect" aria-label="Graph layout">
              <option value="force">Force</option>
              <option value="spherical">Spherical</option>
              <option value="hierarchical">Hierarchical</option>
              <option value="infectionMap">Infection map</option>
            </select>
          </div>
        </section>
        <section class="settings-section" aria-labelledby="edgeSettingsTitle">
          <h2 id="edgeSettingsTitle" class="settings-title">Display edges</h2>
          <label class="checkbox-control">
            <input id="showContacts" type="checkbox" checked>
            Contact
          </label>
          <label class="checkbox-control">
            <input id="showInfections" type="checkbox" checked>
            Infection
          </label>
        </section>
        <section class="settings-section" aria-labelledby="nodeSettingsTitle">
          <h2 id="nodeSettingsTitle" class="settings-title">Display nodes</h2>
          <div class="settings-field">
            <label for="nodeSize">Node size</label>
            <input id="nodeSize" type="range" min="1" max="3" step="0.05" value="1" aria-label="Node size">
          </div>
          <label class="checkbox-control">
            <input id="floatNodes" type="checkbox">
            Float nodes
          </label>
          <div class="settings-field">
            <label for="floatIntensity">Float intensity</label>
            <input id="floatIntensity" type="range" min="0" max="5" step="0.1" value="1" aria-label="Float intensity">
          </div>
        </section>
      </div>
    </details>
    <div id="status" class="status">Load a headless result JSON</div>
    <div class="stats">
      <div class="stat"><b id="nodeCount">0</b><span>NPCs</span></div>
      <div class="stat"><b id="edgeCount">0</b><span>Contacts</span></div>
      <div class="stat"><b id="activeNodeCount">0</b><span>Active NPCs</span></div>
      <div class="stat"><b id="durationLabel">0s</b><span>Window</span></div>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="swatch" style="background: var(--susceptible)"></span>Susceptible</div>
      <div class="legend-item"><span class="swatch" style="background: var(--exposed)"></span>Exposed</div>
      <div class="legend-item"><span class="swatch" style="background: var(--infectious)"></span>Infectious</div>
      <div class="legend-item"><span class="swatch" style="background: var(--recovered)"></span>Recovered</div>
      <div class="legend-item graph-legend-item"><span class="swatch-line" style="background: var(--contact)"></span>Contact</div>
      <div class="legend-item graph-legend-item"><span class="swatch-line" style="background: var(--infection)"></span>Infection</div>
    </div>
    <div class="view-tabs" role="tablist" aria-label="Explorer views">
      <button id="contactGraphTab" class="tab-button" type="button" role="tab" aria-selected="true">Contact graph</button>
      <button id="seirCurveTab" class="tab-button" type="button" role="tab" aria-selected="false">SEIR curve</button>
    </div>
    <div id="tooltip" class="tooltip" hidden></div>

    <script>
      const {
        axisBottom,
        axisLeft,
        curveLinear,
        drag,
        forceCenter,
        forceCollide,
        forceLink,
        forceManyBody,
        forceSimulation,
        format,
        line,
        scaleLinear,
        scaleTime,
        select,
        timeFormat,
        zoom,
        zoomIdentity
      } = d3

      const edgeCanvas = document.getElementById('edgeCanvas')
      const edgeContext = edgeCanvas.getContext('2d')
      const svg = select('#viz')
      const sourceEl = document.getElementById('source')
      const statusEl = document.getElementById('status')
      const startRange = document.getElementById('startRange')
      const endRange = document.getElementById('endRange')
      const rangeSelection = document.getElementById('rangeSelection')
      const startNumber = document.getElementById('startNumber')
      const endNumber = document.getElementById('endNumber')
      const showContactsInput = document.getElementById('showContacts')
      const showInfectionsInput = document.getElementById('showInfections')
      const nodeSizeInput = document.getElementById('nodeSize')
      const floatNodesInput = document.getElementById('floatNodes')
      const floatIntensityInput = document.getElementById('floatIntensity')
      const layoutSelect = document.getElementById('layoutSelect')
      const showSusceptibleInput = document.getElementById('showSusceptible')
      const showExposedInput = document.getElementById('showExposed')
      const showInfectiousInput = document.getElementById('showInfectious')
      const showRecoveredInput = document.getElementById('showRecovered')
      const fileInput = document.getElementById('fileInput')
      const contactGraphTab = document.getElementById('contactGraphTab')
      const seirCurveTab = document.getElementById('seirCurveTab')
      const tooltip = document.getElementById('tooltip')
      const nodeCountEl = document.getElementById('nodeCount')
      const edgeCountEl = document.getElementById('edgeCount')
      const activeNodeCountEl = document.getElementById('activeNodeCount')
      const durationLabelEl = document.getElementById('durationLabel')

      const colorByState = {
        susceptible: '#b6b83a',
        exposed: '#f47c2a',
        infectious: '#e1363f',
        recovered: '#07974d'
      }
      const stateKeys = ['susceptible', 'exposed', 'infectious', 'recovered']
      const stateNames = ['susceptible', 'exposed', 'infectious', 'recovered']
      const colorByStateCode = stateNames.map((stateName) => colorByState[stateName])
      const integerFormat = format(',')

      const root = svg.append('g')
      const graphRoot = root.append('g').attr('class', 'contact-graph')
      const nodeGroup = graphRoot.append('g').attr('class', 'nodes')
      const chartRoot = root.append('g').attr('class', 'seir-chart').style('display', 'none')
      const chartPlotGroup = chartRoot.append('g').attr('class', 'plot')
      const chartGridGroup = chartPlotGroup.append('g').attr('class', 'grid')
      const chartAxisGroup = chartPlotGroup.append('g').attr('class', 'axes')
      const chartLineGroup = chartPlotGroup.append('g').attr('class', 'curves')

      const state = {
        worker: null,
        loading: false,
        loadStartedAt: 0,
        loaded: false,
        npcs: [],
        initialStateCodes: new Int8Array(),
        currentStateCodes: new Int8Array(),
        degrees: new Uint32Array(),
        contactSource: new Int32Array(),
        contactTarget: new Int32Array(),
        contactWeight: new Uint32Array(),
        infectionSource: new Int32Array(),
        infectionTarget: new Int32Array(),
        visibleInfectionPairKeys: new Set(),
        fullInfectionSource: new Int32Array(),
        fullInfectionTarget: new Int32Array(),
        fullInfectionTileX: new Float64Array(),
        fullInfectionTileY: new Float64Array(),
        layout: null,
        layoutMode: 'force',
        seirSeries: null,
        nodeSelection: null,
        selectedNodeIndex: -1,
        selectedNeighborMask: new Uint8Array(),
        selectedContactEdgeCount: 0,
        selectedInfectionEdgeCount: 0,
        renderedNodeX: new Float64Array(),
        renderedNodeY: new Float64Array(),
        activeTab: 'contact',
        minTime: 0,
        maxTime: 0,
        start: 0,
        end: 0,
        showContacts: true,
        showInfections: true,
        nodeSizeScale: 1,
        floatNodes: false,
        floatIntensity: 1,
        showCurves: {
          susceptible: true,
          exposed: true,
          infectious: true,
          recovered: true
        },
        graphTransform: zoomIdentity,
        chartTransform: zoomIdentity,
        simulation: null,
        drawFrame: 0,
        windowFrame: 0,
        windowRequestId: 0,
        workerBusy: false,
        queuedWindow: false,
        maxLayoutLinks: 6000,
        maxVisibleContactEdges: 12000,
        layoutAnimationFrame: 0,
        floatAnimationFrame: 0,
        stats: {
          contactEventCount: 0,
          infectionEventCount: 0,
          activeNodeCount: 0,
          totalContactPairCount: 0,
          visibleContactPairCount: 0
        }
      }

      const graphZoom = zoom()
        .scaleExtent([0.08, 8])
        .on('zoom', (event) => {
          if (state.activeTab === 'contact') {
            state.graphTransform = event.transform
            graphRoot.attr('transform', event.transform)
            scheduleGraphDraw()
          } else {
            state.chartTransform = event.transform
            chartRoot.attr('transform', event.transform)
          }
        })

      svg.call(graphZoom)
      svg.on('click', handleVisualizationClick)
      window.addEventListener('resize', resize)
      startRange.addEventListener('input', () => setWindow(Number(startRange.value), state.end))
      endRange.addEventListener('input', () => setWindow(state.start, Number(endRange.value)))
      startNumber.addEventListener('change', () => setWindow(Number(startNumber.value), state.end))
      endNumber.addEventListener('change', () => setWindow(state.start, Number(endNumber.value)))
      showContactsInput.addEventListener('change', setEdgeDisplay)
      showInfectionsInput.addEventListener('change', setEdgeDisplay)
      nodeSizeInput.addEventListener('input', setNodeSize)
      floatNodesInput.addEventListener('change', setNodeFloatDisplay)
      floatIntensityInput.addEventListener('input', setFloatIntensity)
      layoutSelect.addEventListener('change', () => setGraphLayout(layoutSelect.value))
      showSusceptibleInput.addEventListener('change', setCurveDisplay)
      showExposedInput.addEventListener('change', setCurveDisplay)
      showInfectiousInput.addEventListener('change', setCurveDisplay)
      showRecoveredInput.addEventListener('change', setCurveDisplay)
      contactGraphTab.addEventListener('click', () => setActiveTab('contact'))
      seirCurveTab.addEventListener('click', () => setActiveTab('seir'))
      fileInput.addEventListener('change', loadSelectedFile)
      resize()

      async function loadSelectedFile() {
        const file = fileInput.files?.[0]

        if (!file) {
          return
        }

        state.loading = true
        state.loadStartedAt = performance.now()
        state.loaded = false
        if (state.worker) {
          state.worker.terminate()
          state.worker = null
        }
        resetView()
        sourceEl.textContent = file.name
        setStatus(`Loading ${file.name}`)
        ensureWorker()
        state.worker.postMessage({
          type: 'load',
          file,
          sourceName: file.name,
          maxLayoutLinks: state.maxLayoutLinks,
          maxVisibleContactEdges: state.maxVisibleContactEdges
        })
        fileInput.value = ''
      }

      function ensureWorker() {
        if (state.worker) {
          return
        }

        state.worker = new Worker('/data-worker.js')
        state.worker.onmessage = handleWorkerMessage
        state.worker.onerror = (event) => {
          state.loading = false
          state.workerBusy = false
          setStatus(`Worker error: ${event.message}`)
        }
      }

      function handleWorkerMessage(message) {
        const data = message.data || {}

        if (data.type === 'status') {
          setStatus(data.message)
          return
        }

        if (data.type === 'error') {
          state.loading = false
          state.workerBusy = false
          setStatus(data.message)
          return
        }

        if (data.type === 'loaded') {
          applyLoadedDataset(data)
          return
        }

        if (data.type === 'window') {
          applyWindowData(data)
        }
      }

      function applyLoadedDataset(data) {
        state.npcs = data.npcs.map((npc, index) => ({
          id: npc.id,
          index,
          initialSeirState: npc.initialSeirState,
          initialSeirStateCode: npc.initialSeirStateCode,
          x: Math.cos(index * 2.399963) * Math.sqrt(index + 1) * 9,
          y: Math.sin(index * 2.399963) * Math.sqrt(index + 1) * 9
        }))
        state.initialStateCodes = data.initialStateCodes
        state.currentStateCodes = data.initialStateCodes.slice()
        state.degrees = new Uint32Array(state.npcs.length)
        state.contactSource = new Int32Array()
        state.contactTarget = new Int32Array()
        state.contactWeight = new Uint32Array()
        state.infectionSource = new Int32Array()
        state.infectionTarget = new Int32Array()
        state.visibleInfectionPairKeys = new Set()
        state.selectedNodeIndex = -1
        state.selectedNeighborMask = new Uint8Array(state.npcs.length)
        state.selectedContactEdgeCount = 0
        state.selectedInfectionEdgeCount = 0
        state.renderedNodeX = new Float64Array(state.npcs.length)
        state.renderedNodeY = new Float64Array(state.npcs.length)
        state.fullInfectionSource = data.fullInfectionSource
        state.fullInfectionTarget = data.fullInfectionTarget
        state.fullInfectionTileX = data.fullInfectionTileX
        state.fullInfectionTileY = data.fullInfectionTileY
        state.layout = data.layout
        state.seirSeries = data.seirSeries
        state.minTime = data.minTime
        state.maxTime = data.maxTime
        state.start = data.minTime
        state.end = data.maxTime
        state.graphTransform = centeredTransform()
        state.chartTransform = centeredTransform()
        state.loaded = true
        state.loading = false
        state.stats.totalContactPairCount = data.contactPairCount
        state.stats.visibleContactPairCount = 0
        state.stats.contactEventCount = data.contactCount
        state.stats.activeNodeCount = 0
        state.maxVisibleContactEdges = data.maxVisibleContactEdges || state.maxVisibleContactEdges
        layoutSelect.value = state.layoutMode

        configureControls()
        buildGraph()
        renderChart()
        updateStats()
        applyActiveTransform()
        requestWindowData()
        startFloatingAnimation()
      }

      function resetView() {
        stopFloatingAnimation()
        stopSimulation()
        nodeGroup.selectAll('*').remove()
        chartGridGroup.selectAll('*').remove()
        chartAxisGroup.selectAll('*').remove()
        chartLineGroup.selectAll('*').remove()
        state.nodeSelection = null
        state.npcs = []
        state.loaded = false
        state.currentStateCodes = new Int8Array()
        state.degrees = new Uint32Array()
        state.contactSource = new Int32Array()
        state.contactTarget = new Int32Array()
        state.contactWeight = new Uint32Array()
        state.infectionSource = new Int32Array()
        state.infectionTarget = new Int32Array()
        state.visibleInfectionPairKeys = new Set()
        state.fullInfectionSource = new Int32Array()
        state.fullInfectionTarget = new Int32Array()
        state.fullInfectionTileX = new Float64Array()
        state.fullInfectionTileY = new Float64Array()
        state.selectedNodeIndex = -1
        state.selectedNeighborMask = new Uint8Array()
        state.selectedContactEdgeCount = 0
        state.selectedInfectionEdgeCount = 0
        state.renderedNodeX = new Float64Array()
        state.renderedNodeY = new Float64Array()
        clearCanvas()
        updateStats()
      }

      function buildGraph() {
        stopSimulation()
        nodeGroup.selectAll('*').remove()

        const links = []
        const source = state.layout?.source || new Int32Array()
        const target = state.layout?.target || new Int32Array()
        const count = state.layout?.count || new Uint32Array()

        for (let index = 0; index < source.length; index += 1) {
          links.push({
            source: source[index],
            target: target[index],
            count: count[index]
          })
        }

        state.nodeSelection = nodeGroup.selectAll('circle')
          .data(state.npcs, (node) => node.id)
          .join('circle')
          .attr('class', 'node')
          .attr('r', 3.8)
          .attr('stroke', '#ffffff')
          .attr('stroke-width', 1.1)
          .call(drag()
            .on('start', dragStarted)
            .on('drag', dragged)
            .on('end', dragEnded))
          .on('click', (event, node) => {
            event.stopPropagation()
            selectNode(node.index)
          })
          .on('pointerenter', (event, node) => showNodeTooltip(event, node))
          .on('pointermove', (event, node) => showNodeTooltip(event, node))
          .on('pointerleave', hideTooltip)

        applyNodeStyles()

        if (state.layoutMode === 'force') {
          startForceLayout(links)
        } else {
          applyFixedLayout(state.layoutMode, { animate: false })
        }

        scheduleGraphDraw()
      }

      function startForceLayout(links) {
        stopLayoutAnimation()
        stopSimulation()

        for (const node of state.npcs) {
          node.fx = null
          node.fy = null
        }

        state.simulation = forceSimulation(state.npcs)
          .force('link', forceLink(links).id((node) => node.index).distance((link) => 42 + Math.min(28, Math.log1p(link.count) * 5)).strength(0.08))
          .force('charge', forceManyBody().strength(-46).distanceMax(260))
          .force('collide', forceCollide(5.4))
          .force('center', forceCenter(0, 0))
          .velocityDecay(0.44)
          .alpha(0.9)
          .alphaDecay(0.055)
          .on('tick', scheduleGraphDraw)
      }

      function setGraphLayout(mode) {
        const nextMode = mode === 'spherical' || mode === 'hierarchical' || mode === 'infectionMap' ? mode : 'force'

        if (state.layoutMode === nextMode) {
          return
        }

        state.layoutMode = nextMode
        layoutSelect.value = nextMode

        if (!state.loaded) {
          return
        }

        if (nextMode === 'force') {
          startForceLayout(layoutLinks())
          return
        }

        applyFixedLayout(nextMode, { animate: true })
      }

      function layoutLinks() {
        const links = []
        const source = state.layout?.source || new Int32Array()
        const target = state.layout?.target || new Int32Array()
        const count = state.layout?.count || new Uint32Array()

        for (let index = 0; index < source.length; index += 1) {
          links.push({
            source: source[index],
            target: target[index],
            count: count[index]
          })
        }

        return links
      }

      function applyFixedLayout(mode, { animate }) {
        stopSimulation()
        const positions = mode === 'hierarchical'
          ? hierarchicalPositions()
          : mode === 'infectionMap'
            ? infectionMapPositions()
            : sphericalPositions()

        if (animate) {
          animateNodePositions(positions)
          return
        }

        for (const node of state.npcs) {
          const position = positions[node.index]
          node.x = position.x
          node.y = position.y
          node.fx = position.x
          node.fy = position.y
        }

        scheduleGraphDraw()
      }

      function sphericalPositions() {
        const positions = new Array(state.npcs.length)
        const count = Math.max(1, state.npcs.length)
        const radius = Math.max(170, Math.sqrt(count) * 15)
        const goldenAngle = Math.PI * (3 - Math.sqrt(5))

        for (let index = 0; index < count; index += 1) {
          const z = count === 1 ? 0 : 1 - (2 * index) / (count - 1)
          const radial = Math.sqrt(Math.max(0, 1 - z * z))
          const angle = index * goldenAngle

          positions[index] = {
            x: Math.cos(angle) * radial * radius,
            y: (z * radius * 0.78) + Math.sin(angle) * radial * radius * 0.18
          }
        }

        return positions
      }

      function infectionMapPositions() {
        const count = state.npcs.length
        const positions = new Array(count)
        const infectionByNpc = new Map()
        const tileGroups = new Map()
        let minX = Infinity
        let maxX = -Infinity
        let minY = Infinity
        let maxY = -Infinity

        for (let index = 0; index < state.fullInfectionTarget.length; index += 1) {
          const npc = state.fullInfectionTarget[index]
          const tileX = state.fullInfectionTileX[index]
          const tileY = state.fullInfectionTileY[index]

          if (!Number.isFinite(tileX) || !Number.isFinite(tileY) || infectionByNpc.has(npc)) {
            continue
          }

          infectionByNpc.set(npc, { x: tileX, y: tileY })
          const key = `${tileX}:${tileY}`
          const group = tileGroups.get(key) || []

          group.push(npc)
          tileGroups.set(key, group)
          minX = Math.min(minX, tileX)
          maxX = Math.max(maxX, tileX)
          minY = Math.min(minY, tileY)
          maxY = Math.max(maxY, tileY)
        }

        if (infectionByNpc.size === 0) {
          return sphericalPositions()
        }

        const spanX = Math.max(1, maxX - minX)
        const spanY = Math.max(1, maxY - minY)
        const mapTargetWidth = 3600
        const mapTargetHeight = 2400
        const scale = Math.min(mapTargetWidth / spanX, mapTargetHeight / spanY)
        const centerX = (minX + maxX) / 2
        const centerY = (minY + maxY) / 2

        for (const group of tileGroups.values()) {
          group.sort((left, right) => left - right)

          for (let index = 0; index < group.length; index += 1) {
            const npc = group[index]
            const tile = infectionByNpc.get(npc)
            const jitter = tileJitter(npc, index, group.length)

            positions[npc] = {
              x: (tile.x - centerX) * scale + jitter.x,
              y: (tile.y - centerY) * scale + jitter.y
            }
          }
        }

        const unplaced = []

        for (let index = 0; index < count; index += 1) {
          if (!positions[index]) {
            unplaced.push(index)
          }
        }

        layoutMapUnplacedNodes(unplaced, positions, -(spanY * scale) / 2 - 180, 36, 36)
        return positions
      }

      function tileJitter(npc, index, groupSize) {
        if (groupSize <= 1) {
          const angle = seededUnit(npc, 13) * Math.PI * 2
          const radius = 7 + seededUnit(npc, 29) * 7

          return {
            x: Math.cos(angle) * radius,
            y: Math.sin(angle) * radius
          }
        }

        const angle = index * 2.399963 + seededUnit(npc, 7) * 0.7
        const radius = 16 + Math.sqrt(index) * 13 + seededUnit(npc, 31) * 6

        return {
          x: Math.cos(angle) * radius,
          y: Math.sin(angle) * radius
        }
      }

      function layoutMapUnplacedNodes(nodes, positions, y, gap = 22, rowGap = 22) {
        if (nodes.length === 0) {
          return
        }

        const columns = Math.max(1, Math.min(nodes.length, Math.ceil(Math.sqrt(nodes.length * 4))))
        const rows = Math.ceil(nodes.length / columns)

        nodes.sort((left, right) => left - right)

        for (let index = 0; index < nodes.length; index += 1) {
          const column = index % columns
          const row = Math.floor(index / columns)

          positions[nodes[index]] = {
            x: (column - (columns - 1) / 2) * gap,
            y: y + (row - (rows - 1) / 2) * rowGap
          }
        }
      }

      function seededUnit(value, salt) {
        let seed = (value + 1) * 2654435761 + salt * 1013904223

        seed ^= seed >>> 16
        seed = Math.imul(seed, 2246822507)
        seed ^= seed >>> 13
        seed = Math.imul(seed, 3266489909)
        seed ^= seed >>> 16

        return (seed >>> 0) / 4294967295
      }

      function hierarchicalPositions() {
        const count = state.npcs.length
        const children = Array.from({ length: count }, () => [])
        const parent = new Int32Array(count).fill(-1)

        for (let index = 0; index < state.fullInfectionSource.length; index += 1) {
          const source = state.fullInfectionSource[index]
          const target = state.fullInfectionTarget[index]

          if (source < 0 || target < 0 || source === target || parent[target] !== -1) {
            continue
          }

          parent[target] = source
          children[source].push(target)
        }

        for (let index = 0; index < count; index += 1) {
          children[index].sort((left, right) => children[right].length - children[left].length || left - right)
        }

        const roots = []
        const isolates = []

        for (let index = 0; index < count; index += 1) {
          if (parent[index] !== -1) {
            continue
          }

          if (children[index].length > 0) {
            roots.push(index)
          } else {
            isolates.push(index)
          }
        }

        const componentByRoot = roots.map((root) => infectionComponent(root, children))
        const componentByNode = new Int32Array(count).fill(-1)

        componentByRoot.forEach((component, componentIndex) => {
          for (const node of component.nodes) {
            componentByNode[node] = componentIndex
          }
        })

        roots.sort((left, right) => {
          const leftComponent = componentByRoot[componentByNode[left]]
          const rightComponent = componentByRoot[componentByNode[right]]

          return rightComponent.nodes.length - leftComponent.nodes.length || left - right
        })
        isolates.sort((left, right) => left - right)

        const positions = new Array(count)
        const treeMetrics = roots.map((root) => componentByRoot[componentByNode[root]])
        const nodeGapX = 34
        const nodeGapY = 36
        const layerGap = 250
        const componentGap = 150
        const availableWidth = 1760
        const minComponentWidth = treeMetrics.length > 8 ? 190 : 250
        const isolatedLayerGap = 250

        if (treeMetrics.length === 0) {
          const isolateWidth = Math.max(720, Math.min(1760, Math.ceil(Math.sqrt(Math.max(1, isolates.length) * 3.6)) * nodeGapX))

          layoutIsolates(isolates, positions, isolateWidth, 0, nodeGapX, nodeGapY, { centered: true })
          return positions
        }

        const weightSum = Math.max(1, treeMetrics.reduce((sum, tree) => sum + Math.sqrt(tree.nodes.length), 0))
        const widthPool = Math.max(
          treeMetrics.length * minComponentWidth,
          availableWidth - Math.max(0, treeMetrics.length - 1) * componentGap
        )
        const maxDepth = treeMetrics.reduce((largest, tree) => Math.max(largest, tree.levels.length - 1), 0)

        for (const tree of treeMetrics) {
          const weightedWidth = widthPool * (Math.sqrt(tree.nodes.length) / weightSum)

          tree.layoutWidth = Math.max(minComponentWidth, weightedWidth)
          tree.layoutColumns = Math.max(1, Math.floor(tree.layoutWidth / nodeGapX))
          tree.layoutRows = tree.levels.map((nodes) => Math.max(1, Math.ceil(nodes.length / tree.layoutColumns)))
        }

        const layerRows = Array.from({ length: maxDepth + 1 }, (_, depth) => (
          Math.max(1, ...treeMetrics.map((tree) => tree.layoutRows[depth] || 0))
        ))
        const layerHeights = layerRows.map((rows) => rows * nodeGapY)
        const forestHeight = layerHeights.reduce((sum, height) => sum + height, 0) + Math.max(0, layerHeights.length - 1) * layerGap
        const forestWidth = treeMetrics.reduce((sum, tree) => sum + tree.layoutWidth, 0) + Math.max(0, treeMetrics.length - 1) * componentGap
        const isolateRows = isolates.length > 0
          ? Math.ceil(isolates.length / Math.max(1, Math.floor(forestWidth / nodeGapX)))
          : 0
        const isolateHeight = isolateRows * nodeGapY
        const layoutHeight = forestHeight + (isolates.length > 0 ? isolateHeight + isolatedLayerGap : 0)
        const forestStart = -forestWidth / 2
        const forestTop = -layoutHeight / 2 + (isolates.length > 0 ? isolateHeight + isolatedLayerGap : 0)
        const layerTops = []
        let layerCursor = forestTop

        for (let depth = 0; depth < layerHeights.length; depth += 1) {
          layerTops.push(layerCursor)
          layerCursor += layerHeights[depth] + layerGap
        }

        let cursor = forestStart

        for (const tree of treeMetrics) {
          layoutComponent(tree, positions, cursor, tree.layoutWidth, layerTops, nodeGapX, nodeGapY)
          cursor += tree.layoutWidth + componentGap
        }

        if (isolates.length > 0) {
          layoutIsolates(isolates, positions, forestWidth, -layoutHeight / 2, nodeGapX, nodeGapY)
        }

        return positions
      }

      function infectionComponent(root, children) {
        const levels = []
        const nodes = []
        const queue = [{ node: root, depth: 0 }]

        for (let cursor = 0; cursor < queue.length; cursor += 1) {
          const { node, depth } = queue[cursor]

          nodes.push(node)
          if (!levels[depth]) {
            levels[depth] = []
          }

          levels[depth].push(node)

          for (const child of children[node]) {
            queue.push({ node: child, depth: depth + 1 })
          }
        }

        return { root, nodes, levels }
      }

      function layoutComponent(tree, positions, left, width, layerTops, nodeGapX, nodeGapY) {
        const center = left + width / 2

        for (let depth = 0; depth < tree.levels.length; depth += 1) {
          const nodes = tree.levels[depth]
          const rowCount = Math.max(1, tree.layoutRows[depth] || 1)
          const columns = Math.max(1, Math.ceil(nodes.length / rowCount))
          const gridWidth = (columns - 1) * nodeGapX
          const startX = center - gridWidth / 2
          const y = layerTops[depth]

          for (let index = 0; index < nodes.length; index += 1) {
            const column = index % columns
            const row = Math.floor(index / columns)

            positions[nodes[index]] = {
              x: startX + column * nodeGapX,
              y: y + row * nodeGapY
            }
          }
        }
      }

      function layoutIsolates(isolates, positions, forestWidth, y, nodeGapX = 34, nodeGapY = 36, options = {}) {
        const columns = Math.max(1, Math.min(isolates.length, Math.floor(Math.max(nodeGapX, forestWidth) / nodeGapX)))
        const rowCount = Math.ceil(isolates.length / columns)
        const gridWidth = (columns - 1) * nodeGapX
        const startX = -gridWidth / 2
        const startY = options.centered ? y - ((rowCount - 1) * nodeGapY) / 2 : y

        for (let index = 0; index < isolates.length; index += 1) {
          const column = index % columns
          const row = Math.floor(index / columns)

          positions[isolates[index]] = {
            x: startX + column * nodeGapX,
            y: startY + row * nodeGapY
          }
        }
      }

      function animateNodePositions(positions) {
        stopLayoutAnimation()
        const duration = 520
        const startedAt = performance.now()
        const starts = state.npcs.map((node) => ({ x: node.x, y: node.y }))

        for (const node of state.npcs) {
          node.fx = null
          node.fy = null
        }

        const tick = (time) => {
          const progress = clamp((time - startedAt) / duration, 0, 1)
          const eased = 1 - Math.pow(1 - progress, 3)

          for (const node of state.npcs) {
            const start = starts[node.index]
            const target = positions[node.index]
            node.x = start.x + (target.x - start.x) * eased
            node.y = start.y + (target.y - start.y) * eased
          }

          scheduleGraphDraw()

          if (progress < 1) {
            state.layoutAnimationFrame = requestAnimationFrame(tick)
            return
          }

          state.layoutAnimationFrame = 0

          for (const node of state.npcs) {
            const position = positions[node.index]
            node.fx = position.x
            node.fy = position.y
          }
        }

        state.layoutAnimationFrame = requestAnimationFrame(tick)
      }

      function stopLayoutAnimation() {
        if (state.layoutAnimationFrame) {
          cancelAnimationFrame(state.layoutAnimationFrame)
          state.layoutAnimationFrame = 0
        }
      }

      function startFloatingAnimation() {
        if (!state.floatNodes || state.floatIntensity <= 0 || state.floatAnimationFrame || state.activeTab !== 'contact') {
          return
        }

        const tick = () => {
          state.floatAnimationFrame = 0

          if (!state.floatNodes || state.floatIntensity <= 0 || state.activeTab !== 'contact') {
            return
          }

          scheduleGraphDraw()
          state.floatAnimationFrame = requestAnimationFrame(tick)
        }

        state.floatAnimationFrame = requestAnimationFrame(tick)
      }

      function stopFloatingAnimation() {
        if (state.floatAnimationFrame) {
          cancelAnimationFrame(state.floatAnimationFrame)
          state.floatAnimationFrame = 0
        }
      }

      function applyWindowData(data) {
        state.workerBusy = false

        if (data.requestId !== state.windowRequestId) {
          if (state.queuedWindow) {
            requestWindowData()
          }
          return
        }

        state.contactSource = data.contactSource
        state.contactTarget = data.contactTarget
        state.contactWeight = data.contactWeight
        state.infectionSource = data.infectionSource
        state.infectionTarget = data.infectionTarget
        rebuildVisibleInfectionPairKeys()
        state.currentStateCodes = data.currentStates
        state.degrees = data.degrees
        state.stats.contactEventCount = data.contactEventCount
        state.stats.infectionEventCount = data.infectionEventCount
        state.stats.activeNodeCount = data.activeNodeCount
        state.stats.totalContactPairCount = data.totalContactPairCount
        state.stats.visibleContactPairCount = data.visibleContactPairCount

        rebuildSelectionNeighborhood()
        applyNodeStyles()
        updateStats()
        scheduleGraphDraw()
        hideStatus()

        if (state.queuedWindow) {
          requestWindowData()
        }
      }

      function scheduleWindowData() {
        if (!state.loaded) {
          return
        }

        if (state.windowFrame) {
          return
        }

        state.windowFrame = requestAnimationFrame(() => {
          state.windowFrame = 0
          requestWindowData()
        })
      }

      function requestWindowData() {
        if (!state.loaded || !state.worker) {
          return
        }

        if (state.workerBusy) {
          state.queuedWindow = true
          return
        }

        state.workerBusy = true
        state.queuedWindow = false
        state.windowRequestId += 1
        state.worker.postMessage({
          type: 'window',
          requestId: state.windowRequestId,
          start: state.start,
          end: state.end,
          maxVisibleContactEdges: state.maxVisibleContactEdges
        })
      }

      function applyNodeStyles() {
        if (!state.nodeSelection) {
          return
        }

        state.nodeSelection
          .attr('fill', (node) => colorByStateCode[state.currentStateCodes[node.index] ?? node.initialSeirStateCode] || colorByState.susceptible)
          .attr('opacity', nodeOpacity)
          .attr('stroke', (node) => node.index === state.selectedNodeIndex ? '#202621' : '#ffffff')
          .attr('stroke-width', (node) => node.index === state.selectedNodeIndex ? 1.7 : 1.1)
          .attr('r', nodeRadius)
      }

      function nodeRadius(node) {
        return (3.6 + Math.min(2.4, Math.sqrt(state.degrees[node.index] || 0) * 0.045)) * state.nodeSizeScale
      }

      function nodeOpacity(node) {
        if (!hasNodeSelection()) {
          return 1
        }

        return state.selectedNeighborMask[node.index] ? 1 : 0.13
      }

      function selectNode(index) {
        if (!Number.isInteger(index) || index < 0 || index >= state.npcs.length) {
          clearNodeSelection()
          return
        }

        state.selectedNodeIndex = index
        rebuildSelectionNeighborhood()
        applyNodeStyles()
        scheduleGraphDraw()
      }

      function clearNodeSelection() {
        if (!hasNodeSelection()) {
          return
        }

        state.selectedNodeIndex = -1
        state.selectedNeighborMask = new Uint8Array(state.npcs.length)
        state.selectedContactEdgeCount = 0
        state.selectedInfectionEdgeCount = 0
        applyNodeStyles()
        scheduleGraphDraw()
      }

      function hasNodeSelection() {
        return state.selectedNodeIndex >= 0 && state.selectedNodeIndex < state.npcs.length
      }

      function rebuildSelectionNeighborhood() {
        if (state.selectedNeighborMask.length !== state.npcs.length) {
          state.selectedNeighborMask = new Uint8Array(state.npcs.length)
        } else {
          state.selectedNeighborMask.fill(0)
        }

        state.selectedContactEdgeCount = 0
        state.selectedInfectionEdgeCount = 0

        if (!hasNodeSelection()) {
          return
        }

        const selectedIndex = state.selectedNodeIndex

        state.selectedNeighborMask[selectedIndex] = 1

        if (state.showContacts) {
          for (let index = 0; index < state.contactSource.length; index += 1) {
            const sourceIndex = state.contactSource[index]
            const targetIndex = state.contactTarget[index]

            if (isContactSuppressedByInfection(sourceIndex, targetIndex)) {
              continue
            }

            if (markSelectedEdgeNeighbor(sourceIndex, targetIndex, selectedIndex)) {
              state.selectedContactEdgeCount += 1
            }
          }
        }

        if (state.showInfections) {
          for (let index = 0; index < state.infectionSource.length; index += 1) {
            if (markSelectedEdgeNeighbor(state.infectionSource[index], state.infectionTarget[index], selectedIndex)) {
              state.selectedInfectionEdgeCount += 1
            }
          }
        }
      }

      function markSelectedEdgeNeighbor(sourceIndex, targetIndex, selectedIndex) {
        if (sourceIndex === selectedIndex) {
          state.selectedNeighborMask[targetIndex] = 1
          return true
        } else if (targetIndex === selectedIndex) {
          state.selectedNeighborMask[sourceIndex] = 1
          return true
        }

        return false
      }

      function handleVisualizationClick(event) {
        if (state.activeTab !== 'contact' || event.defaultPrevented || event.target !== svg.node()) {
          return
        }

        clearNodeSelection()
      }

      function scheduleGraphDraw() {
        if (state.drawFrame) {
          return
        }

        state.drawFrame = requestAnimationFrame(drawGraph)
      }

      function drawGraph() {
        state.drawFrame = 0
        const time = performance.now()

        prepareRenderedNodePositions(time)

        if (state.nodeSelection) {
          state.nodeSelection
            .attr('cx', (node) => renderedNodeX(node))
            .attr('cy', (node) => renderedNodeY(node))
        }

        drawEdges()
      }

      function drawEdges() {
        clearCanvas()

        if (!state.loaded || state.activeTab !== 'contact') {
          return
        }

        const transform = state.graphTransform
        const scale = Math.max(0.08, transform.k)
        const ratio = window.devicePixelRatio || 1
        const displayedContactCount = state.showContacts ? countRenderableContactEdges() : 0
        const displayedInfectionCount = state.showInfections ? state.infectionSource.length : 0
        const contactOpacity = dynamicEdgeOpacity(displayedContactCount, 0.24, 0.026, 850)
        const infectionOpacity = dynamicEdgeOpacity(displayedInfectionCount, 0.72, 0.16, 120)
        const selectionActive = hasNodeSelection()
        const selectedContactOpacity = dynamicEdgeOpacity(state.selectedContactEdgeCount, 0.7, 0.16, 24)
        const selectedInfectionOpacity = dynamicEdgeOpacity(state.selectedInfectionEdgeCount, 0.88, 0.24, 10)

        edgeContext.save()
        edgeContext.setTransform(ratio * scale, 0, 0, ratio * scale, ratio * transform.x, ratio * transform.y)
        edgeContext.lineCap = 'round'

        if (displayedContactCount) {
          if (selectionActive) {
            drawContactEdgeBatch(false, Math.max(0.01, contactOpacity * 0.18), 0.5 / scale)
            drawContactEdgeBatch(true, selectedContactOpacity, 0.78 / scale)
          } else {
            drawContactEdgeBatch(null, contactOpacity, 0.55 / scale)
          }
        }

        if (displayedInfectionCount) {
          if (selectionActive) {
            drawInfectionEdgeBatch(false, Math.max(0.025, infectionOpacity * 0.18), scale, 1.25 / scale)
            drawInfectionEdgeBatch(true, selectedInfectionOpacity, scale, 1.7 / scale)
          } else {
            drawInfectionEdgeBatch(null, infectionOpacity, scale, 1.45 / scale)
          }
        }

        edgeContext.restore()
      }

      function drawContactEdgeBatch(matchSelected, opacity, lineWidth) {
        edgeContext.strokeStyle = rgba(118, 122, 120, opacity)
        edgeContext.lineWidth = lineWidth
        edgeContext.beginPath()

        for (let index = 0; index < state.contactSource.length; index += 1) {
          const sourceIndex = state.contactSource[index]
          const targetIndex = state.contactTarget[index]

          if (isContactSuppressedByInfection(sourceIndex, targetIndex)) {
            continue
          }

          if (matchSelected !== null && isSelectedEdge(sourceIndex, targetIndex) !== matchSelected) {
            continue
          }

          const source = state.npcs[sourceIndex]
          const target = state.npcs[targetIndex]

          edgeContext.moveTo(renderedNodeX(source), renderedNodeY(source))
          edgeContext.lineTo(renderedNodeX(target), renderedNodeY(target))
        }

        edgeContext.stroke()
      }

      function drawInfectionEdgeBatch(matchSelected, opacity, scale, lineWidth) {
        edgeContext.strokeStyle = rgba(216, 76, 85, opacity)
        edgeContext.fillStyle = rgba(216, 76, 85, Math.max(0.02, opacity * 0.88))
        edgeContext.lineWidth = lineWidth

        for (let index = 0; index < state.infectionSource.length; index += 1) {
          const sourceIndex = state.infectionSource[index]
          const targetIndex = state.infectionTarget[index]

          if (matchSelected !== null && isSelectedEdge(sourceIndex, targetIndex) !== matchSelected) {
            continue
          }

          drawArrow(state.npcs[sourceIndex], state.npcs[targetIndex], scale)
        }
      }

      function isSelectedEdge(sourceIndex, targetIndex) {
        return sourceIndex === state.selectedNodeIndex || targetIndex === state.selectedNodeIndex
      }

      function rebuildVisibleInfectionPairKeys() {
        const visibleInfectionPairKeys = new Set()

        for (let index = 0; index < state.infectionSource.length; index += 1) {
          visibleInfectionPairKeys.add(nodePairKey(state.infectionSource[index], state.infectionTarget[index]))
        }

        state.visibleInfectionPairKeys = visibleInfectionPairKeys
      }

      function countRenderableContactEdges() {
        if (!state.showInfections || state.visibleInfectionPairKeys.size === 0) {
          return state.contactSource.length
        }

        let count = 0

        for (let index = 0; index < state.contactSource.length; index += 1) {
          if (!isContactSuppressedByInfection(state.contactSource[index], state.contactTarget[index])) {
            count += 1
          }
        }

        return count
      }

      function isContactSuppressedByInfection(sourceIndex, targetIndex) {
        return state.showInfections && state.visibleInfectionPairKeys.has(nodePairKey(sourceIndex, targetIndex))
      }

      function nodePairKey(sourceIndex, targetIndex) {
        const low = Math.min(sourceIndex, targetIndex)
        const high = Math.max(sourceIndex, targetIndex)

        return low * Math.max(1, state.npcs.length) + high
      }

      function dynamicEdgeOpacity(edgeCount, maxOpacity, minOpacity, softLimit) {
        if (edgeCount <= 0) {
          return maxOpacity
        }

        return clamp(maxOpacity / Math.sqrt(1 + edgeCount / softLimit), minOpacity, maxOpacity)
      }

      function rgba(red, green, blue, alpha) {
        return `rgba(${red}, ${green}, ${blue}, ${format('.3f')(alpha)})`
      }

      function prepareRenderedNodePositions(time) {
        if (state.renderedNodeX.length !== state.npcs.length) {
          state.renderedNodeX = new Float64Array(state.npcs.length)
          state.renderedNodeY = new Float64Array(state.npcs.length)
        }

        const seconds = time * 0.001

        for (const node of state.npcs) {
          if (!state.floatNodes || state.floatIntensity <= 0) {
            state.renderedNodeX[node.index] = node.x
            state.renderedNodeY[node.index] = node.y
            continue
          }

          const phase = node.index * 2.399963
          const intensity = state.floatIntensity
          const amplitudeX = (1.7 + seededUnit(node.index, 43) * 2.4) * intensity
          const amplitudeY = (1.7 + seededUnit(node.index, 67) * 2.4) * intensity
          const speedX = (0.22 + seededUnit(node.index, 59) * 0.16) * intensity
          const speedY = (0.18 + seededUnit(node.index, 83) * 0.14) * intensity

          state.renderedNodeX[node.index] = node.x + Math.cos(seconds * speedX + phase) * amplitudeX
          state.renderedNodeY[node.index] = node.y + Math.sin(seconds * speedY + phase * 1.37) * amplitudeY
        }
      }

      function renderedNodeX(node) {
        return state.renderedNodeX.length === state.npcs.length ? state.renderedNodeX[node.index] : node.x
      }

      function renderedNodeY(node) {
        return state.renderedNodeY.length === state.npcs.length ? state.renderedNodeY[node.index] : node.y
      }

      function drawArrow(source, target, scale) {
        const sourceX = renderedNodeX(source)
        const sourceY = renderedNodeY(source)
        const targetX = renderedNodeX(target)
        const targetY = renderedNodeY(target)
        const dx = targetX - sourceX
        const dy = targetY - sourceY
        const length = Math.max(1, Math.hypot(dx, dy))
        const ux = dx / length
        const uy = dy / length
        const startOffset = nodeRadius(source) + 1.2
        const endOffset = nodeRadius(target) + 3.2
        const startX = sourceX + ux * startOffset
        const startY = sourceY + uy * startOffset
        const endX = targetX - ux * endOffset
        const endY = targetY - uy * endOffset
        const arrowSize = 5.6 / Math.sqrt(scale)

        edgeContext.beginPath()
        edgeContext.moveTo(startX, startY)
        edgeContext.lineTo(endX, endY)
        edgeContext.stroke()
        edgeContext.beginPath()
        edgeContext.moveTo(endX, endY)
        edgeContext.lineTo(endX - ux * arrowSize - uy * arrowSize * 0.55, endY - uy * arrowSize + ux * arrowSize * 0.55)
        edgeContext.lineTo(endX - ux * arrowSize + uy * arrowSize * 0.55, endY - uy * arrowSize - ux * arrowSize * 0.55)
        edgeContext.closePath()
        edgeContext.fill()
      }

      function clearCanvas() {
        const ratio = window.devicePixelRatio || 1

        edgeContext.setTransform(ratio, 0, 0, ratio, 0, 0)
        edgeContext.clearRect(0, 0, edgeCanvas.width / ratio, edgeCanvas.height / ratio)
      }

      function resizeCanvas() {
        const width = window.innerWidth
        const height = window.innerHeight
        const ratio = window.devicePixelRatio || 1
        const nextWidth = Math.max(1, Math.floor(width * ratio))
        const nextHeight = Math.max(1, Math.floor(height * ratio))

        edgeCanvas.style.width = `${width}px`
        edgeCanvas.style.height = `${height}px`

        if (edgeCanvas.width !== nextWidth || edgeCanvas.height !== nextHeight) {
          edgeCanvas.width = nextWidth
          edgeCanvas.height = nextHeight
        }
      }

      function dragStarted(event, node) {
        if (!event.active && state.simulation) {
          state.simulation.alphaTarget(0.18).restart()
        }

        node.fx = node.x
        node.fy = node.y
      }

      function dragged(event, node) {
        node.fx = event.x
        node.fy = event.y

        if (!state.simulation) {
          node.x = event.x
          node.y = event.y
        }

        scheduleGraphDraw()
      }

      function dragEnded(event, node) {
        if (!event.active && state.simulation) {
          state.simulation.alphaTarget(0)
        }

        if (state.layoutMode === 'force') {
          node.fx = null
          node.fy = null
        }
      }

      function renderChart() {
        chartGridGroup.selectAll('*').remove()
        chartAxisGroup.selectAll('*').remove()
        chartLineGroup.selectAll('*').remove()

        if (!state.seirSeries) {
          return
        }

        const layout = chartLayout()
        chartPlotGroup.attr('transform', `translate(${layout.plotLeft},${layout.plotTop})`)
        const x = scaleLinear()
          .domain([0, state.seirSeries.maxTime])
          .range([layout.innerLeft, layout.innerRight])
        const y = scaleLinear()
          .domain([0, 100])
          .nice()
          .range([layout.innerBottom, layout.innerTop])
        const timeAxisScale = scaleTime()
          .domain([new Date(0), new Date(state.seirSeries.maxTime * 1000)])
          .range([layout.innerLeft, layout.innerRight])

        chartGridGroup.append('g')
          .call(axisLeft(y)
            .tickSize(-layout.innerWidth)
            .tickFormat('')
            .ticks(6))
          .call((group) => group.select('.domain').remove())

        chartAxisGroup.append('g')
          .attr('class', 'axis')
          .attr('transform', `translate(0,${layout.innerBottom})`)
          .call(axisBottom(timeAxisScale).ticks(8).tickFormat(formatChartTime))

        chartAxisGroup.append('g')
          .attr('class', 'axis')
          .call(axisLeft(y).ticks(6).tickFormat((value) => `${format('~g')(value)}%`))
          .call((group) => group.select('.domain').remove())

        const times = state.seirSeries.time
        const curveLine = line()
          .x((_, index) => x(times[index]))
          .y((value) => y((Number(value) / Math.max(1, state.seirSeries.maxCount)) * 100))
          .curve(curveLinear)

        for (const stateKey of stateKeys) {
          chartLineGroup.append('path')
            .datum(state.seirSeries[stateKey])
            .attr('class', `curve-line curve-${stateKey}`)
            .attr('stroke', colorByState[stateKey])
            .attr('d', curveLine)
            .attr('display', state.showCurves[stateKey] ? null : 'none')
        }
      }

      function chartLayout() {
        const viewport = svg.node().getBoundingClientRect()
        const width = Math.max(560, Math.min(1060, viewport.width - 160))
        const height = Math.max(360, Math.min(620, viewport.height - 210))
        const left = -width / 2
        const top = -height / 2
        const margin = {
          top: 22,
          right: 18,
          bottom: 42,
          left: 58
        }

        return {
          width,
          height,
          left,
          top,
          plotLeft: left + margin.left,
          plotTop: top + margin.top,
          innerLeft: 0,
          innerRight: width - margin.left - margin.right,
          innerTop: 0,
          innerBottom: height - margin.top - margin.bottom,
          innerWidth: width - margin.left - margin.right,
          innerHeight: height - margin.top - margin.bottom
        }
      }

      function formatChartTime(date) {
        const seconds = date.getTime() / 1000

        if (state.seirSeries?.maxTime <= 86400) {
          if (seconds < 3600) {
            return `${Math.round(seconds / 60)}m`
          }

          return `${format('~g')(seconds / 3600)}h`
        }

        return timeFormat('%b %d')(date)
      }

      function configureControls() {
        const maxValue = Math.max(state.maxTime, state.minTime + 1)

        for (const input of [startRange, endRange, startNumber, endNumber]) {
          input.min = String(state.minTime)
          input.max = String(maxValue)
          input.step = '1'
        }

        startRange.value = String(state.start)
        endRange.value = String(state.end)
        startNumber.value = String(state.start)
        endNumber.value = String(state.end)
        updateRangeSelection()
      }

      function setWindow(start, end) {
        const minValue = state.minTime
        const maxValue = Math.max(state.maxTime, minValue)
        const nextStart = clamp(Number.isFinite(start) ? start : minValue, minValue, maxValue)
        const nextEnd = clamp(Number.isFinite(end) ? end : maxValue, minValue, maxValue)

        state.start = Math.min(nextStart, nextEnd)
        state.end = Math.max(nextStart, nextEnd)
        startRange.value = String(Math.round(state.start))
        endRange.value = String(Math.round(state.end))
        startNumber.value = String(Math.round(state.start))
        endNumber.value = String(Math.round(state.end))
        updateRangeSelection()
        scheduleWindowData()
      }

      function updateRangeSelection() {
        const minValue = Number(startRange.min)
        const maxValue = Number(startRange.max)
        const span = Math.max(1, maxValue - minValue)
        const startPercent = ((state.start - minValue) / span) * 100
        const endPercent = ((state.end - minValue) / span) * 100

        rangeSelection.style.left = `${clamp(startPercent, 0, 100)}%`
        rangeSelection.style.right = `${100 - clamp(endPercent, 0, 100)}%`
      }

      function setEdgeDisplay() {
        state.showContacts = showContactsInput.checked
        state.showInfections = showInfectionsInput.checked
        rebuildSelectionNeighborhood()
        applyNodeStyles()
        scheduleGraphDraw()
      }

      function setNodeSize() {
        const nextSize = Number(nodeSizeInput.value)

        state.nodeSizeScale = Number.isFinite(nextSize) ? clamp(nextSize, 1, 3) : 1
        applyNodeStyles()
        scheduleGraphDraw()
      }

      function setNodeFloatDisplay() {
        state.floatNodes = floatNodesInput.checked

        if (state.floatNodes && state.floatIntensity > 0) {
          startFloatingAnimation()
        } else {
          stopFloatingAnimation()
        }

        scheduleGraphDraw()
      }

      function setFloatIntensity() {
        const nextIntensity = Number(floatIntensityInput.value)

        state.floatIntensity = Number.isFinite(nextIntensity) ? clamp(nextIntensity, 0, 5) : 1

        if (state.floatNodes && state.floatIntensity > 0) {
          startFloatingAnimation()
        } else if (state.floatIntensity <= 0) {
          stopFloatingAnimation()
        }

        scheduleGraphDraw()
      }

      function setCurveDisplay() {
        state.showCurves.susceptible = showSusceptibleInput.checked
        state.showCurves.exposed = showExposedInput.checked
        state.showCurves.infectious = showInfectiousInput.checked
        state.showCurves.recovered = showRecoveredInput.checked

        for (const stateKey of stateKeys) {
          chartLineGroup.select(`.curve-${stateKey}`).attr('display', state.showCurves[stateKey] ? null : 'none')
        }
      }

      function setActiveTab(tab) {
        if (state.activeTab === tab) {
          return
        }

        state.activeTab = tab === 'seir' ? 'seir' : 'contact'
        document.body.dataset.view = state.activeTab
        edgeCanvas.hidden = state.activeTab !== 'contact'
        contactGraphTab.setAttribute('aria-selected', state.activeTab === 'contact' ? 'true' : 'false')
        seirCurveTab.setAttribute('aria-selected', state.activeTab === 'seir' ? 'true' : 'false')
        graphRoot.style('display', state.activeTab === 'contact' ? null : 'none')
        chartRoot.style('display', state.activeTab === 'seir' ? null : 'none')
        hideTooltip()
        applyActiveTransform()
        scheduleGraphDraw()

        if (state.activeTab === 'contact') {
          startFloatingAnimation()
        } else {
          stopFloatingAnimation()
        }
      }

      function applyActiveTransform() {
        const transform = state.activeTab === 'contact' ? state.graphTransform : state.chartTransform

        svg.call(graphZoom.transform, transform)
      }

      function resize() {
        const width = window.innerWidth
        const height = window.innerHeight

        resizeCanvas()
        svg.attr('width', width).attr('height', height).attr('viewBox', `0 0 ${width} ${height}`)

        if (!state.loaded) {
          state.graphTransform = centeredTransform()
          state.chartTransform = centeredTransform()
          applyActiveTransform()
          scheduleGraphDraw()
          return
        }

        renderChart()
        applyActiveTransform()
        scheduleGraphDraw()
      }

      function centeredTransform() {
        return zoomIdentity.translate(window.innerWidth / 2, window.innerHeight / 2 + 18)
      }

      function updateStats() {
        nodeCountEl.textContent = integerFormat(state.npcs.length)
        edgeCountEl.textContent = integerFormat(state.stats.contactEventCount || 0)
        activeNodeCountEl.textContent = integerFormat(state.stats.activeNodeCount || 0)
        durationLabelEl.textContent = formatTime(Math.max(0, state.end - state.start))
      }

      function showNodeTooltip(event, node) {
        tooltip.hidden = false
        tooltip.style.left = `${event.clientX}px`
        tooltip.style.top = `${event.clientY}px`
        tooltip.innerHTML = `
          <b>${escapeHtml(node.id)}</b>
          <span>State: ${escapeHtml(stateNames[state.currentStateCodes[node.index] ?? node.initialSeirStateCode] || node.initialSeirState)}</span>
          <span>Contacts: ${integerFormat(state.degrees[node.index] || 0)}</span>
        `
      }

      function hideTooltip() {
        tooltip.hidden = true
      }

      function setStatus(message) {
        statusEl.textContent = message
        statusEl.hidden = false
      }

      function hideStatus() {
        statusEl.hidden = true
      }

      function stopSimulation() {
        stopLayoutAnimation()

        if (state.simulation) {
          state.simulation.stop()
          state.simulation = null
        }
      }

      function formatTime(seconds) {
        const value = Math.max(0, Math.round(seconds))

        if (value < 60) {
          return `${value}s`
        }

        if (value < 3600) {
          return `${Math.floor(value / 60)}m`
        }

        if (value < 86400) {
          return `${format('.1f')(value / 3600)}h`
        }

        return `${format('.1f')(value / 86400)}d`
      }

      function clamp(value, minValue, maxValue) {
        return Math.min(Math.max(value, minValue), maxValue)
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;')
      }
    </script>
  </body>
</html>
