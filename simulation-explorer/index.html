      }

      function drawUndirectedEdgeBatch(sourceIndexes, targetIndexes, matchSelected, color, opacity, lineWidth) {
        edgeContext.strokeStyle = rgba(color[0], color[1], color[2], opacity)
        edgeContext.lineWidth = lineWidth
        edgeContext.beginPath()

        for (let index = 0; index < sourceIndexes.length; index += 1) {
          const sourceIndex = sourceIndexes[index]
          const targetIndex = targetIndexes[index]

          if (matchSelected !== null && isSelectedEdge(sourceIndex, targetIndex) !== matchSelected) {
            continue
          }

          const source = state.npcs[sourceIndex]
          const target = state.npcs[targetIndex]

          edgeContext.moveTo(renderedNodeX(source), renderedNodeY(source))
          edgeContext.lineTo(renderedNodeX(target), renderedNodeY(target))
        }

        edgeContext.stroke()
      }

      function drawContactEdgeBatch(matchSelected, opacity, lineWidth) {
        edgeContext.strokeStyle = rgba(edgeColors.contact[0], edgeColors.contact[1], edgeColors.contact[2], opacity)
        edgeContext.lineWidth = lineWidth
        edgeContext.beginPath()

        for (let index = 0; index < state.contactSource.length; index += 1) {
          const sourceIndex = state.contactSource[index]
          const targetIndex = state.contactTarget[index]

          if (isContactSuppressedByInfection(sourceIndex, targetIndex)) {
            continue
          }

          if (matchSelected !== null && isSelectedEdge(sourceIndex, targetIndex) !== matchSelected) {
            continue
          }

          const source = state.npcs[sourceIndex]
          const target = state.npcs[targetIndex]

          edgeContext.moveTo(renderedNodeX(source), renderedNodeY(source))
          edgeContext.lineTo(renderedNodeX(target), renderedNodeY(target))
        }

        edgeContext.stroke()
      }

      function drawInfectionEdgeBatch(matchSelected, opacity, scale, lineWidth) {
        edgeContext.strokeStyle = rgba(216, 76, 85, opacity)
        edgeContext.fillStyle = rgba(216, 76, 85, Math.max(0.02, opacity * 0.88))
        edgeContext.lineWidth = lineWidth

        for (let index = 0; index < state.infectionSource.length; index += 1) {
          const sourceIndex = state.infectionSource[index]
          const targetIndex = state.infectionTarget[index]

          if (matchSelected !== null && isSelectedEdge(sourceIndex, targetIndex) !== matchSelected) {
            continue
          }

          drawArrow(state.npcs[sourceIndex], state.npcs[targetIndex], scale)
        }
      }

      function isSelectedEdge(sourceIndex, targetIndex) {
        return sourceIndex === state.selectedNodeIndex || targetIndex === state.selectedNodeIndex
      }

      function rebuildVisibleInfectionPairKeys() {
        const visibleInfectionPairKeys = new Set()

        for (let index = 0; index < state.infectionSource.length; index += 1) {
          visibleInfectionPairKeys.add(nodePairKey(state.infectionSource[index], state.infectionTarget[index]))
        }

        state.visibleInfectionPairKeys = visibleInfectionPairKeys
      }

      function countRenderableContactEdges() {
        if (!state.showInfections || state.visibleInfectionPairKeys.size === 0) {
          return state.contactSource.length
        }

        let count = 0

        for (let index = 0; index < state.contactSource.length; index += 1) {
          if (!isContactSuppressedByInfection(state.contactSource[index], state.contactTarget[index])) {
            count += 1
          }
        }

        return count
      }

      function isContactSuppressedByInfection(sourceIndex, targetIndex) {
        return state.showInfections && state.visibleInfectionPairKeys.has(nodePairKey(sourceIndex, targetIndex))
      }

      function nodePairKey(sourceIndex, targetIndex) {
        const low = Math.min(sourceIndex, targetIndex)
        const high = Math.max(sourceIndex, targetIndex)

        return low * Math.max(1, state.npcs.length) + high
      }

      function dynamicEdgeOpacity(edgeCount, maxOpacity, minOpacity, softLimit) {
        if (edgeCount <= 0) {
          return maxOpacity
        }

        return clamp(maxOpacity / Math.sqrt(1 + edgeCount / softLimit), minOpacity, maxOpacity)
      }

      function rgba(red, green, blue, alpha) {
        return `rgba(${red}, ${green}, ${blue}, ${format('.3f')(alpha)})`
      }

      function prepareRenderedNodePositions(time) {
        if (state.renderedNodeX.length !== state.npcs.length) {
          state.renderedNodeX = new Float64Array(state.npcs.length)
          state.renderedNodeY = new Float64Array(state.npcs.length)
        }

        const seconds = time * 0.001

        for (const node of state.npcs) {
          if (!state.floatNodes || state.floatIntensity <= 0) {
            state.renderedNodeX[node.index] = node.x
            state.renderedNodeY[node.index] = node.y
            continue
          }

          const phase = node.index * 2.399963
          const intensity = state.floatIntensity
          const amplitudeX = (1.7 + seededUnit(node.index, 43) * 2.4) * intensity
          const amplitudeY = (1.7 + seededUnit(node.index, 67) * 2.4) * intensity
          const speedX = (0.22 + seededUnit(node.index, 59) * 0.16) * intensity
          const speedY = (0.18 + seededUnit(node.index, 83) * 0.14) * intensity

          state.renderedNodeX[node.index] = node.x + Math.cos(seconds * speedX + phase) * amplitudeX
          state.renderedNodeY[node.index] = node.y + Math.sin(seconds * speedY + phase * 1.37) * amplitudeY
        }
      }

      function renderedNodeX(node) {
        return state.renderedNodeX.length === state.npcs.length ? state.renderedNodeX[node.index] : node.x
      }

      function renderedNodeY(node) {
        return state.renderedNodeY.length === state.npcs.length ? state.renderedNodeY[node.index] : node.y
      }

      function drawArrow(source, target, scale) {
        const sourceX = renderedNodeX(source)
        const sourceY = renderedNodeY(source)
        const targetX = renderedNodeX(target)
        const targetY = renderedNodeY(target)
        const dx = targetX - sourceX
        const dy = targetY - sourceY
        const length = Math.max(1, Math.hypot(dx, dy))
        const ux = dx / length
        const uy = dy / length
        const startOffset = nodeRadius(source) + 1.2
        const endOffset = nodeRadius(target) + 3.2
        const startX = sourceX + ux * startOffset
        const startY = sourceY + uy * startOffset
        const endX = targetX - ux * endOffset
        const endY = targetY - uy * endOffset
        const arrowSize = 5.6 / Math.sqrt(scale)

        edgeContext.beginPath()
        edgeContext.moveTo(startX, startY)
        edgeContext.lineTo(endX, endY)
        edgeContext.stroke()
        edgeContext.beginPath()
        edgeContext.moveTo(endX, endY)
        edgeContext.lineTo(endX - ux * arrowSize - uy * arrowSize * 0.55, endY - uy * arrowSize + ux * arrowSize * 0.55)
        edgeContext.lineTo(endX - ux * arrowSize + uy * arrowSize * 0.55, endY - uy * arrowSize - ux * arrowSize * 0.55)
        edgeContext.closePath()
        edgeContext.fill()
      }

      function clearCanvas() {
        const ratio = window.devicePixelRatio || 1

        edgeContext.setTransform(ratio, 0, 0, ratio, 0, 0)
        edgeContext.clearRect(0, 0, edgeCanvas.width / ratio, edgeCanvas.height / ratio)
      }

      function resizeCanvas() {
        const width = window.innerWidth
        const height = window.innerHeight
        const ratio = window.devicePixelRatio || 1
        const nextWidth = Math.max(1, Math.floor(width * ratio))
        const nextHeight = Math.max(1, Math.floor(height * ratio))

        edgeCanvas.style.width = `${width}px`
        edgeCanvas.style.height = `${height}px`

        if (edgeCanvas.width !== nextWidth || edgeCanvas.height !== nextHeight) {
          edgeCanvas.width = nextWidth
          edgeCanvas.height = nextHeight
        }
      }

      function dragStarted(event, node) {
        stopLayoutAnimation()
        stopDragMotion()

        if (!event.active && state.simulation) {
          state.simulation.alphaTarget(0.18).restart()
        }

        const now = performance.now()

        state.dragMotion = {
          node,
          phase: 'drag',
          startedAt: now,
          lastTime: now,
          targetX: event.x,
          targetY: event.y,
          releaseStartedAt: 0,
          releaseFromX: node.x,
          releaseFromY: node.y,
          releaseToX: event.x,
          releaseToY: event.y
        }
        node.fx = node.x
        node.fy = node.y
        startDragMotionLoop()
      }

      function dragged(event, node) {
        if (!state.dragMotion || state.dragMotion.node !== node) {
          node.fx = event.x
          node.fy = event.y

          if (!state.simulation) {
            node.x = event.x
            node.y = event.y
          }

          scheduleGraphDraw()
          return
        }

        state.dragMotion.phase = 'drag'
        state.dragMotion.targetX = event.x
        state.dragMotion.targetY = event.y
        startDragMotionLoop()
      }

      function dragEnded(event, node) {
        if (!event.active && state.simulation) {
          state.simulation.alphaTarget(0)
        }

        if (!state.dragMotion || state.dragMotion.node !== node) {
          if (state.layoutMode === 'force') {
            node.fx = null
            node.fy = null
          }

          return
        }

        state.dragMotion.phase = 'release'
        state.dragMotion.targetX = event.x
        state.dragMotion.targetY = event.y
        state.dragMotion.releaseStartedAt = performance.now()
        state.dragMotion.releaseFromX = node.x
        state.dragMotion.releaseFromY = node.y
        state.dragMotion.releaseToX = event.x
        state.dragMotion.releaseToY = event.y
        startDragMotionLoop()
      }

      function startDragMotionLoop() {
        if (state.dragAnimationFrame || !state.dragMotion) {
          return
        }

        state.dragAnimationFrame = requestAnimationFrame(updateDragMotion)
      }

      function updateDragMotion(time) {
        state.dragAnimationFrame = 0

        const motion = state.dragMotion

        if (!motion) {
          return
        }

        const node = motion.node

        if (motion.phase === 'release') {
          const progress = clamp((time - motion.releaseStartedAt) / 240, 0, 1)
          const eased = easeOutCubic(progress)

          node.x = motion.releaseFromX + (motion.releaseToX - motion.releaseFromX) * eased
          node.y = motion.releaseFromY + (motion.releaseToY - motion.releaseFromY) * eased
          node.fx = node.x
          node.fy = node.y
          scheduleGraphDraw()

          if (progress < 1) {
            startDragMotionLoop()
            return
          }

          state.dragMotion = null

          if (state.layoutMode === 'force') {
            node.fx = null
            node.fy = null
          } else {
            node.fx = node.x
            node.fy = node.y
          }

          scheduleGraphDraw()
          return
        }

        const elapsed = time - motion.startedAt
        const delta = Math.max(1, Math.min(64, time - motion.lastTime))
        const windup = easeInOutCubic(clamp(elapsed / 180, 0, 1))
        const frameScale = delta / 16.67
        const follow = clamp((0.1 + windup * 0.28) * frameScale, 0.04, 0.62)

        motion.lastTime = time
        node.x += (motion.targetX - node.x) * follow
        node.y += (motion.targetY - node.y) * follow
        node.fx = node.x
        node.fy = node.y
        scheduleGraphDraw()
        startDragMotionLoop()
      }

      function stopDragMotion() {
        if (state.dragAnimationFrame) {
          cancelAnimationFrame(state.dragAnimationFrame)
          state.dragAnimationFrame = 0
        }

        if (state.dragMotion?.node && state.layoutMode === 'force') {
          state.dragMotion.node.fx = null
          state.dragMotion.node.fy = null
        }

        state.dragMotion = null
      }

      function easeInOutCubic(progress) {
        return progress < 0.5
          ? 4 * progress * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 3) / 2
      }

      function easeOutCubic(progress) {
        return 1 - Math.pow(1 - progress, 3)
      }

      function renderChart() {
        chartGridGroup.selectAll('*').remove()
        chartAxisGroup.selectAll('*').remove()
        chartAreaGroup.selectAll('*').remove()
        chartLineGroup.selectAll('*').remove()

        if (!state.seirSeries) {
          return
        }

        const layout = chartLayout()
        chartPlotGroup.attr('transform', `translate(${layout.plotLeft},${layout.plotTop})`)
        const x = scaleLinear()
          .domain([0, state.seirSeries.maxTime])
          .range([layout.innerLeft, layout.innerRight])
        const y = scaleLinear()
          .domain([0, 100])
          .nice()
          .range([layout.innerBottom, layout.innerTop])
        const timeAxisScale = scaleTime()
          .domain([new Date(0), new Date(state.seirSeries.maxTime * 1000)])
          .range([layout.innerLeft, layout.innerRight])

        chartGridGroup.append('g')
          .call(axisLeft(y)
            .tickSize(-layout.innerWidth)
            .tickFormat('')
            .ticks(6))
          .call((group) => group.select('.domain').remove())

        chartAxisGroup.append('g')
          .attr('class', 'axis')
          .attr('transform', `translate(0,${layout.innerBottom})`)
          .call(axisBottom(timeAxisScale).ticks(8).tickFormat(formatChartTime))

        chartAxisGroup.append('g')
          .attr('class', 'axis')
          .call(axisLeft(y).ticks(6).tickFormat((value) => `${format('~g')(value)}%`))
          .call((group) => group.select('.domain').remove())

        if (state.plotLayout === 'fill') {
          renderFillChart(x, y)
        } else {
          renderLineChart(x, y)
        }
      }

      function renderLineChart(x, y) {
        const times = state.seirSeries.time
        const curveLine = line()
          .x((_, index) => x(times[index]))
          .y((value) => y(seriesPercent(value)))
          .curve(curveLinear)

        for (const stateKey of stateKeys) {
          if (!state.showCurves[stateKey]) {
            continue
          }

          chartLineGroup.append('path')
            .datum(state.seirSeries[stateKey])
            .attr('class', `curve-line curve-${stateKey}`)
            .attr('stroke', colorByState[stateKey])
            .attr('d', curveLine)
        }
      }

      function renderFillChart(x, y) {
        const times = state.seirSeries.time
        const enabledStateKeys = stateKeys.filter((stateKey) => state.showCurves[stateKey])
        const cumulative = new Float64Array(times.length)
        const fillArea = area()
          .x((point) => x(point.time))
          .y0((point) => y(point.y0))
          .y1((point) => y(point.y1))
          .curve(curveLinear)
        const boundaryLine = line()
          .x((point) => x(point.time))
          .y((point) => y(point.y1))
          .curve(curveLinear)

        for (const stateKey of enabledStateKeys) {
          const values = state.seirSeries[stateKey]
          const band = new Array(times.length)

          for (let index = 0; index < times.length; index += 1) {
            const y0 = cumulative[index]
            const y1 = Math.min(100, y0 + seriesPercent(values[index]))

            cumulative[index] = y1
            band[index] = {
              time: times[index],
              y0,
              y1
            }
          }

          chartAreaGroup.append('path')
            .datum(band)
            .attr('class', `curve-fill fill-${stateKey}`)
            .attr('fill', colorByState[stateKey])
            .attr('fill-opacity', 0.28)
            .attr('d', fillArea)

          chartLineGroup.append('path')
            .datum(band)
            .attr('class', `curve-line curve-${stateKey}`)
            .attr('stroke', colorByState[stateKey])
            .attr('stroke-opacity', 0.78)
            .attr('d', boundaryLine)
        }
      }

      function seriesPercent(value) {
        return (Number(value) / Math.max(1, state.seirSeries.maxCount)) * 100
      }

      function chartLayout() {
        const viewport = svg.node().getBoundingClientRect()
        const width = Math.max(560, Math.min(1060, viewport.width - 160))
        const height = Math.max(360, Math.min(620, viewport.height - 210))
        const left = -width / 2
        const top = -height / 2
        const margin = {
          top: 22,
          right: 18,
          bottom: 42,
          left: 58
        }

        return {
          width,
          height,
          left,
          top,
          plotLeft: left + margin.left,
          plotTop: top + margin.top,
          innerLeft: 0,
          innerRight: width - margin.left - margin.right,
          innerTop: 0,
          innerBottom: height - margin.top - margin.bottom,
          innerWidth: width - margin.left - margin.right,
          innerHeight: height - margin.top - margin.bottom
        }
      }

      function formatChartTime(date) {
        const seconds = date.getTime() / 1000

        if (state.seirSeries?.maxTime <= 86400) {
          if (seconds < 3600) {
            return `${Math.round(seconds / 60)}m`
          }

          return `${format('~g')(seconds / 3600)}h`
        }

        return timeFormat('%b %d')(date)
      }

      function configureControls() {
        const maxValue = Math.max(state.maxTime, state.minTime + 1)

        for (const input of [startRange, endRange, startNumber, endNumber]) {
          input.min = String(state.minTime)
          input.max = String(maxValue)
          input.step = '1'
        }

        startRange.value = String(state.start)
        endRange.value = String(state.end)
        startNumber.value = String(state.start)
        endNumber.value = String(state.end)
        updateRangeSelection()
      }

      function setWindow(start, end) {
        const minValue = state.minTime
        const maxValue = Math.max(state.maxTime, minValue)
        const nextStart = clamp(Number.isFinite(start) ? start : minValue, minValue, maxValue)
        const nextEnd = clamp(Number.isFinite(end) ? end : maxValue, minValue, maxValue)

        state.start = Math.min(nextStart, nextEnd)
        state.end = Math.max(nextStart, nextEnd)
        startRange.value = String(Math.round(state.start))
        endRange.value = String(Math.round(state.end))
        startNumber.value = String(Math.round(state.start))
        endNumber.value = String(Math.round(state.end))
        updateRangeSelection()
        scheduleWindowData()
      }

      function updateRangeSelection() {
        const minValue = Number(startRange.min)
        const maxValue = Number(startRange.max)
        const span = Math.max(1, maxValue - minValue)
        const startPercent = ((state.start - minValue) / span) * 100
        const endPercent = ((state.end - minValue) / span) * 100

        rangeSelection.style.left = `${clamp(startPercent, 0, 100)}%`
        rangeSelection.style.right = `${100 - clamp(endPercent, 0, 100)}%`
      }

      function setEdgeDisplay() {
        state.showContacts = showContactsInput.checked
        state.showInfections = showInfectionsInput.checked
        state.showFamilyEdges = showFamilyEdgesInput.checked && isWorldEdgeAvailable('family')
        state.showFriendshipEdges = showFriendshipEdgesInput.checked && isWorldEdgeAvailable('friendship')
        state.showCoworkerEdges = showCoworkerEdgesInput.checked && isWorldEdgeAvailable('coworker')
        showFamilyEdgesInput.checked = state.showFamilyEdges
        showFriendshipEdgesInput.checked = state.showFriendshipEdges
        showCoworkerEdgesInput.checked = state.showCoworkerEdges
        rebuildSelectionNeighborhood()
        applyNodeStyles()
        updateLegend()
        scheduleGraphDraw()
      }

      function setNodeColorMode() {
        const nextMode = nodeColorModeSelect.value

        state.nodeColorMode = isNodeColorModeAvailable(nextMode) ? nextMode : 'seir'
        nodeColorModeSelect.value = state.nodeColorMode
        applyNodeStyles()
        updateLegend()
      }

      function setPlotLayout() {
        state.plotLayout = plotLayoutSelect.value === 'fill' ? 'fill' : 'plot'
        plotLayoutSelect.value = state.plotLayout
        renderChart()
      }

      function setNodeSize() {
        const nextSize = Number(nodeSizeInput.value)

        state.nodeSizeScale = Number.isFinite(nextSize) ? clamp(nextSize, 1, 3) : 1
        applyNodeStyles()
        scheduleGraphDraw()
      }

      function setNodeFloatDisplay() {
        state.floatNodes = floatNodesInput.checked

        if (state.floatNodes && state.floatIntensity > 0) {
          startFloatingAnimation()
        } else {
          stopFloatingAnimation()
        }

        scheduleGraphDraw()
      }

      function setFloatIntensity() {
        const nextIntensity = Number(floatIntensityInput.value)

        state.floatIntensity = Number.isFinite(nextIntensity) ? clamp(nextIntensity, 0, 5) : 1

        if (state.floatNodes && state.floatIntensity > 0) {
          startFloatingAnimation()
        } else if (state.floatIntensity <= 0) {
          stopFloatingAnimation()
        }

        scheduleGraphDraw()
      }

      function setCurveDisplay() {
        state.showCurves.susceptible = showSusceptibleInput.checked
        state.showCurves.exposed = showExposedInput.checked
        state.showCurves.infectious = showInfectiousInput.checked
        state.showCurves.recovered = showRecoveredInput.checked

        renderChart()
        updateLegend()
      }

      function setActiveTab(tab) {
        if (state.activeTab === tab) {
          return
        }

        state.activeTab = tab === 'seir' ? 'seir' : 'contact'
        document.body.dataset.view = state.activeTab
        edgeCanvas.hidden = state.activeTab !== 'contact'
        contactGraphTab.setAttribute('aria-selected', state.activeTab === 'contact' ? 'true' : 'false')
        seirCurveTab.setAttribute('aria-selected', state.activeTab === 'seir' ? 'true' : 'false')
        graphRoot.style('display', state.activeTab === 'contact' ? null : 'none')
        chartRoot.style('display', state.activeTab === 'seir' ? null : 'none')
        hideTooltip()
        applyActiveTransform()
        updateLegend()
        scheduleGraphDraw()

        if (state.activeTab === 'contact') {
          startFloatingAnimation()
        } else {
          stopFloatingAnimation()
        }
      }

      function applyActiveTransform() {
        const transform = state.activeTab === 'contact' ? state.graphTransform : state.chartTransform

        svg.call(graphZoom.transform, transform)
      }

      function resize() {
        const width = window.innerWidth
        const height = window.innerHeight

        resizeCanvas()
        svg.attr('width', width).attr('height', height).attr('viewBox', `0 0 ${width} ${height}`)

        if (!state.loaded) {
          state.graphTransform = centeredTransform()
          state.chartTransform = centeredTransform()
          applyActiveTransform()
          scheduleGraphDraw()
          return
        }

        renderChart()
        applyActiveTransform()
        scheduleGraphDraw()
      }

      function centeredTransform() {
        return zoomIdentity.translate(window.innerWidth / 2, window.innerHeight / 2 + 18)
      }

      function updateStats() {
        nodeCountEl.textContent = integerFormat(state.npcs.length)
        edgeCountEl.textContent = integerFormat(state.stats.contactEventCount || 0)
        activeNodeCountEl.textContent = integerFormat(state.stats.activeNodeCount || 0)
        durationLabelEl.textContent = formatTime(Math.max(0, state.end - state.start))
      }

      function showNodeTooltip(event, node) {
        const worldRows = node.worldMatched
          ? [
              ['Age', Number.isFinite(Number(node.age)) ? String(node.age) : 'unknown'],
              ['Family', describeGroup(node.familyId, node.familyRole)],
              ['Class', node.classId || 'none'],
              ['Office', node.officeId || 'none'],
              ['Home', node.homeBuildingId || 'unknown'],
              ['School', node.schoolBuildingId || 'none'],
              ['Work', node.workBuildingId || 'none']
            ]
          : []
        tooltip.hidden = false
        tooltip.style.left = `${event.clientX}px`
        tooltip.style.top = `${event.clientY}px`
        tooltip.innerHTML = `
          <b>${escapeHtml(node.id)}</b>
          <span>State: ${escapeHtml(stateNames[state.currentStateCodes[node.index] ?? node.initialSeirStateCode] || node.initialSeirState)}</span>
          <span>Contacts: ${integerFormat(state.degrees[node.index] || 0)}</span>
          ${worldRows.map(([label, value]) => `<span>${escapeHtml(label)}: ${escapeHtml(value)}</span>`).join('')}
        `
      }

      function hideTooltip() {
        tooltip.hidden = true
      }

      function setStatus(message) {
        statusEl.textContent = message
        statusEl.hidden = false
      }

      function hideStatus() {
        statusEl.hidden = true
      }

      function showTemporaryStatus(message) {
        setStatus(message)
        window.setTimeout(() => {
          if (statusEl.textContent === message) {
            hideStatus()
          }
        }, 2600)
      }

      function createEmptyWorldMetadata() {
        return {
          loaded: false,
          sourceName: '',
          npcById: new Map(),
          buildingsById: new Map(),
          families: [],
          classes: [],
          offices: [],
          matchedNpcCount: 0,
          counts: {
            npcs: 0,
            buildings: 0,
            families: 0,
            classes: 0,
            offices: 0
          },
          available: {
            family: false,
            class: false,
            office: false,
            familyEdges: false,
            friendshipEdges: false,
            coworkerEdges: false,
            familyBuildingLayout: false,
            officeBuildingLayout: false
          }
        }
      }

      function parseWorldMetadata(payload, sourceName) {
        if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
          throw new Error('World JSON must be an object.')
        }

        if (payload.format && payload.format !== 'epi-city-headless-world') {
          throw new Error(`Unsupported world format "${payload.format}".`)
        }

        if (!Array.isArray(payload.npcs)) {
          throw new Error('World JSON must include an npcs array.')
        }

        const npcById = new Map()

        for (const npc of payload.npcs) {
          const id = normalizeNpcId(npc?.id ?? npc?.index)

          if (!id) {
            continue
          }

          npcById.set(id, {
            age: Number.isFinite(Number(npc?.age)) ? Number(npc.age) : null,
            familyId: normalizeGroupId(npc?.familyId, 'family'),
            familyRole: normalizeStringOrNull(npc?.familyRole),
            classId: normalizeGroupId(npc?.classId, 'class'),
            officeId: normalizeGroupId(npc?.officeId, 'office'),
            homeBuildingId: normalizeStringOrNull(npc?.homeBuildingId),
            schoolBuildingId: normalizeStringOrNull(npc?.schoolBuildingId),
            workBuildingId: normalizeStringOrNull(npc?.workBuildingId),
            friendIds: normalizeNpcIdArray(npc?.friendIds)
          })
        }

        const groupSource = payload.groups && typeof payload.groups === 'object' && !Array.isArray(payload.groups)
          ? payload.groups
          : payload
        const families = parseWorldGroups(groupSource.families, 'family', 'memberIds', 'homeBuildingId')
        const classes = parseWorldGroups(groupSource.classes, 'class', 'studentIds', 'schoolBuildingId')
        const offices = parseWorldGroups(groupSource.offices, 'office', 'workerIds', 'workBuildingId')
        const buildingsById = parseWorldBuildings(payload.buildings)

        applyWorldGroupBacklinks(npcById, families, 'family', 'memberIds')
        applyWorldGroupBacklinks(npcById, classes, 'class', 'studentIds')
        applyWorldGroupBacklinks(npcById, offices, 'office', 'workerIds')

        const metadata = [...npcById.values()]
        const hasFamily = metadata.some((npc) => Boolean(npc.familyId))
        const hasClass = metadata.some((npc) => Boolean(npc.classId))
        const hasOffice = metadata.some((npc) => Boolean(npc.officeId))
        const hasFriendships = metadata.some((npc) => npc.friendIds.length > 0)

        return {
          loaded: true,
          sourceName,
          npcById,
          buildingsById,
          families,
          classes,
          offices,
          matchedNpcCount: 0,
          counts: {
            npcs: npcById.size,
            buildings: buildingsById.size,
            families: families.length,
            classes: classes.length,
            offices: offices.length
          },
          available: {
            family: hasFamily,
            class: hasClass,
            office: hasOffice,
            familyEdges: hasFamily,
            friendshipEdges: hasFriendships,
            coworkerEdges: hasOffice,
            familyBuildingLayout: hasFamily && buildingsById.size > 0,
            officeBuildingLayout: hasOffice && buildingsById.size > 0
          }
        }
      }

      function parseWorldGroups(groups, kind, memberField, buildingField) {
        if (!Array.isArray(groups)) {
          return []
        }

        const parsed = []

        for (const group of groups) {
          const id = normalizeGroupId(group?.id, kind)

          if (!id) {
            continue
          }

          parsed.push({
            id,
            [memberField]: normalizeNpcIdArray(group?.[memberField]),
            [buildingField]: normalizeStringOrNull(group?.[buildingField]),
            adultIds: normalizeNpcIdArray(group?.adultIds),
            childIds: normalizeNpcIdArray(group?.childIds)
          })
        }

        return parsed
      }

      function parseWorldBuildings(buildings) {
        const buildingsById = new Map()

        if (!Array.isArray(buildings)) {
          return buildingsById
        }

        for (const building of buildings) {
          const id = normalizeStringOrNull(building?.id)

          if (!id) {
            continue
          }

          const center = buildingCenterFromSpans(building?.spans)

          buildingsById.set(id, {
            id,
            types: Array.isArray(building?.types) ? building.types.map(String) : [],
            entrance: building?.entrance && typeof building.entrance === 'object'
              ? {
                  x: Number(building.entrance.x),
                  y: Number(building.entrance.y)
                }
              : null,
            spans: Array.isArray(building?.spans) ? building.spans.map((span) => [...span]) : [],
            center
          })
        }

        return buildingsById
      }

      function buildingCenterFromSpans(spans) {
        if (!Array.isArray(spans) || spans.length === 0) {
          return null
        }

        let weightedX = 0
        let weightedY = 0
        let tileCount = 0

        for (const span of spans) {
          if (!Array.isArray(span) || span.length !== 3) {
            continue
          }

          const y = Number(span[0])
          const x = Number(span[1])
          const length = Number(span[2])

          if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(length) || length <= 0) {
            continue
          }

          weightedX += (x + length / 2) * length
          weightedY += (y + 0.5) * length
          tileCount += length
        }

        return tileCount > 0
          ? {
              x: weightedX / tileCount,
              y: weightedY / tileCount
            }
          : null
      }

      function applyWorldGroupBacklinks(npcById, groups, kind, memberField) {
        for (const group of groups) {
          const groupId = normalizeGroupId(group?.id, kind)
          const memberIds = Array.isArray(group?.[memberField]) ? group[memberField] : []

          if (!groupId) {
            continue
          }

          for (const rawMemberId of memberIds) {
            const memberId = normalizeNpcId(rawMemberId)
            const metadata = npcById.get(memberId)

            if (!metadata) {
              continue
            }

            metadata[`${kind}Id`] = metadata[`${kind}Id`] || groupId

            if (kind === 'family') {
              metadata.homeBuildingId = metadata.homeBuildingId || group.homeBuildingId || null
            } else if (kind === 'class') {
              metadata.schoolBuildingId = metadata.schoolBuildingId || group.schoolBuildingId || null
            } else if (kind === 'office') {
              metadata.workBuildingId = metadata.workBuildingId || group.workBuildingId || null
            }

            if (kind === 'family' && !metadata.familyRole) {
              metadata.familyRole = group.childIds.includes(memberId)
                ? 'child'
                : group.adultIds.includes(memberId)
                  ? 'adult'
                  : null
            }
          }
        }
      }

      function applyWorldMetadata() {
        let matchedNpcCount = 0

        for (const node of state.npcs) {
          clearNodeWorldMetadata(node)

          if (!state.world.loaded) {
            continue
          }

          const metadata = state.world.npcById.get(node.id)

          if (!metadata) {
            continue
          }

          Object.assign(node, metadata, { worldMatched: true })
          matchedNpcCount += 1
        }

        state.world.matchedNpcCount = matchedNpcCount
        rebuildWorldRelationshipEdges()
      }

      function clearNodeWorldMetadata(node) {
        node.worldMatched = false
        node.age = null
        node.familyId = null
        node.familyRole = null
        node.classId = null
        node.officeId = null
        node.homeBuildingId = null
        node.schoolBuildingId = null
        node.workBuildingId = null
        node.friendIds = []
      }

      function rebuildWorldRelationshipEdges() {
        if (!state.world.loaded || state.npcs.length === 0) {
          setRelationshipEdgeArrays([], [], [], [], [], [])
          return
        }

        const idToNodeIndex = new Map(state.npcs.map((node) => [node.id, node.index]))
        const family = createGroupRelationshipEdges(state.world.families, 'memberIds', idToNodeIndex, 'familyId')
        const coworker = createGroupRelationshipEdges(state.world.offices, 'workerIds', idToNodeIndex, 'officeId')
        const friendship = createFriendshipRelationshipEdges(idToNodeIndex)

        setRelationshipEdgeArrays(
          family.source,
          family.target,
          friendship.source,
          friendship.target,
          coworker.source,
          coworker.target
        )
      }

      function setRelationshipEdgeArrays(familySource, familyTarget, friendshipSource, friendshipTarget, coworkerSource, coworkerTarget) {
        state.familySource = Int32Array.from(familySource)
        state.familyTarget = Int32Array.from(familyTarget)
        state.friendshipSource = Int32Array.from(friendshipSource)
        state.friendshipTarget = Int32Array.from(friendshipTarget)
        state.coworkerSource = Int32Array.from(coworkerSource)
        state.coworkerTarget = Int32Array.from(coworkerTarget)
        rebuildSelectionNeighborhood()
      }

      function createGroupRelationshipEdges(groups, memberField, idToNodeIndex, metadataField = null) {
        const source = []
        const target = []
        const seen = new Set()

        for (const group of groups) {
          const members = normalizeVisibleMemberIndexes(group?.[memberField], idToNodeIndex)

          for (let leftIndex = 0; leftIndex < members.length; leftIndex += 1) {
            for (let rightIndex = leftIndex + 1; rightIndex < members.length; rightIndex += 1) {
              pushUniqueUndirectedEdge(source, target, seen, members[leftIndex], members[rightIndex])
            }
          }
        }

        if (metadataField) {
          appendMetadataGroupRelationshipEdges(source, target, seen, metadataField)
        }

        return { source, target }
      }

      function appendMetadataGroupRelationshipEdges(source, target, seen, metadataField) {
        const groupsById = new Map()

        for (const node of state.npcs) {
          if (!node.worldMatched) {
            continue
          }

          const groupId = normalizeStringOrNull(node[metadataField])

          if (!groupId) {
            continue
          }

          let members = groupsById.get(groupId)

          if (!members) {
            members = []
            groupsById.set(groupId, members)
          }

          members.push(node.index)
        }

        const groupIds = [...groupsById.keys()].sort((left, right) => String(left).localeCompare(String(right)))

        for (const groupId of groupIds) {
          const members = groupsById.get(groupId).sort((left, right) => left - right)

          for (let leftIndex = 0; leftIndex < members.length; leftIndex += 1) {
            for (let rightIndex = leftIndex + 1; rightIndex < members.length; rightIndex += 1) {
              pushUniqueUndirectedEdge(source, target, seen, members[leftIndex], members[rightIndex])
            }
          }
        }
      }

      function createFriendshipRelationshipEdges(idToNodeIndex) {
        const source = []
        const target = []
        const seen = new Set()

        for (const [npcId, metadata] of state.world.npcById.entries()) {
          const sourceIndex = idToNodeIndex.get(npcId)

          if (!Number.isInteger(sourceIndex)) {
            continue
          }

          for (const friendId of metadata.friendIds || []) {
            const targetIndex = idToNodeIndex.get(friendId)

            if (!Number.isInteger(targetIndex)) {
              continue
            }

            pushUniqueUndirectedEdge(source, target, seen, sourceIndex, targetIndex)
          }
        }

        return { source, target }
      }

      function normalizeVisibleMemberIndexes(memberIds, idToNodeIndex) {
        if (!Array.isArray(memberIds)) {
          return []
        }

        const members = []
        const seen = new Set()

        for (const memberId of memberIds) {
          const nodeIndex = idToNodeIndex.get(memberId)

          if (!Number.isInteger(nodeIndex) || seen.has(nodeIndex)) {
            continue
          }

          seen.add(nodeIndex)
          members.push(nodeIndex)
        }

        members.sort((left, right) => left - right)
        return members
      }

      function pushUniqueUndirectedEdge(source, target, seen, left, right) {
        if (left === right) {
          return
        }

        const low = Math.min(left, right)
        const high = Math.max(left, right)
        const key = nodePairKey(low, high)

        if (seen.has(key)) {
          return
        }

        seen.add(key)
        source.push(low)
        target.push(high)
      }

      function updateWorldControls() {
        worldSettings.hidden = !state.world.loaded
        nodeColorModeSelect.querySelector('option[value="family"]').disabled = !isNodeColorModeAvailable('family')
        nodeColorModeSelect.querySelector('option[value="class"]').disabled = !isNodeColorModeAvailable('class')
        nodeColorModeSelect.querySelector('option[value="office"]').disabled = !isNodeColorModeAvailable('office')
        layoutSelect.querySelector('option[value="familyBuildings"]').disabled = !isLayoutModeAvailable('familyBuildings')
        layoutSelect.querySelector('option[value="officeBuildings"]').disabled = !isLayoutModeAvailable('officeBuildings')
        showFamilyEdgesInput.disabled = !isWorldEdgeAvailable('family')
        showFriendshipEdgesInput.disabled = !isWorldEdgeAvailable('friendship')
        showCoworkerEdgesInput.disabled = !isWorldEdgeAvailable('coworker')

        if (!isWorldEdgeAvailable('family')) {
          state.showFamilyEdges = false
          showFamilyEdgesInput.checked = false
        }

        if (!isWorldEdgeAvailable('friendship')) {
          state.showFriendshipEdges = false
          showFriendshipEdgesInput.checked = false
        }

        if (!isWorldEdgeAvailable('coworker')) {
          state.showCoworkerEdges = false
          showCoworkerEdgesInput.checked = false
        }

        if (!isNodeColorModeAvailable(state.nodeColorMode)) {
          state.nodeColorMode = 'seir'
        }

        if (!isLayoutModeAvailable(state.layoutMode)) {
          state.layoutMode = 'force'
        }

        nodeColorModeSelect.value = state.nodeColorMode
        layoutSelect.value = state.layoutMode

        if (!state.world.loaded) {
          worldSummary.textContent = 'No world loaded.'
          return
        }

        const counts = state.world.counts
        worldSummary.textContent = `${integerFormat(state.world.matchedNpcCount)} of ${integerFormat(state.npcs.length)} visible NPCs matched. ` +
          `${integerFormat(counts.buildings)} buildings, ${integerFormat(counts.families)} families, ${integerFormat(counts.classes)} classes, ${integerFormat(counts.offices)} offices.`
      }

      function isNodeColorModeAvailable(mode) {
        if (mode === 'seir') {
          return true
        }

        return Boolean(state.world.loaded && state.world.available[mode])
      }

      function isWorldEdgeAvailable(kind) {
        if (kind === 'family') {
          return Boolean(state.world.loaded && state.familySource.length > 0)
        }

        if (kind === 'friendship') {
          return Boolean(state.world.loaded && state.friendshipSource.length > 0)
        }

        if (kind === 'coworker') {
          return Boolean(state.world.loaded && state.coworkerSource.length > 0)
        }

        return false
      }

      function isLayoutModeAvailable(mode) {
        if (mode === 'force' || mode === 'spherical' || mode === 'hierarchical' || mode === 'infectionMap') {
          return true
        }

        if (mode === 'familyBuildings') {
          return Boolean(state.world.loaded && state.world.available.familyBuildingLayout)
        }

        if (mode === 'officeBuildings') {
          return Boolean(state.world.loaded && state.world.available.officeBuildingLayout)
        }

        return false
      }

      function updateSourceLabel() {
        const parts = []

        if (state.resultSourceName) {
          parts.push(state.resultSourceName)
        }

        if (state.world.loaded) {
          parts.push(`world: ${state.world.sourceName}`)
        }

        sourceEl.textContent = parts.length > 0 ? parts.join(' + ') : 'No dataset'
      }

      function updateLegend() {
        const items = []

        if (state.activeTab === 'seir' || state.nodeColorMode === 'seir') {
          const legendStateKeys = state.activeTab === 'seir'
            ? stateKeys.filter((stateKey) => state.showCurves[stateKey])
            : stateKeys

          for (const stateKey of legendStateKeys) {
            items.push(legendItem(`<span class="swatch" style="background: ${colorByState[stateKey]}"></span>`, capitalize(stateKey)))
          }
        } else {
          items.push(legendItem(`<span class="swatch" style="background: ${groupColor(`${state.nodeColorMode}_0`, 11)}"></span>`, `${capitalize(state.nodeColorMode)} groups`))
          items.push(legendItem('<span class="swatch" style="background: #d9dedb"></span>', 'Unassigned'))
        }

        if (state.activeTab === 'contact') {
          if (state.showContacts) {
            items.push(legendItem('<span class="swatch-line" style="background: var(--contact)"></span>', 'Contact'))
          }

          if (state.showFamilyEdges) {
            items.push(legendItem('<span class="swatch-line" style="background: var(--family-edge)"></span>', 'Family'))
          }

          if (state.showFriendshipEdges) {
            items.push(legendItem('<span class="swatch-line" style="background: var(--friendship-edge)"></span>', 'Friendship'))
          }

          if (state.showCoworkerEdges) {
            items.push(legendItem('<span class="swatch-line" style="background: var(--coworker-edge)"></span>', 'Coworker'))
          }

          if (state.showInfections) {
            items.push(legendItem('<span class="swatch-line" style="background: var(--infection)"></span>', 'Infection'))
          }
        }

        legend.innerHTML = items.join('')
      }

      function legendItem(marker, label) {
        return `<div class="legend-item">${marker}${escapeHtml(label)}</div>`
      }

      function worldLoadedMessage() {
        return state.loaded
          ? `World loaded: ${integerFormat(state.world.matchedNpcCount)} matching NPCs`
          : 'World loaded; load a headless result JSON to visualize it'
      }

      function normalizeNpcId(value) {
        if (Number.isInteger(value) && value >= 0) {
          return `npc_${value}`
        }

        const match = String(value ?? '').match(/^npc_(\d+)$/)

        return match ? `npc_${Number(match[1])}` : null
      }

      function normalizeNpcIdArray(values) {
        if (!Array.isArray(values)) {
          return []
        }

        const normalized = []
        const seen = new Set()

        for (const value of values) {
          const id = normalizeNpcId(value)

          if (!id || seen.has(id)) {
            continue
          }

          seen.add(id)
          normalized.push(id)
        }

        return normalized
      }

      function normalizeGroupId(value, kind) {
        if (value == null) {
          return null
        }

        if (Number.isInteger(value) && value >= 0) {
          return `${kind}_${value}`
        }

        const match = String(value).match(new RegExp(`^${kind}_(\\d+)$`))

        return match ? `${kind}_${Number(match[1])}` : null
      }

      function normalizeStringOrNull(value) {
        return value == null ? null : String(value)
      }

      function describeGroup(groupId, role = null) {
        if (!groupId) {
          return 'none'
        }

        return role ? `${groupId} (${role})` : groupId
      }

      function groupColor(groupId, salt) {
        const hash = hashString(`${groupId}:${salt}`)
        const hue = hash % 360
        const saturation = 58 + (hash % 19)
        const lightness = 43 + ((hash >>> 8) % 13)

        return `hsl(${hue} ${saturation}% ${lightness}%)`
      }

      function hashString(value) {
        let hash = 2166136261

        for (let index = 0; index < String(value).length; index += 1) {
          hash ^= String(value).charCodeAt(index)
          hash = Math.imul(hash, 16777619)
        }

        return hash >>> 0
      }

      function capitalize(value) {
        return `${String(value).slice(0, 1).toUpperCase()}${String(value).slice(1)}`
      }

      function stopSimulation() {
        stopLayoutAnimation()
        stopDragMotion()

        if (state.simulation) {
          state.simulation.stop()
          state.simulation = null
        }
      }

      function formatTime(seconds) {
        const value = Math.max(0, Math.round(seconds))

        if (value < 60) {
          return `${value}s`
        }

        if (value < 3600) {
          return `${Math.floor(value / 60)}m`
        }

        if (value < 86400) {
          return `${format('.1f')(value / 3600)}h`
        }

        return `${format('.1f')(value / 86400)}d`
      }

      function clamp(value, minValue, maxValue) {
        return Math.min(Math.max(value, minValue), maxValue)
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;')
      }
    </script>
  </body>
</html>
