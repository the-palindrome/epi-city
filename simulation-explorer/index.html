<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Epi City Simulation Explorer</title>
    <script src="/vendor/d3.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --panel: rgba(255, 255, 255, 0.9);
        --panel-strong: rgba(255, 255, 255, 0.98);
        --line: rgba(32, 38, 35, 0.18);
        --grid: rgba(32, 38, 35, 0.18);
        --text: #202621;
        --muted: #6b746f;
        --susceptible: #b6b83a;
        --exposed: #f47c2a;
        --infectious: #e1363f;
        --recovered: #07974d;
        --contact: #a9a9a9;
        --infection: #d84c55;
        --active: #f5ecd2;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #viz {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: var(--bg);
        cursor: grab;
      }

      #viz:active {
        cursor: grabbing;
      }

      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        min-height: 58px;
        display: grid;
        grid-template-columns: minmax(220px, 0.82fr) minmax(360px, 1.2fr) minmax(440px, 1.36fr);
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-strong);
        backdrop-filter: blur(14px);
        z-index: 4;
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1;
        font-weight: 700;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .source {
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .time-controls {
        display: grid;
        grid-template-columns: auto 190px minmax(220px, 1fr);
        gap: 8px 12px;
        align-items: center;
      }

      label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #bd8800;
      }

      input[type="checkbox"] {
        width: 14px;
        height: 14px;
        margin: 0;
        accent-color: var(--infection);
      }

      input[type="number"],
      button,
      .file-control {
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.95);
        color: var(--text);
        font: inherit;
      }

      input[type="number"] {
        width: 84px;
        padding: 0 8px;
      }

      .time-inputs {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .range-separator {
        color: var(--muted);
        font-size: 11px;
      }

      .dual-range {
        position: relative;
        height: 34px;
        min-width: 220px;
      }

      .range-track {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 5px;
        border-radius: 999px;
        background: rgba(32, 38, 35, 0.18);
        transform: translateY(-50%);
      }

      .range-selection {
        position: absolute;
        top: 0;
        bottom: 0;
        border-radius: inherit;
        background: #bd8800;
      }

      .dual-range input[type="range"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 34px;
        margin: 0;
        appearance: none;
        background: transparent;
        pointer-events: none;
      }

      .dual-range input[type="range"]::-webkit-slider-runnable-track {
        height: 5px;
        background: transparent;
      }

      .dual-range input[type="range"]::-moz-range-track {
        height: 5px;
        background: transparent;
      }

      .dual-range input[type="range"]::-webkit-slider-thumb {
        width: 16px;
        height: 16px;
        border: 0;
        border-radius: 50%;
        appearance: none;
        background: #bd8800;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.95);
        cursor: pointer;
        pointer-events: auto;
      }

      .dual-range input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border: 0;
        border-radius: 50%;
        background: #bd8800;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.95);
        cursor: pointer;
        pointer-events: auto;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px 12px;
        min-width: 0;
        flex-wrap: wrap;
      }

      .display-control {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex-wrap: wrap;
      }

      .control-title {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .checkbox-control {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: var(--text);
        font-size: 12px;
        text-transform: none;
        white-space: nowrap;
      }

      button,
      .file-control {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 0 10px;
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover,
      .file-control:hover {
        border-color: rgba(189, 136, 0, 0.58);
      }

      input[type="file"] {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      body[data-view="contact"] .curve-control,
      body[data-view="seir"] .graph-control,
      body[data-view="seir"] .stats,
      body[data-view="contact"] .curve-stat {
        display: none;
      }

      body[data-view="seir"] .actions {
        grid-column: 2 / -1;
      }

      .stats {
        position: fixed;
        left: 12px;
        bottom: 70px;
        display: grid;
        grid-template-columns: repeat(4, minmax(86px, auto));
        gap: 8px;
        z-index: 3;
      }

      .stat {
        min-height: 50px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        backdrop-filter: blur(12px);
      }

      .stat b {
        display: block;
        margin-bottom: 2px;
        font-size: 17px;
        line-height: 1;
        letter-spacing: 0;
      }

      .stat span {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      .legend {
        position: fixed;
        right: 12px;
        bottom: 70px;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px 12px;
        max-width: 420px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        z-index: 3;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        white-space: nowrap;
      }

      body[data-view="seir"] .graph-legend-item {
        display: none;
      }

      .swatch {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .swatch-line {
        width: 18px;
        height: 3px;
        border-radius: 999px;
      }

      .view-tabs {
        position: fixed;
        left: 50%;
        bottom: 12px;
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        transform: translateX(-50%);
        z-index: 4;
      }

      .tab-button {
        min-width: 112px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
      }

      .tab-button[aria-selected="true"] {
        background: var(--active);
        color: var(--text);
      }

      .status {
        position: fixed;
        top: 70px;
        left: 50%;
        max-width: min(520px, calc(100vw - 24px));
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--muted);
        transform: translateX(-50%);
        z-index: 5;
      }

      .status[hidden] {
        display: none;
      }

      .tooltip {
        position: fixed;
        min-width: 180px;
        max-width: 280px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.97);
        color: var(--text);
        pointer-events: none;
        transform: translate(12px, 12px);
        z-index: 6;
      }

      .tooltip[hidden] {
        display: none;
      }

      .tooltip b {
        display: block;
        margin-bottom: 4px;
      }

      .tooltip span {
        display: block;
        color: var(--muted);
      }

      .contact-link {
        stroke: var(--contact);
        stroke-linecap: round;
        vector-effect: non-scaling-stroke;
      }

      .infection-link {
        stroke: var(--infection);
        stroke-linecap: round;
        vector-effect: non-scaling-stroke;
      }

      .node {
        cursor: pointer;
      }

      .axis path,
      .axis line {
        stroke: #202621;
        stroke-width: 1;
        shape-rendering: crispEdges;
      }

      .axis text {
        fill: var(--text);
        font-size: 12px;
      }

      .grid line {
        stroke: var(--grid);
        shape-rendering: crispEdges;
      }

      .curve-line {
        fill: none;
        stroke-width: 2;
        stroke-linejoin: round;
        stroke-linecap: round;
        vector-effect: non-scaling-stroke;
      }

      @media (max-width: 880px) {
        .topbar {
          grid-template-columns: 1fr;
          gap: 8px;
          align-items: start;
        }

        .time-controls {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: flex-start;
        }

        body[data-view="seir"] .actions {
          grid-column: auto;
        }

        .stats {
          right: 12px;
          bottom: 66px;
          grid-template-columns: repeat(2, minmax(86px, 1fr));
        }

        .legend {
          display: none;
        }
      }
    </style>
  </head>
  <body data-view="contact">
    <svg id="viz" aria-label="Simulation explorer visualization"></svg>
    <div class="topbar">
      <div class="brand">
        <h1>Simulation Explorer</h1>
        <div id="source" class="source">No dataset</div>
      </div>
      <div class="time-controls graph-control">
        <label for="startRange">Time window</label>
        <div class="time-inputs">
          <input id="startNumber" type="number" value="0" min="0" step="1" aria-label="Start time">
          <span class="range-separator">to</span>
          <input id="endNumber" type="number" value="0" min="0" step="1" aria-label="End time">
        </div>
        <div class="dual-range">
          <div class="range-track"><div id="rangeSelection" class="range-selection"></div></div>
          <input id="startRange" type="range" value="0" min="0" max="0" step="1" aria-label="Start time">
          <input id="endRange" type="range" value="0" min="0" max="0" step="1" aria-label="End time">
        </div>
      </div>
      <div class="actions">
        <div class="display-control graph-control" aria-label="Display edges">
          <span class="control-title">Display edges</span>
          <label class="checkbox-control">
            <input id="showContacts" type="checkbox" checked>
            Contact
          </label>
          <label class="checkbox-control">
            <input id="showInfections" type="checkbox" checked>
            Infection
          </label>
        </div>
        <div class="display-control curve-control" aria-label="Display curves">
          <span class="control-title">Display curves</span>
          <label class="checkbox-control">
            <input id="showSusceptible" type="checkbox" checked>
            Susceptible
          </label>
          <label class="checkbox-control">
            <input id="showExposed" type="checkbox" checked>
            Exposed
          </label>
          <label class="checkbox-control">
            <input id="showInfectious" type="checkbox" checked>
            Infectious
          </label>
          <label class="checkbox-control">
            <input id="showRecovered" type="checkbox" checked>
            Recovered
          </label>
        </div>
        <label class="file-control">
          Load JSON
          <input id="fileInput" type="file" accept="application/json,.json">
        </label>
      </div>
    </div>
    <div id="status" class="status">Load a headless result JSON</div>
    <div class="stats">
      <div class="stat"><b id="nodeCount">0</b><span>NPCs</span></div>
      <div class="stat"><b id="edgeCount">0</b><span>Contacts</span></div>
      <div class="stat"><b id="activeNodeCount">0</b><span>Active NPCs</span></div>
      <div class="stat"><b id="durationLabel">0s</b><span>Window</span></div>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="swatch" style="background: var(--susceptible)"></span>Susceptible</div>
      <div class="legend-item"><span class="swatch" style="background: var(--exposed)"></span>Exposed</div>
      <div class="legend-item"><span class="swatch" style="background: var(--infectious)"></span>Infectious</div>
      <div class="legend-item"><span class="swatch" style="background: var(--recovered)"></span>Recovered</div>
      <div class="legend-item graph-legend-item"><span class="swatch-line" style="background: var(--contact)"></span>Contact</div>
      <div class="legend-item graph-legend-item"><span class="swatch-line" style="background: var(--infection)"></span>Infection</div>
    </div>
    <div class="view-tabs" role="tablist" aria-label="Explorer views">
      <button id="contactGraphTab" class="tab-button" type="button" role="tab" aria-selected="true">Contact graph</button>
      <button id="seirCurveTab" class="tab-button" type="button" role="tab" aria-selected="false">SEIR curve</button>
    </div>
    <div id="tooltip" class="tooltip" hidden></div>

    <script>
      const {
        axisBottom,
        axisLeft,
        curveLinear,
        drag,
        extent,
        forceCenter,
        forceCollide,
        forceLink,
        forceManyBody,
        forceSimulation,
        format,
        line,
        max,
        scaleLinear,
        scaleTime,
        select,
        timeFormat,
        zoom,
        zoomIdentity
      } = d3

      const svg = select('#viz')
      const sourceEl = document.getElementById('source')
      const statusEl = document.getElementById('status')
      const startRange = document.getElementById('startRange')
      const endRange = document.getElementById('endRange')
      const rangeSelection = document.getElementById('rangeSelection')
      const startNumber = document.getElementById('startNumber')
      const endNumber = document.getElementById('endNumber')
      const showContactsInput = document.getElementById('showContacts')
      const showInfectionsInput = document.getElementById('showInfections')
      const showSusceptibleInput = document.getElementById('showSusceptible')
      const showExposedInput = document.getElementById('showExposed')
      const showInfectiousInput = document.getElementById('showInfectious')
      const showRecoveredInput = document.getElementById('showRecovered')
      const fileInput = document.getElementById('fileInput')
      const contactGraphTab = document.getElementById('contactGraphTab')
      const seirCurveTab = document.getElementById('seirCurveTab')
      const tooltip = document.getElementById('tooltip')
      const nodeCountEl = document.getElementById('nodeCount')
      const edgeCountEl = document.getElementById('edgeCount')
      const activeNodeCountEl = document.getElementById('activeNodeCount')
      const durationLabelEl = document.getElementById('durationLabel')

      const colorByState = {
        susceptible: '#b6b83a',
        exposed: '#f47c2a',
        infectious: '#e1363f',
        recovered: '#07974d'
      }
      const stateKeys = ['susceptible', 'exposed', 'infectious', 'recovered']
      const eventOrder = {
        infection: 0,
        incubation: 1,
        recovery: 2,
        immunity_waned: 3
      }

      const root = svg.append('g')
      const graphRoot = root.append('g').attr('class', 'contact-graph')
      const contactLinkGroup = graphRoot.append('g').attr('class', 'contact-links')
      const infectionLinkGroup = graphRoot.append('g').attr('class', 'infection-links')
      const nodeGroup = graphRoot.append('g').attr('class', 'nodes')
      const chartRoot = root.append('g').attr('class', 'seir-chart').style('display', 'none')
      const chartGridGroup = chartRoot.append('g').attr('class', 'grid')
      const chartAxisGroup = chartRoot.append('g').attr('class', 'axes')
      const chartLineGroup = chartRoot.append('g').attr('class', 'curves')

      svg.append('defs')
        .append('marker')
        .attr('id', 'infection-arrow')
        .attr('viewBox', '0 -5 10 10')
        .attr('refX', 12)
        .attr('refY', 0)
        .attr('markerWidth', 7)
        .attr('markerHeight', 7)
        .attr('orient', 'auto')
        .append('path')
        .attr('d', 'M0,-4L9,0L0,4')
        .attr('fill', 'var(--infection)')
        .attr('opacity', 0.75)

      const graphZoom = zoom()
        .scaleExtent([0.08, 8])
        .on('zoom', (event) => {
          if (state.activeTab === 'contact') {
            state.graphTransform = event.transform
            graphRoot.attr('transform', event.transform)
          } else {
            state.chartTransform = event.transform
            chartRoot.attr('transform', event.transform)
          }
        })

      const state = {
        results: null,
        npcs: [],
        contacts: [],
        infections: [],
        seirEvents: [],
        seirSeries: null,
        npcIndex: new Map(),
        currentStates: [],
        filteredContacts: [],
        filteredInfections: [],
        aggregatedContacts: [],
        fullLayoutLinks: [],
        activeTab: 'contact',
        minTime: 0,
        maxTime: 0,
        start: 0,
        end: 0,
        showContacts: true,
        showInfections: true,
        showCurves: {
          susceptible: true,
          exposed: true,
          infectious: true,
          recovered: true
        },
        graphTransform: zoomIdentity,
        chartTransform: zoomIdentity,
        simulation: null
      }

      svg.call(graphZoom)
      window.addEventListener('resize', resize)
      startRange.addEventListener('input', () => setWindow(Number(startRange.value), state.end))
      endRange.addEventListener('input', () => setWindow(state.start, Number(endRange.value)))
      startNumber.addEventListener('change', () => setWindow(Number(startNumber.value), state.end))
      endNumber.addEventListener('change', () => setWindow(state.start, Number(endNumber.value)))
      showContactsInput.addEventListener('change', setEdgeDisplay)
      showInfectionsInput.addEventListener('change', setEdgeDisplay)
      showSusceptibleInput.addEventListener('change', setCurveDisplay)
      showExposedInput.addEventListener('change', setCurveDisplay)
      showInfectiousInput.addEventListener('change', setCurveDisplay)
      showRecoveredInput.addEventListener('change', setCurveDisplay)
      contactGraphTab.addEventListener('click', () => setActiveTab('contact'))
      seirCurveTab.addEventListener('click', () => setActiveTab('seir'))
      fileInput.addEventListener('change', loadSelectedFile)
      resize()

      async function loadSelectedFile() {
        const file = fileInput.files?.[0]

        if (!file) {
          return
        }

        setStatus(`Loading ${file.name}`)
        try {
          loadResults(JSON.parse(await file.text()), file.name)
        } catch (error) {
          setStatus(`Invalid JSON: ${error.message}`)
        } finally {
          fileInput.value = ''
        }
      }

      function loadResults(results, sourceName) {
        const normalized = normalizeResults(results)

        state.results = results
        state.npcs = normalized.npcs
        state.contacts = normalized.contacts
        state.infections = normalized.infections
        state.seirEvents = normalized.seirEvents
        state.seirSeries = normalized.seirSeries
        state.npcIndex = normalized.npcIndex
        state.fullLayoutLinks = aggregateContacts(normalized.contacts).map((link) => ({ ...link }))
        state.minTime = normalized.minTime
        state.maxTime = normalized.maxTime
        state.start = normalized.minTime
        state.end = normalized.maxTime
        state.graphTransform = centeredTransform()
        state.chartTransform = centeredTransform()
        sourceEl.textContent = sourceName

        configureControls()
        buildGraph()
        renderChart()
        updateFilteredGraph()
        applyActiveTransform()
        hideStatus()
      }

      function normalizeResults(results) {
        if (!results || typeof results !== 'object' || Array.isArray(results)) {
          throw new Error('Result payload must be a JSON object.')
        }

        if (!Array.isArray(results.npcs)) {
          throw new Error('Result payload must include npcs array.')
        }

        if (!Array.isArray(results.events)) {
          throw new Error('Result payload must include events array.')
        }

        const npcs = results.npcs.map((npc, index) => {
          const initialSeirState = normalizeSeirState(npc?.initialSeirState)

          return {
            id: String(npc?.id || `npc_${index}`),
            index,
            initialSeirState
          }
        })
        const npcIndex = new Map(npcs.map((npc, index) => [npc.id, index]))
        const contacts = []
        const infections = []
        const seirEvents = []

        for (const event of results.events) {
          if (event?.event === 'contact' && Array.isArray(event.npcs) && event.npcs.length >= 2) {
            const source = npcIndex.get(String(event.npcs[0]))
            const target = npcIndex.get(String(event.npcs[1]))
            const at = Number(event.at)
            const until = Number(event.until ?? event.at)

            if (!Number.isInteger(source) || !Number.isInteger(target) || source === target ||
                !Number.isFinite(at) || !Number.isFinite(until)) {
              continue
            }

            contacts.push({
              id: String(event.id || `contact_${contacts.length + 1}`),
              source,
              target,
              at: Math.min(at, until),
              until: Math.max(at, until),
              durationSeconds: Math.max(0, Number(event.durationSeconds) || Math.max(at, until) - Math.min(at, until)),
              observationCount: Math.max(1, Number(event.observationCount) || 1)
            })
            continue
          }

          if (event?.event === 'infection') {
            const source = npcIndex.get(String(event.from))
            const target = npcIndex.get(String(event.to))
            const at = Number(event.at)

            if (!Number.isInteger(source) || !Number.isInteger(target) || source === target ||
                !Number.isFinite(at)) {
              continue
            }

            infections.push({
              id: String(event.id || `infection_${infections.length + 1}`),
              source,
              target,
              at
            })
            seirEvents.push({
              event: 'infection',
              npc: target,
              at
            })
            continue
          }

          if (isNpcSeirEvent(event?.event)) {
            const npc = npcIndex.get(String(event.npc))
            const at = Number(event.at)

            if (Number.isInteger(npc) && Number.isFinite(at)) {
              seirEvents.push({
                event: event.event,
                npc,
                at
              })
            }
          }
        }

        let minEventTime = Infinity
        let maxEventTime = 0

        for (const contact of contacts) {
          minEventTime = Math.min(minEventTime, contact.at, contact.until)
          maxEventTime = Math.max(maxEventTime, contact.at, contact.until)
        }

        for (const infection of infections) {
          minEventTime = Math.min(minEventTime, infection.at)
          maxEventTime = Math.max(maxEventTime, infection.at)
        }

        for (const seirEvent of seirEvents) {
          minEventTime = Math.min(minEventTime, seirEvent.at)
          maxEventTime = Math.max(maxEventTime, seirEvent.at)
        }

        const configuredDuration = Number(results.summary?.durationSeconds ?? results.config?.run?.durationSeconds)

        if (Number.isFinite(configuredDuration) && configuredDuration > 0) {
          maxEventTime = Math.max(maxEventTime, configuredDuration)
        }

        if (!Number.isFinite(minEventTime)) {
          minEventTime = 0
        }

        const minTime = Math.floor(Math.max(0, minEventTime))
        const maxTime = Math.ceil(Math.max(minTime + 1, maxEventTime))

        return {
          npcs,
          contacts,
          infections,
          seirEvents,
          seirSeries: buildSeirSeries(npcs, seirEvents, maxTime),
          npcIndex,
          minTime,
          maxTime
        }
      }

      function buildSeirSeries(npcs, seirEvents, maxTime) {
        const counts = {
          susceptible: 0,
          exposed: 0,
          infectious: 0,
          recovered: 0
        }
        const statesByNpc = npcs.map((npc) => normalizeSeirState(npc.initialSeirState))

        for (const stateName of statesByNpc) {
          counts[stateName] += 1
        }

        const points = [{ time: 0, ...counts }]
        const sortedEvents = [...seirEvents].sort((left, right) => (
          left.at - right.at ||
          (eventOrder[left.event] ?? 99) - (eventOrder[right.event] ?? 99) ||
          left.npc - right.npc
        ))

        for (let eventIndex = 0; eventIndex < sortedEvents.length;) {
          const event = sortedEvents[eventIndex]
          const time = Math.max(0, Number(event.at) || 0)
          let changed = false

          while (eventIndex < sortedEvents.length && Math.max(0, Number(sortedEvents[eventIndex].at) || 0) === time) {
            const timedEvent = sortedEvents[eventIndex]
            const toState = nextStateForEvent(timedEvent.event)

            if (toState && statesByNpc[timedEvent.npc]) {
              changed = moveNpcState(counts, statesByNpc, timedEvent.npc, toState) || changed
            }

            eventIndex += 1
          }

          if (changed) {
            pushSeirPoint(points, time, counts)
          }
        }

        pushSeirPoint(points, Math.max(maxTime, points[points.length - 1]?.time || 0), counts)

        return {
          points,
          maxCount: Math.max(1, npcs.length),
          maxTime: Math.max(1, maxTime)
        }
      }

      function pushSeirPoint(points, time, counts) {
        const previous = points[points.length - 1]

        if (previous && previous.time === time &&
            previous.susceptible === counts.susceptible &&
            previous.exposed === counts.exposed &&
            previous.infectious === counts.infectious &&
            previous.recovered === counts.recovered) {
          return
        }

        points.push({
          time,
          susceptible: counts.susceptible,
          exposed: counts.exposed,
          infectious: counts.infectious,
          recovered: counts.recovered
        })
      }

      function moveNpcState(counts, statesByNpc, npcIndex, toState) {
        const fromState = statesByNpc[npcIndex]

        if (fromState === toState) {
          return false
        }

        if (counts[fromState] > 0) {
          counts[fromState] -= 1
        }

        counts[toState] += 1
        statesByNpc[npcIndex] = toState
        return true
      }

      function nextStateForEvent(eventName) {
        if (eventName === 'infection') {
          return 'exposed'
        }

        if (eventName === 'incubation') {
          return 'infectious'
        }

        if (eventName === 'recovery') {
          return 'recovered'
        }

        if (eventName === 'immunity_waned') {
          return 'susceptible'
        }

        return null
      }

      function normalizeSeirState(value) {
        const stateName = String(value || 'susceptible')

        return stateKeys.includes(stateName) ? stateName : 'susceptible'
      }

      function isNpcSeirEvent(eventName) {
        return eventName === 'incubation' || eventName === 'recovery' || eventName === 'immunity_waned'
      }

      function buildGraph() {
        stopSimulation()
        contactLinkGroup.selectAll('*').remove()
        infectionLinkGroup.selectAll('*').remove()
        nodeGroup.selectAll('*').remove()

        const nodes = state.npcs.map((npc, index) => ({
          ...npc,
          x: Math.cos(index * 2.399963) * Math.sqrt(index + 1) * 8,
          y: Math.sin(index * 2.399963) * Math.sqrt(index + 1) * 8
        }))
        const links = state.fullLayoutLinks.map((link) => ({
          source: link.source,
          target: link.target,
          count: link.count
        }))

        state.npcs = nodes
        state.simulation = forceSimulation(nodes)
          .force('link', forceLink(links).id((node) => node.index).distance((link) => 34 + Math.min(36, Math.log1p(link.count) * 8)).strength(0.16))
          .force('charge', forceManyBody().strength(-68).distanceMax(280))
          .force('collide', forceCollide(6.5))
          .force('center', forceCenter(0, 0))
          .alpha(1)
          .alphaDecay(0.028)
          .on('tick', tickGraph)

        updateNodeSelection()
      }

      function updateFilteredGraph() {
        state.filteredContacts = state.contacts.filter((contact) => contact.until >= state.start && contact.at <= state.end)
        state.filteredInfections = state.infections.filter((infection) => infection.at >= state.start && infection.at <= state.end)
        state.aggregatedContacts = aggregateContacts(state.filteredContacts)
        state.currentStates = statesAtTime(state.end)

        renderGraphLinks()
        updateNodeSelection()
        updateStats()
      }

      function renderGraphLinks() {
        const contactLinks = contactLinkGroup.selectAll('line')
          .data(state.showContacts ? state.aggregatedContacts : [], linkKey)

        contactLinks.exit().remove()
        contactLinks.enter()
          .append('line')
          .attr('class', 'contact-link')
          .attr('stroke-opacity', 0.32)
          .merge(contactLinks)
          .attr('stroke-width', (link) => Math.min(3.8, 0.45 + Math.log1p(link.count) * 0.55))

        const infectionLinks = infectionLinkGroup.selectAll('line')
          .data(state.showInfections ? state.filteredInfections : [], (link) => link.id)

        infectionLinks.exit().remove()
        infectionLinks.enter()
          .append('line')
          .attr('class', 'infection-link')
          .attr('marker-end', 'url(#infection-arrow)')
          .attr('stroke-opacity', 0.72)
          .merge(infectionLinks)
          .attr('stroke-width', 1.7)

        tickGraph()
      }

      function updateNodeSelection() {
        const degrees = new Array(state.npcs.length).fill(0)

        for (const contact of state.aggregatedContacts) {
          degrees[contact.source] += contact.count
          degrees[contact.target] += contact.count
        }

        for (const infection of state.filteredInfections) {
          degrees[infection.source] += 1
          degrees[infection.target] += 1
        }

        const nodes = nodeGroup.selectAll('circle')
          .data(state.npcs, (node) => node.id)

        nodes.exit().remove()
        nodes.enter()
          .append('circle')
          .attr('class', 'node')
          .attr('r', 4.4)
          .attr('stroke', '#ffffff')
          .attr('stroke-width', 1.2)
          .call(drag()
            .on('start', dragStarted)
            .on('drag', dragged)
            .on('end', dragEnded))
          .on('pointerenter', (event, node) => showNodeTooltip(event, node, degrees[node.index] || 0))
          .on('pointermove', (event, node) => showNodeTooltip(event, node, degrees[node.index] || 0))
          .on('pointerleave', hideTooltip)
          .merge(nodes)
          .attr('fill', (node) => colorByState[state.currentStates[node.index] || node.initialSeirState] || colorByState.susceptible)
          .attr('r', (node) => 4.2 + Math.min(2.6, Math.sqrt(degrees[node.index] || 0) * 0.08))

        tickGraph()
      }

      function tickGraph() {
        contactLinkGroup.selectAll('line')
          .attr('x1', (link) => nodeForLinkEndpoint(link.source).x)
          .attr('y1', (link) => nodeForLinkEndpoint(link.source).y)
          .attr('x2', (link) => nodeForLinkEndpoint(link.target).x)
          .attr('y2', (link) => nodeForLinkEndpoint(link.target).y)

        infectionLinkGroup.selectAll('line')
          .attr('x1', (link) => endpointWithOffset(link, true).x)
          .attr('y1', (link) => endpointWithOffset(link, true).y)
          .attr('x2', (link) => endpointWithOffset(link, false).x)
          .attr('y2', (link) => endpointWithOffset(link, false).y)

        nodeGroup.selectAll('circle')
          .attr('cx', (node) => node.x)
          .attr('cy', (node) => node.y)
      }

      function endpointWithOffset(link, sourceSide) {
        const source = nodeForLinkEndpoint(link.source)
        const target = nodeForLinkEndpoint(link.target)
        const dx = target.x - source.x
        const dy = target.y - source.y
        const length = Math.max(1, Math.hypot(dx, dy))
        const offset = sourceSide ? 5.6 : 8.5
        const sign = sourceSide ? 1 : -1

        return {
          x: sourceSide ? source.x + (dx / length) * offset : target.x + (dx / length) * sign * offset,
          y: sourceSide ? source.y + (dy / length) * offset : target.y + (dy / length) * sign * offset
        }
      }

      function nodeForLinkEndpoint(endpoint) {
        return typeof endpoint === 'object' ? endpoint : state.npcs[endpoint]
      }

      function dragStarted(event, node) {
        if (!event.active && state.simulation) {
          state.simulation.alphaTarget(0.22).restart()
        }

        node.fx = node.x
        node.fy = node.y
      }

      function dragged(event, node) {
        node.fx = event.x
        node.fy = event.y
      }

      function dragEnded(event, node) {
        if (!event.active && state.simulation) {
          state.simulation.alphaTarget(0)
        }

        node.fx = null
        node.fy = null
      }

      function aggregateContacts(contacts) {
        const links = new Map()

        for (const contact of contacts) {
          const low = Math.min(contact.source, contact.target)
          const high = Math.max(contact.source, contact.target)
          const key = `${low}:${high}`
          const link = links.get(key) || {
            source: low,
            target: high,
            count: 0,
            durationSeconds: 0,
            observationCount: 0
          }

          link.count += 1
          link.durationSeconds += contact.durationSeconds
          link.observationCount += contact.observationCount
          links.set(key, link)
        }

        return [...links.values()]
      }

      function linkKey(link) {
        return `${link.source}:${link.target}`
      }

      function statesAtTime(time) {
        const states = state.npcs.map((npc) => npc.initialSeirState)
        const sortedEvents = state.seirEvents
          .filter((event) => event.at <= time)
          .sort((left, right) => (
            left.at - right.at ||
            (eventOrder[left.event] ?? 99) - (eventOrder[right.event] ?? 99) ||
            left.npc - right.npc
          ))

        for (const event of sortedEvents) {
          const nextState = nextStateForEvent(event.event)

          if (nextState) {
            states[event.npc] = nextState
          }
        }

        return states
      }

      function renderChart() {
        chartGridGroup.selectAll('*').remove()
        chartAxisGroup.selectAll('*').remove()
        chartLineGroup.selectAll('*').remove()

        if (!state.seirSeries) {
          return
        }

        const layout = chartLayout()
        const x = scaleLinear()
          .domain([0, state.seirSeries.maxTime])
          .range([layout.innerLeft, layout.innerRight])
        const y = scaleLinear()
          .domain([0, 100])
          .nice()
          .range([layout.innerBottom, layout.innerTop])
        const timeAxisScale = scaleTime()
          .domain([new Date(0), new Date(state.seirSeries.maxTime * 1000)])
          .range([layout.innerLeft, layout.innerRight])

        chartGridGroup.append('g')
          .attr('transform', `translate(0,0)`)
          .call(axisLeft(y)
            .tickSize(-(layout.innerRight - layout.innerLeft))
            .tickFormat('')
            .ticks(6))
          .call((group) => group.select('.domain').remove())

        chartAxisGroup.append('g')
          .attr('class', 'axis')
          .attr('transform', `translate(0,${layout.innerBottom})`)
          .call(axisBottom(timeAxisScale).ticks(8).tickFormat(formatChartTime))

        chartAxisGroup.append('g')
          .attr('class', 'axis')
          .attr('transform', `translate(${layout.innerLeft},0)`)
          .call(axisLeft(y).ticks(6).tickFormat((value) => `${format('~g')(value)}%`))
          .call((group) => group.select('.domain').remove())

        const curveLine = line()
          .x((point) => x(point.time))
          .y((point) => y(percentValue(point, point.stateKey)))
          .curve(curveLinear)

        for (const stateKey of stateKeys) {
          const points = state.seirSeries.points.map((point) => ({ ...point, stateKey }))

          chartLineGroup.append('path')
            .datum(points)
            .attr('class', `curve-line curve-${stateKey}`)
            .attr('stroke', colorByState[stateKey])
            .attr('d', curveLine)
            .attr('display', state.showCurves[stateKey] ? null : 'none')
        }
      }

      function chartLayout() {
        const viewport = svg.node().getBoundingClientRect()
        const width = Math.max(560, Math.min(1060, viewport.width - 160))
        const height = Math.max(360, Math.min(620, viewport.height - 210))
        const left = -width / 2
        const top = -height / 2
        const margin = {
          top: 22,
          right: 18,
          bottom: 42,
          left: 58
        }

        return {
          width,
          height,
          left,
          top,
          innerLeft: left + margin.left,
          innerRight: left + width - margin.right,
          innerTop: top + margin.top,
          innerBottom: top + height - margin.bottom
        }
      }

      function percentValue(point, stateKey) {
        return (Number(point[stateKey]) / Math.max(1, state.seirSeries.maxCount)) * 100
      }

      function formatChartTime(date) {
        const seconds = date.getTime() / 1000

        if (state.seirSeries?.maxTime <= 86400) {
          if (seconds < 3600) {
            return `${Math.round(seconds / 60)}m`
          }

          return `${format('~g')(seconds / 3600)}h`
        }

        return timeFormat('%b %d')(date)
      }

      function configureControls() {
        const maxValue = Math.max(state.maxTime, state.minTime + 1)

        for (const input of [startRange, endRange, startNumber, endNumber]) {
          input.min = String(state.minTime)
          input.max = String(maxValue)
          input.step = '1'
        }

        startRange.value = String(state.start)
        endRange.value = String(state.end)
        startNumber.value = String(state.start)
        endNumber.value = String(state.end)
        updateRangeSelection()
      }

      function setWindow(start, end) {
        const minValue = state.minTime
        const maxValue = Math.max(state.maxTime, minValue)
        const nextStart = clamp(Number.isFinite(start) ? start : minValue, minValue, maxValue)
        const nextEnd = clamp(Number.isFinite(end) ? end : maxValue, minValue, maxValue)

        state.start = Math.min(nextStart, nextEnd)
        state.end = Math.max(nextStart, nextEnd)
        startRange.value = String(Math.round(state.start))
        endRange.value = String(Math.round(state.end))
        startNumber.value = String(Math.round(state.start))
        endNumber.value = String(Math.round(state.end))
        updateRangeSelection()
        updateFilteredGraph()
      }

      function updateRangeSelection() {
        const minValue = Number(startRange.min)
        const maxValue = Number(startRange.max)
        const span = Math.max(1, maxValue - minValue)
        const startPercent = ((state.start - minValue) / span) * 100
        const endPercent = ((state.end - minValue) / span) * 100

        rangeSelection.style.left = `${clamp(startPercent, 0, 100)}%`
        rangeSelection.style.right = `${100 - clamp(endPercent, 0, 100)}%`
      }

      function setEdgeDisplay() {
        state.showContacts = showContactsInput.checked
        state.showInfections = showInfectionsInput.checked
        renderGraphLinks()
      }

      function setCurveDisplay() {
        state.showCurves.susceptible = showSusceptibleInput.checked
        state.showCurves.exposed = showExposedInput.checked
        state.showCurves.infectious = showInfectiousInput.checked
        state.showCurves.recovered = showRecoveredInput.checked

        for (const stateKey of stateKeys) {
          chartLineGroup.select(`.curve-${stateKey}`).attr('display', state.showCurves[stateKey] ? null : 'none')
        }
      }

      function setActiveTab(tab) {
        if (state.activeTab === tab) {
          return
        }

        state.activeTab = tab === 'seir' ? 'seir' : 'contact'
        document.body.dataset.view = state.activeTab
        contactGraphTab.setAttribute('aria-selected', state.activeTab === 'contact' ? 'true' : 'false')
        seirCurveTab.setAttribute('aria-selected', state.activeTab === 'seir' ? 'true' : 'false')
        graphRoot.style('display', state.activeTab === 'contact' ? null : 'none')
        chartRoot.style('display', state.activeTab === 'seir' ? null : 'none')
        hideTooltip()
        applyActiveTransform()
      }

      function applyActiveTransform() {
        const transform = state.activeTab === 'contact' ? state.graphTransform : state.chartTransform

        svg.call(graphZoom.transform, transform)
      }

      function resize() {
        const width = window.innerWidth
        const height = window.innerHeight

        svg.attr('width', width).attr('height', height).attr('viewBox', `0 0 ${width} ${height}`)

        if (!state.results) {
          state.graphTransform = centeredTransform()
          state.chartTransform = centeredTransform()
          applyActiveTransform()
          return
        }

        renderChart()
        applyActiveTransform()
      }

      function centeredTransform() {
        return zoomIdentity.translate(window.innerWidth / 2, window.innerHeight / 2 + 18)
      }

      function updateStats() {
        const degrees = new Set()

        for (const contact of state.aggregatedContacts) {
          degrees.add(contact.source)
          degrees.add(contact.target)
        }

        nodeCountEl.textContent = String(state.npcs.length)
        edgeCountEl.textContent = String(state.filteredContacts.length)
        activeNodeCountEl.textContent = String(degrees.size)
        durationLabelEl.textContent = formatTime(Math.max(0, state.end - state.start))
      }

      function showNodeTooltip(event, node, degree) {
        tooltip.hidden = false
        tooltip.style.left = `${event.clientX}px`
        tooltip.style.top = `${event.clientY}px`
        tooltip.innerHTML = `
          <b>${escapeHtml(node.id)}</b>
          <span>State: ${escapeHtml(state.currentStates[node.index] || node.initialSeirState)}</span>
          <span>Contacts: ${degree}</span>
        `
      }

      function hideTooltip() {
        tooltip.hidden = true
      }

      function setStatus(message) {
        statusEl.textContent = message
        statusEl.hidden = false
      }

      function hideStatus() {
        statusEl.hidden = true
      }

      function stopSimulation() {
        if (state.simulation) {
          state.simulation.stop()
          state.simulation = null
        }
      }

      function formatTime(seconds) {
        const value = Math.max(0, Math.round(seconds))

        if (value < 60) {
          return `${value}s`
        }

        if (value < 3600) {
          return `${Math.floor(value / 60)}m`
        }

        if (value < 86400) {
          return `${format('.1f')(value / 3600)}h`
        }

        return `${format('.1f')(value / 86400)}d`
      }

      function clamp(value, minValue, maxValue) {
        return Math.min(Math.max(value, minValue), maxValue)
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;')
      }
    </script>
  </body>
</html>
