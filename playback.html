<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Epi City Playback</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f5f7f1;
        color: #20261d;
        font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      #playback-frame {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      #playback-controls {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: 16px;
        display: grid;
        grid-template-columns: auto auto minmax(160px, 1fr) auto auto;
        gap: 8px;
        align-items: center;
        padding: 10px;
        border: 1px solid rgba(40, 48, 36, 0.24);
        border-radius: 8px;
        background: rgba(248, 250, 244, 0.94);
        box-shadow: 0 12px 36px rgba(20, 24, 18, 0.16);
        z-index: 2;
      }

      button,
      input[type='file']::file-selector-button {
        min-height: 30px;
        border: 1px solid rgba(40, 48, 36, 0.24);
        border-radius: 6px;
        background: #ffffff;
        color: #20261d;
        font: inherit;
        cursor: pointer;
      }

      button {
        padding: 5px 10px;
      }

      button:disabled,
      input:disabled {
        cursor: default;
        opacity: 0.55;
      }

      input[type='range'] {
        width: 100%;
        accent-color: #2c9a54;
      }

      #playback-file {
        max-width: 210px;
      }

      #playback-time {
        min-width: 150px;
        text-align: right;
      }

      #playback-status {
        min-width: 180px;
        overflow: hidden;
        color: #526044;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      body.video-render-mode #playback-controls {
        display: none;
      }
    </style>
  </head>
  <body>
    <iframe id="playback-frame" title="Epi City simulation playback"></iframe>
    <div id="playback-controls">
      <button id="playback-load-default" type="button">Load Default</button>
      <input id="playback-file" type="file" accept="application/json,.json">
      <button id="playback-toggle" type="button" disabled>Play</button>
      <input id="playback-scrubber" type="range" min="0" max="0" step="0.001" value="0" disabled>
      <div id="playback-time">00:00 / 00:00</div>
      <div id="playback-status">Booting city...</div>
    </div>
    <script type="module" src="/src/playback-main.js"></script>
  </body>
</html>
